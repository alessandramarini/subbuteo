<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- OTTIMIZZAZIONI DI CARICAMENTO E PRE-CONNESSIONI -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://flagcdn.com">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,700;1,700&family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <title>CyberTorneo - Telegram Edition</title>
    <style>
        :root {
            --p1-neon: #00FF66;
            --p2-neon: #FF0055;
            --bg-dark: #224a10; 
            --bg-outer: #010102;
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; outline: none; box-sizing: border-box; }

        html, body {
            margin: 0; padding: 0; background: var(--bg-dark); 
            color: #fff; font-family: 'Montserrat', sans-serif;
            height: 100%; width: 100%; overflow: hidden; 
            touch-action: none; overscroll-behavior: none; 
        }

        #game-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-dark);
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        #game-wrapper {
            position: absolute; top: 0; left: 0;
            background-color: var(--bg-dark);
            overflow: hidden; 
            transform-origin: top left; 
        }
        
        canvas, #screen-flash, #ui-layer, #sponsor-bumper, .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        
        canvas { z-index: 1; touch-action: none; image-rendering: auto; }

        #screen-flash { background: white; pointer-events: none; z-index: 8; opacity: 0; transition: opacity 0.05s ease-out; will-change: opacity; }
        #ui-layer { pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; }

        #top-hud { display: flex; justify-content: center; align-items: flex-start; padding: 15px; }
        
        #score-board {
            display: flex; justify-content: center; align-items: center; font-size: 26px; font-weight: 900;
            background: rgba(5, 8, 12, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 2px solid var(--p1-neon); padding: 5px 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); gap: 12px; pointer-events: auto; clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
            -webkit-transform: translateZ(0); transform: translateZ(0); margin-top: -1px; transition: border-bottom-color 1s ease;
        }
        
        .sb-flag-container { width: 44px; height: 30px; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; background: #000; }
        .sb-flag-container img, .sb-flag-container svg { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #timer-display {
            font-family: 'Chakra Petch', sans-serif; font-size: 20px; font-weight: 900;
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.2); border-bottom: none;
            padding: 4px 20px; border-radius: 4px 4px 0 0; color: #fff;
            margin-bottom: 0; z-index: 1; position: relative;
        }

        @keyframes pulse-timer { 0% { transform: scale(1); text-shadow: 0 0 10px #FF0055; } 100% { transform: scale(1.1); text-shadow: 0 0 25px #FF0055, 0 0 10px #FF0055; } }
        .timer-danger { color: #FF0055 !important; animation: pulse-timer 0.8s infinite alternate ease-in-out; }

        .score-p1 { color: var(--p1-neon); min-width: 25px; text-align: center; }
        .score-p2 { color: #ffffff; min-width: 25px; text-align: center; transition: color 1s, text-shadow 1s; }
        #turn-indicator {
            font-family: 'Chakra Petch', sans-serif; font-size: 13px; padding: 4px 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 4px;
            transition: all 0.3s ease; min-width: 100px; border-radius: 4px; font-weight: bold;
        }

        .overlay-screen { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; -webkit-transform: translateZ(0); transform: translateZ(0); }
        
        .overlay-content {
            background: linear-gradient(145deg, #0f121b 0%, #050609 100%);
            border: 1px solid rgba(255, 255, 255, 0.06); border-top: 1px solid rgba(255, 255, 255, 0.15); border-bottom: 3px solid var(--p1-neon);
            border-radius: 16px; padding: 25px 15px; text-align: center; pointer-events: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            width: 96%; max-width: 800px; 
            max-height: 94%; 
            display: flex; flex-direction: column; align-items: center; overflow: hidden;
        }

        .hidden { display: none !important; }

        .inline-video-box {
            width: 100%;
            max-width: 480px;
            height: auto;
            aspect-ratio: 16 / 9;
            object-fit: contain; /* Non taglia le teste nei video */
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 0 auto 15px auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            background-color: #000;
            flex-shrink: 0; 
        }

        #teams-scroll-area { 
            width: 100%; 
            flex: 1 1 auto; 
            min-height: 0;
            overflow-y: auto; 
            margin-bottom: 15px; 
            -webkit-overflow-scrolling: touch; 
            touch-action: pan-y; 
            scrollbar-width: thin; 
            scrollbar-color: var(--p1-neon) rgba(255, 255, 255, 0.05); 
            max-height: 60vh; 
            padding: 0 5px;
        }
        #teams-scroll-area::-webkit-scrollbar { width: 6px; display: block; }
        #teams-scroll-area::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        #teams-scroll-area::-webkit-scrollbar-thumb { background: var(--p1-neon); border-radius: 4px; }

        .button-group { width: 100%; max-width: 480px; display: flex; gap: 10px; margin: 0 auto 15px auto; flex-shrink: 0; }

        #teams-flex-container { display: flex; width: 100%; gap: 12px; justify-content: center; align-items: flex-start; }
        .team-column { flex: 1; display: flex; flex-direction: column; align-items: center; min-width: 0; }
        .team-title { margin: 5px 0 10px 0; font-size: 14px; text-transform: uppercase; letter-spacing: 1.5px; white-space: nowrap; font-weight: bold; }

        #sponsor-bumper { background-color: #030408; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #sponsor-bumper.active { opacity: 1; pointer-events: auto; }
        .sponsor-content { text-align: center; transform: translateY(15px); opacity: 0; transition: all 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s; text-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        #sponsor-bumper.active .sponsor-content { transform: translateY(0); opacity: 1; }
        .sponsor-subtitle { font-family: 'Montserrat', sans-serif; font-size: 12px; letter-spacing: 6px; color: #ffffff; margin-bottom: 5px; text-transform: uppercase; }
        .sponsor-divider { width: 0; height: 2px; background: linear-gradient(90deg, transparent, #2AABEE, transparent); margin: 15px auto; transition: width 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.8s; }
        #sponsor-bumper.active .sponsor-divider { width: 150px; }
        .sponsor-title { font-family: 'Chakra Petch', sans-serif; font-size: 38px; color: #ffffff; font-weight: 900; letter-spacing: 4px; line-height: 1.1; text-transform: uppercase; text-shadow: 0 10px 30px rgba(0,0,0,1); }
        .sponsor-title span { color: #2AABEE; }

        .mode-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #888; padding: 12px; font-size: 14px; font-family: 'Chakra Petch', sans-serif; font-weight: 700; letter-spacing: 1px; border-radius: 8px; cursor: pointer; flex: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; }
        .mode-btn.active { background: rgba(0, 255, 102, 0.12); border-color: var(--p1-neon); color: var(--p1-neon); }

        /* Nuova Griglia Ariosa e Ottimizzata */
        .grid-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; width: 100%; padding: 5px; }
        .team-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 8px; padding: 10px 5px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; min-height: 85px; }
        .team-btn .flag-container { width: 60px; height: 40px; border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); position: relative; background: #222; box-shadow: 0 2px 8px rgba(0,0,0,0.5); flex-shrink: 0; }
        .team-btn span { color: #888; font-family: 'Chakra Petch', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.5px; transition: color 0.3s; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; text-align: center; }
        
        @media (hover: hover) { .team-btn:hover { background: rgba(255, 255, 255, 0.08); } .team-btn:hover span { color: #fff; } }
        .team-btn.active { background: rgba(0, 255, 102, 0.1); border: 1px solid var(--p1-neon); box-shadow: 0 0 10px rgba(0,255,102,0.2); }
        .team-btn.active span { color: var(--p1-neon); }
        #p2-grid .team-btn.active { background: rgba(255, 0, 85, 0.1); border: 1px solid var(--p2-neon); box-shadow: 0 0 10px rgba(255,0,85,0.2); }
        #p2-grid .team-btn.active span { color: var(--p2-neon); }
        .flag { width: 100%; height: 100%; display: block; object-fit: cover; }

        .joystick-btn-only { flex-shrink: 0; background: transparent; border: none; box-shadow: none; cursor: pointer; pointer-events: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 5px; outline: none; padding: 0; -webkit-tap-highlight-color: transparent; }
        .joystick-btn-only svg { width: 65px; height: 65px; filter: drop-shadow(0 0 10px rgba(0,255,102,0.4)); animation: pulse-joystick 2.5s infinite alternate ease-in-out; will-change: transform, filter; }
        @keyframes pulse-joystick { 0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0,255,102,0.2)); } 100% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(0,255,102,0.6)); } }
        .joystick-btn-only:active svg { transform: scale(0.9) !important; animation: none; }

        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 50px; font-weight: 900; font-style: italic; text-align: center; color: #fff; text-transform: uppercase; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; width: 100%; letter-spacing: 4px; will-change: opacity, transform; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        #message.active { opacity: 1; transform: translate(-50%, -50%) scale(1); animation: glitchPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes glitchPop { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .cup-trophy-container { position: relative; width: 160px; height: 180px; margin: 0 auto 20px auto; flex-shrink: 0; }
        .cup-handle { position: absolute; top: 30px; width: 45px; height: 60px; border: 6px solid #DAA520; border-radius: 20px; z-index: 1; }
        .handle-left { left: 15px; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0;}
        .handle-right { right: 15px; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0;}
        .cup-bowl { position: absolute; top: 10px; left: 35px; width: 90px; height: 90px; background: #FFDF00; border-radius: 5px 5px 45px 45px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 3; border-top: 6px solid #FFF8A0; overflow: hidden; }
        .cup-band { width: 100%; height: 8px; background: #DAA520; margin-top: 20px; }
        .cup-stem { position: absolute; top: 95px; left: 70px; width: 20px; height: 45px; background: #DAA520; z-index: 2; }
        .cup-base-top { position: absolute; bottom: 25px; left: 45px; width: 70px; height: 15px; background: #B8860B; border-radius: 10px 10px 0 0; z-index: 2; }
        .trophy-base { position: absolute; bottom: 0; left: 25px; right: 25px; height: 30px; background: #222; border-radius: 2px 2px 8px 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; z-index: 2; }
        .base-plate { font-size: 8px; color: #fff; font-family: 'Chakra Petch', sans-serif; letter-spacing: 2px; font-weight: 700; background: #050505; padding: 2px 10px; border-radius: 2px; }
    </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" style="position: absolute; width: 1px; height: 1px; left: -9999px; top: -9999px; pointer-events: none;" aria-hidden="true">
        <defs>
            <g id="gamepad-icon">
                <path d="M 15 45 C 15 30 25 25 40 25 L 60 25 C 75 25 85 30 85 45 C 85 65 90 75 75 75 C 65 75 60 60 50 60 C 40 60 35 75 25 75 C 10 75 15 65 15 45 Z" fill="#222" stroke="#555" stroke-width="2"/>
                <path d="M 27 45 h 10 m -5 -5 v 10" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>

    <div id="game-container">
        <div id="game-wrapper">

            <div id="screen-flash"></div> 
            
            <div id="sponsor-bumper" class="hidden">
                <div class="sponsor-content">
                    <div class="sponsor-subtitle">POWERED BY</div>
                    <div class="sponsor-divider"></div>
                    <div class="sponsor-title">TELEGRAM<br><span>NETWORK</span></div>
                </div>
            </div>

            <div id="ui-layer">
                <div id="top-hud">
                    <div style="display: flex; flex-direction: column; align-items: center;">

                        <div id="score-board">
                            <div id="sb-flag-1" class="sb-flag-container"></div>

                    </div>
                </div>

                <div id="team-menu" class="overlay-screen">
                    <div class="overlay-content">
                        
                        <!-- Video Menu Contenuto in Modo Ottimale -->
                        <video id="menu-video" class="inline-video-box" src="itcyborgscommettestake.mp4" autoplay loop muted playsinline webkit-playsinline></video>

                        <div class="button-group">

                            <button id="btn-2p" class="mode-btn">2 PLAYERS</button>

                        <!-- Layout a Colonne per la selezione squadre (TUTTE LE NAZIONI DEL MONDO) -->
                        <div id="teams-scroll-area">

                                <div class="team-column hidden" id="p2-column">
                                    <h3 class="team-title" style="color:#FF0055;">🔴 P2 Team</h3>
                                    <div class="grid-options" id="p2-grid"></div>

                            </div>

                        <button id="start-btn" class="joystick-btn-only">

                    </div>
                </div>

                <div id="game-over-screen" class="overlay-screen hidden">

                        <div style="display: flex; flex-direction: column; gap: 8px; justify-content: center; align-items: center; width: 100%; flex-shrink: 0;">
                            <button id="restart-btn" class="joystick-btn-only" style="margin-top: 0;">
                                <svg viewBox="0 0 100 100"><use href="#gamepad-icon"></use></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="message"></div>
            </div>
        </div>
    </div>

    <script>
        const logoTondoImg = new Image();
        logoTondoImg.src = 'logo-tondo.jpeg';
        logoTondoImg.onload = () => { clearTokenCache(); };

        let aiLevel = parseInt(localStorage.getItem('cyberTorneo_ai_rank')) || 1;

        const chakraData = [

        window.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('touchmove', e => { 
            const scrollArea = e.target.closest('#teams-scroll-area');
            if (scrollArea) {
                const isAtTop = scrollArea.scrollTop === 0;
                const isAtBottom = scrollArea.scrollHeight - scrollArea.scrollTop <= scrollArea.clientHeight;
                const isMovingDown = e.touches[0].clientY > (scrollArea.lastY || 0);
                scrollArea.lastY = e.touches[0].clientY;
                if ((isAtTop && isMovingDown) || (isAtBottom && !isMovingDown)) { if(e.cancelable) e.preventDefault(); }
                return;
            }
            if(e.cancelable) e.preventDefault(); 
        }, { passive: false });

        let isTabActive = true;
        document.addEventListener("visibilitychange", () => {
            isTabActive = !document.hidden;
            if(isTabActive) {
                lastTime = performance.now();
                if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            } else {
                if (audioCtx && audioCtx.state === 'running') audioCtx.suspend();
            }
        });

        function initAudio() {
            if ('speechSynthesis' in window) window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            if (audioCtx) { if (audioCtx.state === 'suspended') audioCtx.resume(); return; }
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer; noiseSource.loop = true;

            const filter1 = audioCtx.createBiquadFilter();
            filter1.type = 'lowpass'; filter1.frequency.value = 400; filter1.Q.value = 1.0;
            const filter2 = audioCtx.createBiquadFilter();
            filter2.type = 'highpass'; filter2.frequency.value = 100;

            crowdGainNode = audioCtx.createGain(); crowdGainNode.gain.value = 0.12; 

            const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.12;
            const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.06;
            const filterLfoGain = audioCtx.createGain(); filterLfoGain.gain.value = 250;
            lfo.connect(filterLfoGain); filterLfoGain.connect(filter1.frequency);
            
            lfo.connect(lfoGain); lfoGain.connect(crowdGainNode.gain); lfo.start();
            noiseSource.connect(filter1); filter1.connect(filter2); filter2.connect(crowdGainNode); crowdGainNode.connect(audioCtx.destination);
            noiseSource.start();

            oscChakra = audioCtx.createOscillator();
            oscChakra.type = 'sine';
            oscChakra.frequency.value = chakraData[aiLevel].hz;
            
            const gainChakra = audioCtx.createGain();
            gainChakra.gain.value = 0.0003; 
            
            const lfoChakra = audioCtx.createOscillator(); lfoChakra.type = 'sine'; lfoChakra.frequency.value = 0.2; 
            const lfoGainChakra = audioCtx.createGain(); lfoGainChakra.gain.value = 0.00015;
            
            lfoChakra.connect(lfoGainChakra); lfoGainChakra.connect(gainChakra.gain);
            oscChakra.connect(gainChakra); gainChakra.connect(audioCtx.destination);
            
            oscChakra.start(); lfoChakra.start();
        }

        function playShootSound() {
            if (!audioCtx) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.15);
        }

        function playImpactSound(intensity, isGoal = false) {
            if (!audioCtx) return; if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator(); const gainNode = audioCtx.createGain(); const filter = audioCtx.createBiquadFilter();
            const baseFreq = 528;
            if (isGoal) {
                const hornGain = audioCtx.createGain(); const freqs = [150, 153, 225, 230, 305]; 
                freqs.forEach(f => { let h = audioCtx.createOscillator(); h.type = 'sawtooth'; h.frequency.value = f; h.connect(hornGain); h.start(); h.stop(audioCtx.currentTime + 2.5); });
                hornGain.gain.setValueAtTime(0, audioCtx.currentTime); hornGain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.05);
                hornGain.gain.setValueAtTime(0.15, audioCtx.currentTime + 1.2); hornGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2.5);
                const hornFilter = audioCtx.createBiquadFilter(); hornFilter.type = 'lowpass'; hornFilter.frequency.setValueAtTime(2500, audioCtx.currentTime); hornFilter.frequency.exponentialRampToValueAtTime(400, audioCtx.currentTime + 2.5);
                hornGain.connect(hornFilter); hornFilter.connect(audioCtx.destination);
                if(crowdGainNode) { crowdGainNode.gain.cancelScheduledValues(audioCtx.currentTime); crowdGainNode.gain.setValueAtTime(0.9, audioCtx.currentTime); crowdGainNode.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 4); }
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(baseFreq * 2, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(baseFreq, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            } else {
                osc.type = intensity > 15 ? 'square' : 'triangle'; osc.frequency.setValueAtTime(baseFreq * 1.5, audioCtx.currentTime); osc.frequency.exponentialRampToValueAtTime(baseFreq, audioCtx.currentTime + 0.1);
                let vol = Math.min(intensity / 30, 0.4); gainNode.gain.setValueAtTime(0, audioCtx.currentTime); gainNode.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01); gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            }
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
            if(!isGoal) filter.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.2);
            osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + (isGoal ? 2.5 : 0.3));
        }

        let tokenCache = {};

        let fieldCacheCanvas = null;
        function generateFieldCache() {
            if (GAME_WIDTH <= 0 || GAME_HEIGHT <= 0) return;
            fieldCacheCanvas = document.createElement('canvas');
            fieldCacheCanvas.width = Math.max(1, GAME_WIDTH * dpr);
            fieldCacheCanvas.height = Math.max(1, GAME_HEIGHT * dpr);
            const fCtx = fieldCacheCanvas.getContext('2d', { alpha: false });
            fCtx.scale(dpr, dpr);

            fCtx.fillStyle = '#224a10'; 
            fCtx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            const playX = padLeft;
            const playY = padTop;
            const playW = GAME_WIDTH - padLeft - padRight;
            const playH = GAME_HEIGHT - padTop - padBottom;
            const midX = playX + playW / 2;
            const midY = playY + playH / 2;

            const stripeCount = 14;
            if (isLandscape) {
                const stripeWidth = playW / stripeCount;
                for (let i = 0; i < stripeCount; i++) {
                    fCtx.fillStyle = i % 2 === 0 ? '#3A7C21' : '#326A1D';
                    fCtx.fillRect(playX + i * stripeWidth, playY, stripeWidth, playH);
                }
            } else {
                const stripeHeight = playH / stripeCount;
                for (let i = 0; i < stripeCount; i++) {
                    fCtx.fillStyle = i % 2 === 0 ? '#3A7C21' : '#326A1D';
                    fCtx.fillRect(playX, playY + i * stripeHeight, playW, stripeHeight);
                }
            }

            fCtx.save();
            fCtx.lineCap = 'square';
            fCtx.lineJoin = 'miter';
            fCtx.lineWidth = 2.5;
            fCtx.strokeStyle = 'rgba(255, 255, 255, 0.85)';

            fCtx.strokeRect(playX, playY, playW, playH);

            fCtx.beginPath();
            if (isLandscape) {
                fCtx.moveTo(midX, playY); fCtx.lineTo(midX, playY + playH);
            } else {
                fCtx.moveTo(playX, midY); fCtx.lineTo(playX + playW, midY);
            }
            fCtx.stroke();

            const circleR = isLandscape ? playH * 0.15 : playW * 0.15;
            fCtx.beginPath(); fCtx.arc(midX, midY, circleR, 0, Math.PI * 2); fCtx.stroke();
            
            fCtx.beginPath(); fCtx.arc(midX, midY, 4, 0, Math.PI * 2); fCtx.fillStyle = 'rgba(255, 255, 255, 0.85)'; fCtx.fill();

            const penWidth = isLandscape ? playH * 0.55 : playW * 0.55;
            const penDepth = isLandscape ? playW * 0.15 : playH * 0.15;
            const goalAreaWidth = isLandscape ? playH * 0.25 : playW * 0.25;
            const goalAreaDepth = isLandscape ? playW * 0.05 : playH * 0.05;
            const penSpotDist = isLandscape ? playW * 0.11 : playH * 0.11;
            const arcR = isLandscape ? playH * 0.15 : playW * 0.15;

            if (isLandscape) {
                fCtx.strokeRect(playX, midY - penWidth/2, penDepth, penWidth); 
                fCtx.strokeRect(playX, midY - goalAreaWidth/2, goalAreaDepth, goalAreaWidth); 
                fCtx.beginPath(); fCtx.arc(playX + penSpotDist, midY, 3, 0, Math.PI*2); fCtx.fill();

                fCtx.strokeRect(playX + playW - penDepth, midY - penWidth/2, penDepth, penWidth); 
                fCtx.strokeRect(playX + playW - goalAreaDepth, midY - goalAreaWidth/2, goalAreaDepth, goalAreaWidth); 
                fCtx.beginPath(); fCtx.arc(playX + playW - penSpotDist, midY, 3, 0, Math.PI*2); fCtx.fill();

                fCtx.save();
                fCtx.beginPath(); fCtx.rect(playX + penDepth, playY, playW/2 - penDepth, playH); fCtx.clip();
                fCtx.beginPath(); fCtx.arc(playX + penSpotDist, midY, arcR, 0, Math.PI*2); fCtx.stroke();
                fCtx.restore();

                fCtx.save();
                fCtx.beginPath(); fCtx.rect(midX, playY, playW/2 - penDepth, playH); fCtx.clip();
                fCtx.beginPath(); fCtx.arc(playX + playW - penSpotDist, midY, arcR, 0, Math.PI*2); fCtx.stroke();
                fCtx.restore();
            } else {
                fCtx.strokeRect(midX - penWidth/2, playY, penWidth, penDepth); 
                fCtx.strokeRect(midX - goalAreaWidth/2, playY, goalAreaWidth, goalAreaDepth); 
                fCtx.beginPath(); fCtx.arc(midX, playY + penSpotDist, 3, 0, Math.PI*2); fCtx.fill();

                fCtx.strokeRect(midX - penWidth/2, playY + playH - penDepth, penWidth, penDepth); 
                fCtx.strokeRect(midX - goalAreaWidth/2, playY + playH - goalAreaDepth, goalAreaWidth, goalAreaDepth); 
                fCtx.beginPath(); fCtx.arc(midX, playY + playH - penSpotDist, 3, 0, Math.PI*2); fCtx.fill();

                fCtx.save();
                fCtx.beginPath(); fCtx.rect(playX, playY + penDepth, playW, playH/2 - penDepth); fCtx.clip();
                fCtx.beginPath(); fCtx.arc(midX, playY + penSpotDist, arcR, 0, Math.PI*2); fCtx.stroke();
                fCtx.restore();

                fCtx.save();
                fCtx.beginPath(); fCtx.rect(playX, midY, playW, playH/2 - penDepth); fCtx.clip();
                fCtx.beginPath(); fCtx.arc(midX, playY + playH - penSpotDist, arcR, 0, Math.PI*2); fCtx.stroke();
                fCtx.restore();
            }

            const cornerR = isLandscape ? playH * 0.03 : playW * 0.03;
            fCtx.beginPath(); fCtx.arc(playX, playY, cornerR, 0, Math.PI/2); fCtx.stroke();
            fCtx.beginPath(); fCtx.arc(playX+playW, playY, cornerR, Math.PI/2, Math.PI); fCtx.stroke();
            fCtx.beginPath(); fCtx.arc(playX, playY+playH, cornerR, -Math.PI/2, 0); fCtx.stroke();
            fCtx.beginPath(); fCtx.arc(playX+playW, playY+playH, cornerR, Math.PI, -Math.PI/2); fCtx.stroke();

            let p2Color = gameMode === 2 ? '#FF0055' : chakraData[aiLevel].color;
            let p2Fill = gameMode === 2 ? 'rgba(255, 0, 85, 0.15)' : `${chakraData[aiLevel].color}26`; 
            fCtx.lineWidth = 3;

            if (isLandscape) {
                const gy = midY - goalSize / 2;
                fCtx.fillStyle = 'rgba(0, 255, 102, 0.15)'; fCtx.fillRect(playX - goalDepth, gy, goalDepth, goalSize); fCtx.strokeStyle = '#00FF66'; fCtx.strokeRect(playX - goalDepth, gy, goalDepth, goalSize);
                fCtx.fillStyle = p2Fill; fCtx.fillRect(playX + playW, gy, goalDepth, goalSize); fCtx.strokeStyle = p2Color; fCtx.strokeRect(playX + playW, gy, goalDepth, goalSize);
            } else {
                const gx = midX - goalSize / 2;
                fCtx.fillStyle = p2Fill; fCtx.fillRect(gx, playY - goalDepth, goalSize, goalDepth); fCtx.strokeStyle = p2Color; fCtx.strokeRect(gx, playY - goalDepth, goalSize, goalDepth);
                fCtx.fillStyle = 'rgba(0, 255, 102, 0.15)'; fCtx.fillRect(gx, playY + playH, goalSize, goalDepth); fCtx.strokeStyle = '#00FF66'; fCtx.strokeRect(gx, playY + playH, goalSize, goalDepth);
            }
            
            fCtx.restore();
        }

        let cachedBallCanvas = null;
        function getBallCanvas(radius) {
            if (!cachedBallCanvas || cachedBallCanvas.width === 0) {
                cachedBallCanvas = document.createElement('canvas');
                const pad = 2;
                cachedBallCanvas.width = (radius * 2 + pad * 2) * dpr;
                cachedBallCanvas.height = (radius * 2 + pad * 2) * dpr;
                const bCtx = cachedBallCanvas.getContext('2d');
                bCtx.scale(dpr, dpr);
                bCtx.translate(radius + pad, radius + pad);

                bCtx.beginPath();
                bCtx.arc(0, 0, radius, 0, PI2);
                bCtx.clip(); 

                let grad = bCtx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.1, 0, 0, radius);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.7, '#e0e0e0');
                grad.addColorStop(1, '#999999');
                bCtx.fillStyle = grad;
                bCtx.fillRect(-radius, -radius, radius*2, radius*2);

                bCtx.fillStyle = '#1a1a1a';
                bCtx.strokeStyle = '#333';
                bCtx.lineWidth = 1.5;
                bCtx.lineJoin = 'round';
                let r = radius;

                bCtx.beginPath();
                for (let i = 0; i < 5; i++) {
                    let a = i * PI2 / 5 - Math.PI / 2;
                    let px = Math.cos(a) * (r * 0.38);
                    let py = Math.sin(a) * (r * 0.38);
                    if (i === 0) bCtx.moveTo(px, py);
                    else bCtx.lineTo(px, py);
                }
                bCtx.closePath();
                bCtx.fill();
                bCtx.stroke();

                for (let i = 0; i < 5; i++) {
                    let a1 = i * PI2 / 5 - Math.PI / 2;
                    let a2 = (i + 1) * PI2 / 5 - Math.PI / 2;
                    let aMid = a1 + Math.PI / 5;
                    
                    let px = Math.cos(a1) * (r * 0.38);
                    let py = Math.sin(a1) * (r * 0.38);
                    let px2 = Math.cos(a2) * (r * 0.38);
                    let py2 = Math.sin(a2) * (r * 0.38);
                    
                    let ex = Math.cos(a1) * (r * 0.85);
                    let ey = Math.sin(a1) * (r * 0.85);
                    let ex2 = Math.cos(a2) * (r * 0.85);
                    let ey2 = Math.sin(a2) * (r * 0.85);

                    bCtx.beginPath();
                    bCtx.moveTo(px, py);
                    bCtx.lineTo(ex, ey);
                    bCtx.lineTo(ex2, ey2);
                    bCtx.stroke();

                    bCtx.beginPath();
                    bCtx.arc(Math.cos(aMid) * r, Math.sin(aMid) * r, r * 0.42, 0, PI2);
                    bCtx.fill();
                    bCtx.stroke();
                }

                bCtx.restore(); 
                
                bCtx.beginPath();
                bCtx.arc(0, 0, radius, 0, PI2);
                bCtx.lineWidth = 1.5;
                bCtx.strokeStyle = '#222';
                bCtx.stroke();
            }
            return { canvas: cachedBallCanvas, pad: 2 };
        }

        function getCachedToken(teamCode, isP1, radius, isAI, isDrag, currentAiLevel) {
            let key = isAI ? `ai_${radius}_${isDrag}_lvl${currentAiLevel}` : `${teamCode}_${isP1}_${radius}_${isDrag}`;
            if (!tokenCache[key]) {
                const offCanvas = document.createElement('canvas');
                const pad = 15;

        function resolveCollision(e1, e2) {

                    playImpactSound(imp); 
                    let c = (e1===ball||e2===ball) ? '#4CAF50' : '#ffffff';
                    createExplosion(e1.x + nx * e1.radius, e1.y + ny * e1.radius, c, Math.min(imp, 15), imp, 3, 20);
                    
                    if (imp > 20) { triggerScreenShake(12, imp * 0.5); hitStopFrames = 4; triggerFlash(0.4); spawnText(e1.x + nx*e1.radius, e1.y + ny*e1.radius, impactWords[Math.floor(Math.random()*impactWords.length)], '#FF0055'); } 
                    else if (imp > 10) { triggerScreenShake(4, imp * 0.2); spawnText(e1.x + nx*e1.radius, e1.y + ny*e1.radius, "CLANG!", '#ffffff'); }
                }
            }
        }

        function updatePhysics() {
            if (dragTarget && pointer.active) {
                let dx = pointer.x - dragTarget.dragStartX, dy = pointer.y - dragTarget.dragStartY; let dist = Math.hypot(dx, dy);
                if (dist > maxDragPull) { dx = (dx / dist) * maxDragPull; dy = (dy / dist) * maxDragPull; }
                dragTarget.x = dragTarget.dragStartX + dx; dragTarget.y = dragTarget.dragStartY + dy;
            }

            const allEnt = [...team1, ...team2, ball];
            for (let e of allEnt) {
                if (e === dragTarget) continue;
                e.applyFriction(e === ball ? ballFriction : friction);
                if (e === ball) { let s = Math.hypot(ball.vx, ball.vy); if (s > maxBallSpeed) { ball.vx = (ball.vx/s)*maxBallSpeed; ball.vy = (ball.vy/s)*maxBallSpeed; } }
                e.update();
            }

            let isAnythingMoving = false;
            for (let e of allEnt) { if (Math.hypot(e.vx, e.vy) > 0.25) { isAnythingMoving = true; break; } }
            if (isMoving && !isAnythingMoving && !dragTarget) { forceStopAll(allEnt); isMoving = false; switchTurn(); } 
            else if (!isMoving && isAnythingMoving) { isMoving = true; }

            for (let i = 0; i < allEnt.length; i++) { for (let j = i + 1; j < allEnt.length; j++) { if (allEnt[i] === dragTarget || allEnt[j] === dragTarget) continue; resolveCollision(allEnt[i], allEnt[j]); } }

            [...team1, ...team2].forEach(p => {
                if (p.x < p.radius + padLeft) { p.x = p.radius + padLeft; p.vx *= -0.5; } 
                if (p.x > GAME_WIDTH - p.radius - padRight) { p.x = GAME_WIDTH - p.radius - padRight; p.vx *= -0.5; }
                if (p.y < p.radius + padTop) { p.y = p.radius + padTop; p.vy *= -0.5; } 
                if (p.y > GAME_HEIGHT - p.radius - padBottom) { p.y = GAME_HEIGHT - p.radius - padBottom; p.vy *= -0.5; }
            });

            const midX = GAME_WIDTH / 2;
            const midY = GAME_HEIGHT / 2;

            if (isLandscape) {
                const gy1 = midY - goalSize / 2;
                const gy2 = midY + goalSize / 2;
                
                if (ball.y < ball.radius + padTop) { ball.y = ball.radius + padTop; ball.vy *= -0.8; }
                if (ball.y > GAME_HEIGHT - ball.radius - padBottom) { ball.y = GAME_HEIGHT - ball.radius - padBottom; ball.vy *= -0.8; }
                
                if (gameState !== GAME_STATE_GOAL && gameState !== GAME_STATE_OVER) {
                    if (ball.x < ball.radius + padLeft) {
                        if (ball.y > gy1 && ball.y < gy2) { scoreGoal(2); } 
                        else { ball.x = ball.radius + padLeft; ball.vx *= -0.8; }
                    }
                    else if (ball.x > GAME_WIDTH - ball.radius - padRight) {
                        if (ball.y > gy1 && ball.y < gy2) { scoreGoal(1); } 
                        else { ball.x = GAME_WIDTH - ball.radius - padRight; ball.vx *= -0.8; }
                    }
                } else {
                    if (ball.x < ball.radius + padLeft) { ball.x = ball.radius + padLeft; ball.vx *= -0.8; } 
                    if (ball.x > GAME_WIDTH - ball.radius - padRight) { ball.x = GAME_WIDTH - ball.radius - padRight; ball.vx *= -0.8; }
                }
            } else {
                const gx1 = midX - goalSize / 2;
                const gx2 = midX + goalSize / 2;
                
                if (ball.x < ball.radius + padLeft) { ball.x = ball.radius + padLeft; ball.vx *= -0.8; }
                if (ball.x > GAME_WIDTH - ball.radius - padRight) { ball.x = GAME_WIDTH - ball.radius - padRight; ball.vx *= -0.8; }
                
                if (gameState !== GAME_STATE_GOAL && gameState !== GAME_STATE_OVER) {
                    if (ball.y < ball.radius + padTop) { 
                        if (ball.x > gx1 && ball.x < gx2) { scoreGoal(1); } 
                        else { ball.y = ball.radius + padTop; ball.vy *= -0.8; } 
                    }
                    else if (ball.y > GAME_HEIGHT - ball.radius - padBottom) { 
                        if (ball.x > gx1 && ball.x < gx2) { scoreGoal(2); } 
                        else { ball.y = GAME_HEIGHT - ball.radius - padBottom; ball.vy *= -0.8; } 
                    }
                } else {
                    if (ball.y < ball.radius + padTop) { ball.y = ball.radius + padTop; ball.vy *= -0.8; } 
                    if (ball.y > GAME_HEIGHT - ball.radius - padBottom) { ball.y = GAME_HEIGHT - ball.radius - padBottom; ball.vy *= -0.8; }
                }
            }
        }

        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (gameState === GAME_STATE_PLAYING) {
                    timeRemaining--; updateTimerUI();
                    if (timeRemaining <= 0) { clearInterval(timerInterval); timeUp(); }
                }
            }, 1000);
        }

        function stopTimer() { if(timerInterval) clearInterval(timerInterval); }

        function updateTimerUI() {
            let m = Math.floor(timeRemaining / 60); let s = timeRemaining % 60;
            const timerEl = document.getElementById('timer-display'); timerEl.innerText = `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            if (timeRemaining <= 10 && timeRemaining > 0) { timerEl.classList.add('timer-danger'); timerEl.style.color = ''; timerEl.style.textShadow = ''; } 
            else { timerEl.classList.remove('timer-danger'); timerEl.style.color = '#ffffff'; timerEl.style.textShadow = '0 0 10px rgba(255,255,255,0.8)'; }
        }

        function timeUp() {
            gameState = GAME_STATE_OVER; isMoving = false; forceStopAll([...team1, ...team2, ball]); triggerFlash(1);
            showMessage("TIME UP!"); messageEl.style.color = '#FFD700'; messageEl.style.setProperty('--accent-color', '#FFD700');
            setTimeout(() => { 
                hideMessage(); 
                showEndScreen();
            }, 2500);
        }

        function showEndScreen() {
            const goldCupHTML = `
                <div class="cup-trophy-container">
                    <div class="cup-handle handle-left"></div><div class="cup-handle handle-right"></div><div class="cup-stem"></div><div class="cup-base-top"></div>
                    <div class="trophy-base"><div class="base-plate">CHAMPION</div></div>
                    <div class="cup-bowl"><div class="cup-band"></div><div class="cup-sparkle s1"></div><div class="cup-sparkle s2"></div><div class="cup-sparkle s3"></div></div>
                </div>`;

            let winner = 0; if (scoreP1 > scoreP2) winner = 1; else if (scoreP2 > scoreP1) winner = 2;
            let flagHTML = '';

            if (winner === 1) {
                flagHTML = `<div class="flag-container" style="width: 80px; height: 50px; margin: 0 auto 5px; border-radius: 4px; overflow: hidden; border: 2px solid #00FF66; box-shadow: 0 3px 15px rgba(0,255,102,0.4);"><img src="https://flagcdn.com/w160/${selectedTeamP1}.png" style="width:100%; height:100%; object-fit:cover; display:block;"></div>`;
                gameOverTitleEl.innerText = getTeamName(selectedTeamP1).toUpperCase() + " WINS!"; gameOverTitleEl.style.color = "#00FF66";
                
                if (gameMode === 1) {
                    if (aiLevel < 7) {
                        aiLevel++;
                        localStorage.setItem('cyberTorneo_ai_rank', aiLevel);
                    }
                }
            } else if (winner === 2) {
                if (gameMode === 2) {
                    flagHTML = `<div class="flag-container" style="width: 80px; height: 50px; margin: 0 auto 5px; border-radius: 4px; overflow: hidden; border: 2px solid #FF0055; box-shadow: 0 3px 15px rgba(255,0,85,0.4);"><img src="https://flagcdn.com/w160/${selectedTeamP2}.png" style="width:100%; height:100%; object-fit:cover; display:block;"></div>`;
                    gameOverTitleEl.innerText = getTeamName(selectedTeamP2).toUpperCase() + " WINS!"; gameOverTitleEl.style.color = "#FF0055";
                } else {
                    let aiColor = chakraData[aiLevel].color;
                    flagHTML = `<img src="logo-tondo.jpeg" style="width: 60px; height: 60px; border-radius: 50%; border: 2px solid ${aiColor}; box-shadow: 0 2px 15px ${aiColor}; margin: 0 auto 10px; display: block; object-fit: cover;">`;
                    gameOverTitleEl.innerText = "SYSTEM WINS"; gameOverTitleEl.style.color = aiColor;
                }
            } else {
                flagHTML = `<div style="font-size: 40px; margin: 0 auto 5px; filter: drop-shadow(0 2px 5px rgba(255,255,255,0.4));">🤝</div>`;
                gameOverTitleEl.innerText = "IT'S A DRAW!"; gameOverTitleEl.style.color = "#FFD700";
            }
            
            winnerFlagContainerEl.innerHTML = flagHTML;
            gameOverIconEl.innerHTML = `<div style="transform: scale(0.6); transform-origin: top center; height: 110px;">${goldCupHTML}</div>`;
            gameOverScreenEl.classList.remove('hidden');
            
            if(gameOverVideo) gameOverVideo.play().catch(e => console.log(e));
        }

        function scoreGoal(playerScored) {
            gameState = GAME_STATE_GOAL; isMoving = false; hitStopFrames = 20; triggerFlash(1); triggerScreenShake(30, 15); forceStopAll([...team1, ...team2, ball]); playImpactSound(30, true); 

            if (playerScored === 1) {
                scoreP1++; score1El.innerText = scoreP1; currentTurn = 2; 
                createExplosion(isLandscape ? GAME_WIDTH - padRight : GAME_WIDTH / 2, isLandscape ? GAME_HEIGHT / 2 : padTop, '#00FF66', 40, 30, 8, 150);
                showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', '#00FF66');
            } else {
                scoreP2++; score2El.innerText = scoreP2; currentTurn = 1;
                let color = gameMode === 2 ? '#FF0055' : chakraData[aiLevel].color;
                createExplosion(isLandscape ? padLeft : GAME_WIDTH / 2, isLandscape ? GAME_HEIGHT / 2 : GAME_HEIGHT - padBottom, color, 40, 30, 8, 150);
                
                if (gameMode === 2) {
                    showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', '#FF0055');
                } else {
                    showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', color);
                }
            }
            updateTurnUI();

            if (scoreP1 >= 3 || scoreP2 >= 3) {
                stopTimer(); 
                setTimeout(() => { 
                    hideMessage(); 
                    showEndScreen(); 
                }, 2500); 
            } else { setTimeout(() => { if (gameState === GAME_STATE_GOAL) { resetPositions(); gameState = GAME_STATE_PLAYING; hideMessage(); } }, 3500); }
        }

        function drawSlingshotLine() {
            if (dragTarget && pointer.active) {
                let dx = dragTarget.dragStartX - dragTarget.x, dy = dragTarget.dragStartY - dragTarget.y;
                let dist = Math.hypot(dx, dy); let maxD = maxDragPull; let intensity = Math.min(dist / maxD, 1);
                
                let r, g, b;
                if (currentTurn === 1) { r = Math.floor(0 + intensity * 255); g = 255; b = Math.floor(102 + intensity * 153); } 
                else { r = 255; g = Math.floor(0 + intensity * 255); b = Math.floor(85 + intensity * 170); }
                let rgb = `${r}, ${g}, ${b}`;
                
                ctx.save(); 
                if (intensity > 0.85) { ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3); }
                let auraRadius = dragTarget.radius + 5 + (Math.sin(performance.now() / (100 - intensity * 80)) * 15 * intensity);
                ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, auraRadius, 0, PI2);
                ctx.fillStyle = `rgba(${rgb}, ${0.1 + intensity * 0.2})`; ctx.fill();

                if (intensity > 0.7) { ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, auraRadius * 1.2, 0, PI2); ctx.lineWidth = 2; ctx.strokeStyle = `rgba(255, 255, 255, ${Math.random() * 0.8 * intensity})`; ctx.stroke(); }
                if (intensity > 0.4 && Math.random() < intensity) { let sparkX = dragTarget.dragStartX + (Math.random() - 0.5) * 50; let sparkY = dragTarget.dragStartY + (Math.random() - 0.5) * 50; for(let i=0; i<particlePool.length; i++) { if(!particlePool[i].active) { particlePool[i].spawn(sparkX, sparkY, `rgba(${rgb}, 1)`, 2 + intensity * 5, 1 + intensity * 2, 10 + intensity * 10); break; } } }

                ctx.beginPath(); ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY); ctx.lineTo(dragTarget.x, dragTarget.y);
                ctx.lineWidth = 2 + intensity * 6; ctx.setLineDash([10, 10]); ctx.lineDashOffset = -performance.now() / (30 - intensity * 25);
                ctx.strokeStyle = `rgba(${rgb}, ${0.5 + intensity * 0.5})`; ctx.shadowBlur = 10 + intensity * 20; ctx.shadowColor = `rgba(${rgb}, 1)`; ctx.stroke(); 
                ctx.shadowBlur = 0; ctx.setLineDash([]);
                
                ctx.beginPath(); let crosshairRadius = 12 + Math.sin(performance.now() / (150 - intensity * 100)) * (3 + intensity * 5);
                ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, crosshairRadius, 0, PI2); ctx.lineWidth = 3 + intensity * 2; ctx.strokeStyle = `rgba(${rgb}, 1)`; ctx.stroke();
                ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, 3 + intensity * 3, 0, PI2); ctx.fillStyle = `rgba(${rgb}, 1)`; ctx.fill();
                
                let offset = crosshairRadius + 4; ctx.beginPath(); 
                ctx.moveTo(dragTarget.dragStartX - offset, dragTarget.dragStartY); ctx.lineTo(dragTarget.dragStartX - offset + 5, dragTarget.dragStartY); 
                ctx.moveTo(dragTarget.dragStartX + offset, dragTarget.dragStartY); ctx.lineTo(dragTarget.dragStartX + offset - 5, dragTarget.dragStartY); 
                ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY - offset); ctx.lineTo(dragTarget.dragStartX, dragTarget.dragStartY - offset + 5); 
                ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY + offset); ctx.lineTo(dragTarget.dragStartX, dragTarget.dragStartY + offset - 5); 
                ctx.lineWidth = 2 + intensity * 2; ctx.stroke();
                
                ctx.font = '900 16px Chakra Petch'; ctx.fillStyle = `rgba(${rgb}, ${0.6 + intensity * 0.4})`; ctx.textAlign = 'center';
                let powerPercent = Math.floor(intensity * 100); let powerText = powerPercent === 100 ? 'MAX POWER' : powerPercent + '%';
                ctx.fillText(powerText, dragTarget.dragStartX, dragTarget.dragStartY - 40 - intensity * 15);
                ctx.restore();
            }
        }

        window.gameLoopRunning = false;

        function gameLoop(time) {
            if(!window.gameLoopRunning) return;
            if (!isTabActive) { requestAnimationFrame(gameLoop); return; }

            requestAnimationFrame(gameLoop);
            if (!lastTime) lastTime = time; let dt = (time - lastTime) || 0; lastTime = time;
            if (dt > 250) dt = 250; accumulator += dt;

            while (accumulator >= timeStep) {
                if (shakeTime > 0) shakeTime--;
                if (hitStopFrames > 0) { hitStopFrames--; } 
                else { 
                    handleAI(); updatePhysics(); 
                    if (gameState === GAME_STATE_PLAYING && !isMoving) {
                        if (gameMode === 1 && currentTurn === 2) { turnTimeRemaining = 5.0; } 
                        else {
                            turnTimeRemaining -= timeStep / 1000;
                            if (turnTimeRemaining <= 0) {
                                turnTimeRemaining = 0;
                                if (dragTarget) { dragTarget.x = dragTarget.dragStartX; dragTarget.y = dragTarget.dragStartY; dragTarget = null; pointer.active = false; if(activePointerId !== null) { try { canvas.releasePointerCapture(activePointerId); } catch(e){} } activePointerId = null; }
                                spawnText(GAME_WIDTH/2, GAME_HEIGHT/2, "TIME UP!", "#FF0055"); playImpactSound(15); switchTurn();
                            }
                        }
                    }
                }

                for (let i = 0; i < particlePool.length; i++) { particlePool[i].update(); }
                for (let i = 0; i < textPool.length; i++) { textPool[i].update(); }
                accumulator -= timeStep;
            }

            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); ctx.save();
            if (shakeTime > 0) ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
            
            if (!fieldCacheCanvas) generateFieldCache();
            if (fieldCacheCanvas && fieldCacheCanvas.width > 0 && fieldCacheCanvas.height > 0) {
                ctx.drawImage(fieldCacheCanvas, 0, 0, GAME_WIDTH, GAME_HEIGHT);
            }

            for (let i = 0; i < particlePool.length; i++) { particlePool[i].draw(ctx); }
            drawSlingshotLine(); team1.forEach(p => p.draw(ctx)); team2.forEach(p => p.draw(ctx)); ball.draw(ctx);
            for (let i = 0; i < textPool.length; i++) { textPool[i].draw(ctx); }
            drawTurnIndicator(); ctx.restore();
        }

        initDisplay();

    </script>
</body>
</html>
