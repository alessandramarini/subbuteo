<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- OTTIMIZZAZIONI DI CARICAMENTO (Preconnect & Preload) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preload" as="image" href="logoStadioVerticale.jpeg">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,700;1,700&family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <title>CyberTorneo - TV Broadcast Edition</title>
    <style>
        :root {
            --p1-neon: #00FF66;
            --p2-neon: #FF0055;
            --bg-dark: #030408;
            --panel-blur: blur(20px);
        }

        /* Anti-Glitch e Ottimizzazione App Nativa */
        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; outline: none; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background: #030408;
            color: #fff; font-family: 'Montserrat', sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; touch-action: none; overscroll-behavior: none;
        }

        /* Container del Gioco (Hardware Accelerated) */
        #game-container {
            position: relative; width: 100vw; height: calc(100vw * (900 / 600));
            max-height: 100vh; max-height: 100dvh; max-width: calc(100vh * (600 / 900)); max-width: calc(100dvh * (600 / 900));
            border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background-color: var(--bg-dark);
            box-shadow: 0 0 30px rgba(0, 255, 102, 0.15), inset 0 0 20px rgba(0, 255, 102, 0.1); border-color: rgba(0, 255, 102, 0.4);
            transform: translateZ(0); will-change: transform;
        }
        @media (min-aspect-ratio: 900/550) {
            #game-container { height: 100vh; height: 100dvh; width: calc(100vh * 900 / 550); width: calc(100dvh * 900 / 550); }
        }
        
        canvas { display: block; width: 100%; height: 100%; z-index: 1; touch-action: none; image-rendering: auto; will-change: contents; }

        /* Effetti Visivi Ambientali */
        #screen-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; z-index: 8; opacity: 0; transition: opacity 0.05s ease-out; will-change: opacity; }
        #scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.1) 50%, rgba(0,0,0,0.1)); background-size: 100% 4px; pointer-events: none; z-index: 5; mix-blend-mode: overlay; }
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%); pointer-events: none; z-index: 6; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; }

        /* Top HUD */
        #top-hud { display: flex; justify-content: center; align-items: flex-start; padding: 15px; }
        #score-board {
            display: flex; justify-content: center; align-items: center; font-size: clamp(28px, 6vmin, 45px); font-weight: 900;
            background: rgba(5, 8, 12, 0.85); border: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 2px solid var(--p1-neon); padding: 5px 30px; backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); gap: 30px; pointer-events: auto; clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
            will-change: transform;
        }
        .score-p1 { color: var(--p1-neon); text-shadow: 0 0 15px rgba(0,255,102,0.6); }
        .score-p2 { color: #ffffff; text-shadow: 0 0 15px rgba(255,255,255,0.6); }
        #turn-indicator {
            font-family: 'Chakra Petch', sans-serif; font-size: clamp(12px, 3vmin, 16px); padding: 4px 10px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; justify-content: center; gap: 6px;
            transition: all 0.3s ease; min-width: 80px; border-radius: 2px;
        }

        /* Overlay Standard - AAA Glassmorphism */
        .overlay-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 6, 10, 0.9); border: 1px solid rgba(255, 255, 255, 0.1); border-top: 3px solid var(--p1-neon);
            padding: 20px 15px; text-align: center; pointer-events: auto; box-shadow: 0 20px 40px rgba(0,0,0,1);
            backdrop-filter: var(--panel-blur); -webkit-backdrop-filter: var(--panel-blur); width: 90%; max-width: 400px; z-index: 20; display: flex; flex-direction: column; align-items: center;
            max-height: 95vh; overflow-y: auto; -ms-overflow-style: none; scrollbar-width: none;
            clip-path: polygon(0 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            will-change: opacity, transform;
        }
        .overlay-screen::-webkit-scrollbar { display: none; }
        .hidden { display: none !important; pointer-events: none; }
        .overlay-screen h2 {
            margin: 0 0 10px 0; font-size: clamp(20px, 5vmin, 30px); text-transform: uppercase; letter-spacing: 3px; font-style: italic;
            background: linear-gradient(to right, #ffffff, #aaaaaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 2px 5px rgba(255,255,255,0.2));
        }

        #teams-scroll-area::-webkit-scrollbar { width: 4px; }
        #teams-scroll-area::-webkit-scrollbar-track { background: transparent; }
        #teams-scroll-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        /* Sponsor Bumper Broadcast TV con Sfondo Immagine Animato */
        #sponsor-bumper {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
            padding-bottom: 12vh; /* Testo spinto in basso per non coprire il logo centrale dello stadio */
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease;
            overflow: hidden;
        }
        #sponsor-bumper::before {
            content: '';
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            background-image: url('logoStadioVerticale.jpeg');
            background-size: cover; background-position: center;
            z-index: -1;
            will-change: transform, filter;
        }
        #sponsor-bumper.active { opacity: 1; pointer-events: auto; }
        #sponsor-bumper.active::before { animation: gentlePulse 1.5s infinite alternate ease-in-out; }
        
        .sponsor-title { font-family: 'Chakra Petch', sans-serif; font-size: clamp(26px, 7vmin, 50px); color: #ffffff; font-weight: 900; letter-spacing: 2px; text-align: center; text-transform: uppercase; text-shadow: 0 0 20px rgba(0,0,0,0.9), 0 4px 8px #000; margin-bottom: 15px; z-index: 1;}
        .sponsor-title span { color: #39FF14; text-shadow: 0 0 20px rgba(57,255,20,0.9), 0 4px 8px #000; }
        .sponsor-copy { font-family: 'Chakra Petch', sans-serif; font-size: clamp(12px, 3vmin, 18px); color: #fff; font-weight: 700; letter-spacing: 1px; text-align: center; text-transform: uppercase; background: rgba(0,0,0,0.8); padding: 8px 20px; border-radius: 4px; border: 1px solid var(--p1-neon); box-shadow: 0 0 15px rgba(0,255,102,0.3); z-index: 1; backdrop-filter: blur(5px);}

        @keyframes gentlePulse {
            0% { transform: scale(1); filter: brightness(1) contrast(1); }
            100% { transform: scale(1.05); filter: brightness(1.15) contrast(1.05); }
        }

        /* Griglia Selezione Modalità e Squadre */
        .mode-btn {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: #999;
            padding: 10px; font-size: 13px; font-family: 'Chakra Petch', sans-serif; font-weight: 700; letter-spacing: 1px;
            border-radius: 4px; cursor: pointer; flex: 1; transition: all 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); text-transform: uppercase;
        }
        .mode-btn.active { background: rgba(0, 255, 102, 0.15); border-color: var(--p1-neon); color: var(--p1-neon); text-shadow: 0 0 8px rgba(0,255,102,0.6); }

        .grid-options { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .team-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 4px; padding: 6px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px; transition: all 0.2s; width: 60px;
        }
        .team-btn .flag-container { width: 44px; height: 30px; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); position: relative; }
        .team-btn .flag-container::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to bottom, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0) 50%, rgba(0,0,0,0.6) 100%); mix-blend-mode: overlay; }
        .team-btn span { color: #888; font-family: 'Chakra Petch', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 1px; transition: color 0.3s; }
        @media (hover: hover) { .team-btn:hover { background: rgba(255, 255, 255, 0.08); } .team-btn:hover span { color: #fff; } }
        .team-btn.active { background: rgba(0, 255, 102, 0.1); border: 1px solid var(--p1-neon); }
        .team-btn.active span { color: var(--p1-neon); text-shadow: 0 0 8px rgba(0,255,102,0.6); }
        #p2-grid .team-btn.active { background: rgba(255, 0, 85, 0.1); border: 1px solid var(--p2-neon); }
        #p2-grid .team-btn.active span { color: var(--p2-neon); text-shadow: 0 0 8px rgba(255,0,85,0.6); }
        .flag { width: 100%; height: 100%; display: block; object-fit: cover; }

        /* Nuovo Tasto Play Logo Pulsante Più Elegante e Ridotto */
        .logo-start-btn {
            position: relative;
            background: radial-gradient(circle at center, rgba(5, 8, 12, 0.9) 0%, rgba(0, 0, 0, 1) 100%);
            border: 2px solid var(--p1-neon);
            border-radius: 50%;
            width: 80px; 
            height: 80px;
            cursor: pointer;
            pointer-events: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
            animation: pulse-logo-btn 1.2s infinite alternate ease-in-out;
            box-shadow: 0 0 20px rgba(0,255,102,0.4), inset 0 0 15px rgba(0,255,102,0.2);
            transition: transform 0.1s;
            outline: none;
            padding: 0;
            will-change: transform, box-shadow;
        }
        .logo-start-btn svg {
            width: 30px;
            height: 30px;
            filter: drop-shadow(0 0 5px rgba(0,255,102,0.5));
            margin-bottom: 2px;
        }
        .logo-start-btn span {
            font-family: 'Chakra Petch', sans-serif;
            color: var(--p1-neon);
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0,255,102,0.8);
        }
        .finger-icon {
            position: absolute;
            bottom: -5px;
            right: -10px;
            font-size: 30px; 
            animation: point-finger 0.8s infinite alternate ease-in-out;
            filter: drop-shadow(0 3px 5px rgba(0,0,0,0.8));
            pointer-events: none; 
            will-change: transform;
        }
        @keyframes pulse-logo-btn {
            0% { transform: scale(1); box-shadow: 0 0 10px rgba(0,255,102,0.3), inset 0 0 5px rgba(0,255,102,0.1); border-color: rgba(0,255,102,0.4); }
            100% { transform: scale(1.05); box-shadow: 0 0 30px rgba(0,255,102,0.9), inset 0 0 20px rgba(0,255,102,0.5); border-color: rgba(0,255,102,1); }
        }
        @keyframes point-finger {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-8px, -8px) scale(1.1); }
        }
        .logo-start-btn:active {
            animation: none;
            transform: scale(0.9) !important;
            box-shadow: 0 0 10px rgba(0,255,102,0.5);
        }

        /* Messaggi In-Game */
        #message {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: clamp(35px, 9vmin, 80px); font-weight: 900; font-style: italic; text-align: center; color: #fff; text-transform: uppercase; z-index: 10;
            text-shadow: 0 10px 30px rgba(0,0,0,0.9), 0 0 20px var(--accent-color, #00FF66); opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s;
            width: 100%; letter-spacing: 4px; will-change: opacity, transform;
        }
        #message.active { opacity: 1; transform: translate(-50%, -50%) scale(1); animation: glitchPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes glitchPop { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        /* Trophy - Metal Golden Cup with Engraved Logo */
        .cup-trophy-container {
            position: relative; width: 160px; height: 180px; margin: 0 auto 20px auto;
        }
        .cup-handle {
            position: absolute; top: 30px; width: 45px; height: 60px;
            border: 6px solid #DAA520; border-radius: 20px; z-index: 1;
            box-shadow: 0 5px 10px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,255,0.4);
        }
        .handle-left { left: 15px; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0;}
        .handle-right { right: 15px; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0;}
        .cup-bowl {
            position: absolute; top: 10px; left: 35px; width: 90px; height: 90px;
            background: linear-gradient(135deg, #FFDF00 0%, #FFF8A0 25%, #DAA520 50%, #B8860B 80%, #FFDF00 100%);
            border-radius: 5px 5px 45px 45px;
            box-shadow: inset -10px -10px 20px rgba(0,0,0,0.4), inset 5px 5px 15px rgba(255,255,255,0.8), 0 15px 20px rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center; z-index: 3;
            border-top: 5px solid #FFF8A0;
        }
        .cup-stem {
            position: absolute; top: 95px; left: 70px; width: 20px; height: 45px;
            background: linear-gradient(90deg, #B8860B, #FFF8A0, #DAA520);
            box-shadow: 0 10px 10px rgba(0,0,0,0.5); z-index: 2;
        }
        .cup-base-top {
            position: absolute; bottom: 25px; left: 45px; width: 70px; height: 15px;
            background: linear-gradient(90deg, #DAA520, #FFF8A0, #B8860B);
            border-radius: 10px 10px 0 0; z-index: 2;
        }
        .trophy-base {
            position: absolute; bottom: 0; left: 25px; right: 25px; height: 30px;
            background: linear-gradient(to right, #111, #333, #111);
            border-radius: 2px 2px 8px 8px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.9), inset 0 2px 5px rgba(255,255,255,0.2);
            display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px;
            border: 1px solid rgba(255,255,255,0.1); border-top: none; z-index: 2;
        }
        .base-plate {
            font-size: 8px; color: #fff; font-family: 'Chakra Petch', sans-serif; letter-spacing: 2px; font-weight: 700;
            background: #050505; padding: 2px 10px; border-radius: 2px; border: 1px solid rgba(255,255,255,0.2);
        }
        .cup-logo-inner {
            width: 48px; height: 48px;
            filter: drop-shadow(0 2px 3px rgba(0,0,0,0.6)); 
        }
        .cup-sparkle {
            position: absolute; width: 4px; height: 4px; background: white; border-radius: 50%;
            box-shadow: 0 0 8px 2px white, 0 0 15px 4px #FFDF00; opacity: 0; z-index: 4; pointer-events: none;
        }
        .s1 { top: 20px; left: 15px; animation: sparkleAnim 2s infinite 0s; }
        .s2 { top: 40px; right: 10px; animation: sparkleAnim 2.5s infinite 0.7s; }
        .s3 { bottom: 15px; left: 40px; animation: sparkleAnim 1.8s infinite 1.2s; }
        @keyframes sparkleAnim { 0% { transform: scale(0) rotate(0deg); opacity: 0; } 50% { transform: scale(1.5) rotate(180deg); opacity: 1; } 100% { transform: scale(0) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <!-- Libreria Vettoriale SVG in Linea per massima compatibilità -->
    <svg xmlns="http://www.w3.org/2000/svg" style="position: absolute; width: 1px; height: 1px; left: -9999px; top: -9999px; pointer-events: none;" aria-hidden="true">
        <defs>
            <linearGradient id="gradMetallic" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#e0e0e0"/>
                <stop offset="25%" stop-color="#ffffff"/>
                <stop offset="50%" stop-color="#999999"/>
                <stop offset="75%" stop-color="#cccccc"/>
                <stop offset="100%" stop-color="#666666"/>
            </linearGradient>
            
            <g id="betting-logo">
                <path d="M60,11.5 L64.5,21.5 A35,35 0 0,1 78.5,28.5 L88.5,24 L94,36 L85,42.5 A35,35 0 0,1 85,57.5 L94,64 L88.5,76 L78.5,71.5 A35,35 0 0,1 64.5,78.5 L60,88.5 L40,88.5 L35.5,78.5 A35,35 0 0,1 21.5,71.5 L11.5,76 L6,64 L15,57.5 A35,35 0 0,1 15,42.5 L6,36 L11.5,24 L21.5,28.5 A35,35 0 0,1 35.5,21.5 L40,11.5 Z" fill="url(#gradMetallic)"/>
                <circle cx="50" cy="50" r="24" fill="#000000"/>
                <path d="M 34 66 Q 45 40 66 34 Q 55 60 34 66 Z" fill="#39FF14"/>
            </g>
        </defs>
    </svg>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="screen-flash"></div> 
        <div id="scanlines"></div>
        <div id="vignette"></div>
        
        <!-- TV Broadcast Sponsor Bumper con Sfondo Immagine Animato -->
        <div id="sponsor-bumper">
            <div class="sponsor-title">BETTING <span>EXCHANGE</span> ROOM</div>
            <div class="sponsor-copy">Telegram Betting Exchange Signal Active</div>
        </div>

        <div id="ui-layer">
            <div id="top-hud">
                <div id="score-board">
                    <span id="score1" class="score-p1">0</span>
                    <div id="turn-indicator">⏳</div>
                    <span id="score2" class="score-p2">0</span>
                </div>
            </div>

            <!-- Menu Principale e Selezione -->
            <div id="team-menu" class="overlay-screen">
                <h2>🎮 SELECT MODE</h2>
                
                <!-- Indicatore First To 3 Wins super visibile e integrato nel design -->
                <div style="font-family: 'Chakra Petch', sans-serif; font-size: 13px; color: #fff; margin-bottom: 12px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,255,102,0.8); font-weight: 700; text-transform: uppercase; background: rgba(0,255,102,0.15); padding: 6px 20px; border-radius: 4px; border: 1px solid var(--p1-neon); box-shadow: 0 0 15px rgba(0,255,102,0.2);">
                    🏆 3 GOALS TO WIN
                </div>

                <div style="display:flex; width:100%; gap:8px; margin-bottom:10px;">
                    <button id="btn-1p" class="mode-btn active">1 PLAYER</button>
                    <button id="btn-2p" class="mode-btn">2 PLAYERS</button>
                </div>

                <div id="teams-scroll-area" style="width: 100%; max-height: 40vh; overflow-y: auto; margin-bottom: 10px; padding-right: 5px;">
                    <h3 style="margin:0 0 10px 0; font-size:12px; color:#00FF66; text-transform:uppercase; letter-spacing: 2px;">🟢 Player 1 Team</h3>
                    <div class="grid-options" id="p1-grid" style="margin-bottom: 10px;"></div>

                    <div id="p2-container" class="hidden" style="width:100%;">
                        <h3 style="margin:10px 0; font-size:12px; color:#FF0055; text-transform:uppercase; letter-spacing: 2px;">🔴 Player 2 Team</h3>
                        <div class="grid-options" id="p2-grid" style="margin-bottom: 5px;"></div>
                    </div>
                </div>

                <!-- Nuovo Bottone Play Logo -->
                <button id="start-btn" class="logo-start-btn">
                    <svg viewBox="0 0 100 100"><use href="#betting-logo"></use></svg>
                    <span>PLAY</span>
                    <div class="finger-icon">👆</div>
                </button>
            </div>

            <!-- Game Over -->
            <div id="game-over-screen" class="overlay-screen hidden">
                <h2 id="game-over-title" style="font-size: clamp(26px, 6vmin, 40px);">MATCH OVER</h2>
                <div id="game-over-icon" style="margin-bottom: 10px;"></div>
                
                <!-- Bottone Menu con lo stesso stile rotondo del tasto Play -->
                <button id="restart-btn" class="logo-start-btn" style="margin-top: 5px;">
                    <svg viewBox="0 0 100 100"><use href="#betting-logo"></use></svg>
                    <span>MENU</span>
                    <div class="finger-icon">👆</div>
                </button>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script>
        // --- PREVENZIONE GLITCH TOUCH ---
        window.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('touchmove', e => { if(e.cancelable) e.preventDefault(); }, { passive: false });

        // Costanti Logiche di Gioco
        const GAME_WIDTH = 600;
        const GAME_HEIGHT = 900;
        const PI2 = Math.PI * 2; 

        // --- SISTEMA DI RENDERING ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        
        function initDisplay() {
            // Capping DPR per ottimizzazione smartphone (max 2 per velocità pura)
            const dpr = Math.min(window.devicePixelRatio || 1, 2);
            canvas.width = GAME_WIDTH * dpr;
            canvas.height = GAME_HEIGHT * dpr;
            ctx.scale(dpr, dpr);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
        }
        
        initDisplay();
        window.addEventListener('resize', initDisplay);

        // Dati Squadre (Aggiunte le richieste e Messico alla fine)
        const teamNamesEn = { 
            'ITA': 'Italy', 'BRA': 'Brazil', 'ENG': 'England', 'ESP': 'Spain',
            'IRL': 'Ireland', 'ROU': 'Romania', 'AUS': 'Australia', 'COL': 'Colombia', 'PER': 'Peru', 'ALB': 'Albania',
            'MEX': 'Mexico' 
        };
        const flagsSVG = {

        // Array globale per proteggere la voce dal Garbage Collection su mobile/safari
        window.speechUtterances = []; 

        function initAudio() {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
            }
            if (audioCtx) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                return;
            }
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            audioCtx = new AudioContext();
            
            const bufferSize = audioCtx.sampleRate * 2;
            const noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) output[i] = Math.random() * 2 - 1;
            
            const noiseSource = audioCtx.createBufferSource();
            noiseSource.buffer = noiseBuffer; noiseSource.loop = true;

            const filter1 = audioCtx.createBiquadFilter();
            filter1.type = 'bandpass'; filter1.frequency.value = 350; filter1.Q.value = 0.8;
            const filter2 = audioCtx.createBiquadFilter();
            filter2.type = 'lowpass'; filter2.frequency.value = 800;

            crowdGainNode = audioCtx.createGain(); crowdGainNode.gain.value = 0.15; 

            const lfo = audioCtx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.15;
            const lfoGain = audioCtx.createGain(); lfoGain.gain.value = 0.05;
            
            lfo.connect(lfoGain); lfoGain.connect(crowdGainNode.gain); lfo.start();
            noiseSource.connect(filter1); filter1.connect(filter2); filter2.connect(crowdGainNode); crowdGainNode.connect(audioCtx.destination);
            noiseSource.start();
        }

        function commentatorSpeak(text, rate = 1.1, pitch = 1.1) {
            if ('speechSynthesis' in window) {
                // Rimosso il cancel() massivo per permettere frasi fluide senza interruzioni forzate dal browser
                let msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'en-US'; msg.rate = rate; msg.pitch = pitch; msg.volume = 1.0;
                
                window.speechUtterances.push(msg);
                msg.onend = function() { window.speechUtterances = window.speechUtterances.filter(u => u !== msg); };

                window.speechSynthesis.speak(msg);
            }
        }

        // Effetti sonori procedurali (Hit e Trombette da Stadio)
        function playImpactSound(intensity, isGoal = false) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            const filter = audioCtx.createBiquadFilter();
            const baseFreq = 528;
            
            if (isGoal) {
                // 1. Trombette da Stadio (Airhorn Synth)
                const horn1 = audioCtx.createOscillator();
                const horn2 = audioCtx.createOscillator();
                const hornGain = audioCtx.createGain();
                horn1.type = 'sawtooth'; horn2.type = 'sawtooth';
                horn1.frequency.value = 233; // Sib
                horn2.frequency.value = 238; // Detuning
                
                hornGain.gain.setValueAtTime(0, audioCtx.currentTime);
                hornGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 0.1);
                hornGain.gain.setValueAtTime(0.4, audioCtx.currentTime + 1.2);
                hornGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 2.0);
                
                horn1.connect(hornGain); horn2.connect(hornGain); hornGain.connect(audioCtx.destination);
                horn1.start(); horn2.start();
                horn1.stop(audioCtx.currentTime + 2.0); horn2.stop(audioCtx.currentTime + 2.0);

                // 2. Boato Esultanza Folla Aumentato
                if(crowdGainNode) {
                    crowdGainNode.gain.cancelScheduledValues(audioCtx.currentTime);
                    crowdGainNode.gain.setValueAtTime(0.8, audioCtx.currentTime); // Volume boato altissimo
                    crowdGainNode.gain.exponentialRampToValueAtTime(0.15, audioCtx.currentTime + 4);
                }
                
                // 3. Base Goal Boom
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(baseFreq * 2, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(baseFreq, audioCtx.currentTime + 0.5);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.3, audioCtx.currentTime + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            } else {
                // Hit Pallina
                osc.type = intensity > 15 ? 'square' : 'triangle';
                osc.frequency.setValueAtTime(baseFreq * 1.5, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(baseFreq, audioCtx.currentTime + 0.1);
                let vol = Math.min(intensity / 30, 0.4);
                gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.01);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            }

            filter.type = 'lowpass'; filter.frequency.setValueAtTime(2000, audioCtx.currentTime);
            if(!isGoal) filter.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.2);

            osc.connect(filter); filter.connect(gainNode); gainNode.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + (isGoal ? 2.0 : 0.3));
        }

        // --- OBJECT POOLING PER PARTICELLE (MAX PERFORMANCES) ---
        class FloatingText {
            constructor() { this.active = false; }
            spawn(x, y, text, color) { this.x = x; this.y = y; this.text = text; this.color = color; this.life = 1.0; this.vy = -1.5; this.active = true;}
            update() { if(!this.active) return; this.y += this.vy; this.life -= 0.02; if(this.life<=0) this.active = false; }
            draw(ctx) {
                if (!this.active) return;
                ctx.save(); ctx.globalAlpha = this.life;
                ctx.font = '900 24px Chakra Petch'; ctx.fillStyle = this.color; ctx.textAlign = 'center';
                ctx.shadowBlur = 10; ctx.shadowColor = this.color;
                let scale = 1 + (1 - this.life) * 0.5; ctx.translate(this.x, this.y); ctx.scale(scale, scale);
                ctx.fillText(this.text, 0, 0); ctx.restore();
            }
        }

        class Particle {
            constructor() { this.active = false; }
            spawn(x, y, color, speed, size, life) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * speed; this.vy = (Math.random() - 0.5) * speed;
                this.color = color; this.size = size; this.life = life; this.maxLife = life;
                this.active = true;
            }
            update() { if(!this.active) return; this.x += this.vx; this.y += this.vy; this.life--; this.size *= 0.95; if(this.life<=0) this.active=false; }
            draw(ctx) {
                if(!this.active) return;
                ctx.save(); ctx.globalAlpha = Math.max(0, this.life / this.maxLife); 
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, PI2); ctx.fill(); 
                ctx.restore();
            }
        }
        
        const MAX_PARTICLES = 80;

            ctx.fillStyle = '#000'; ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowOffsetY = 4; ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

            let rimGrad = ctx.createLinearGradient(x - radius, y - radius, x + radius, y + radius);
            rimGrad.addColorStop(0, '#555560'); rimGrad.addColorStop(0.5, '#111115'); rimGrad.addColorStop(1, '#2a2a35');
            ctx.fillStyle = rimGrad;
            ctx.beginPath(); ctx.arc(x, y, radius, 0, PI2); ctx.fill();

            ctx.lineWidth = 2.5; ctx.strokeStyle = teamColor;
            ctx.shadowBlur = 8; ctx.shadowColor = teamColor; 
            ctx.beginPath(); ctx.arc(x, y, radius * 0.88, 0, PI2); ctx.stroke();
            ctx.shadowBlur = 0;

            let coreGrad = ctx.createRadialGradient(x, y, 0, x, y, radius * 0.85);
            coreGrad.addColorStop(0, isDark ? '#111115' : '#22222a');
            coreGrad.addColorStop(1, '#050508');
            ctx.fillStyle = coreGrad;
            ctx.beginPath(); ctx.arc(x, y, radius * 0.85, 0, PI2); ctx.fill();
        }

            else if (teamCode === 'MEX') { ctx.fillStyle = '#006847'; ctx.fillRect(x - flagR, y - flagR, flagR*0.68, flagR*2); ctx.fillStyle = '#ffffff'; ctx.fillRect(x - flagR + flagR*0.66, y - flagR, flagR*0.68, flagR*2); ctx.fillStyle = '#CE1126'; ctx.fillRect(x - flagR + flagR*1.33, y - flagR, flagR*0.68, flagR*2); ctx.fillStyle = '#8B4513'; ctx.beginPath(); ctx.arc(x, y, flagR*0.25, 0, PI2); ctx.fill(); }
            ctx.globalAlpha = 1.0;

            let innerShad = ctx.createRadialGradient(x, y, flagR*0.5, x, y, flagR);
            innerShad.addColorStop(0, 'rgba(0,0,0,0)'); innerShad.addColorStop(1, 'rgba(0,0,0,0.8)');
            ctx.fillStyle = innerShad; ctx.fillRect(x - flagR, y - flagR, flagR*2, flagR*2);

            ctx.restore();
        }

        function drawAiToken(ctx, x, y, radius) {
            ctx.save(); 
            let isDrag = (dragTarget && dragTarget.x === x && dragTarget.y === y);
            
            ctx.beginPath(); ctx.arc(x, y, radius, 0, PI2);
            ctx.fillStyle = '#000'; ctx.shadowBlur = 10; ctx.shadowColor = 'rgba(0,0,0,0.8)'; ctx.shadowOffsetY = 4; ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;
            
            let rimGrad = ctx.createLinearGradient(x - radius, y - radius, x + radius, y + radius);
            rimGrad.addColorStop(0, '#e0e0e0'); rimGrad.addColorStop(0.25, '#ffffff'); rimGrad.addColorStop(0.5, '#999999'); rimGrad.addColorStop(0.75, '#cccccc'); rimGrad.addColorStop(1, '#666666');
            
            ctx.translate(x, y);
            const rOuter = radius * 0.95;
            const rValley = radius * 0.75;
            const teeth = 8;
            ctx.beginPath();
            for (let i = 0; i < teeth * 2; i++) {
                const angle = (i * Math.PI) / teeth;
                const r = (i % 2 === 0) ? rOuter : rValley;
                if (i === 0) ctx.moveTo(r * Math.cos(angle), r * Math.sin(angle));
                else ctx.lineTo(r * Math.cos(angle), r * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fillStyle = rimGrad;
            ctx.fill();

            if (isDrag) { ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke(); }

            ctx.beginPath(); ctx.arc(0, 0, radius * 0.5, 0, PI2);
            ctx.fillStyle = '#000000'; ctx.fill();

            ctx.beginPath();
            let l = radius * 0.35; 
            let w = radius * 0.15; 
            ctx.moveTo(-l, l);
            ctx.quadraticCurveTo(-w, -w, l, -l);
            ctx.quadraticCurveTo(w, w, -l, l);
            ctx.fillStyle = '#39FF14'; 
            ctx.fill();

            ctx.restore();
        }

        function drawField() {
            ctx.fillStyle = '#030408'; ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            for (let i = 0; i <= GAME_WIDTH; i += 60) { ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, GAME_HEIGHT); ctx.stroke(); }
            for (let i = 0; i <= GAME_HEIGHT; i += 60) { ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(GAME_WIDTH, i); ctx.stroke(); }

            ctx.save(); 
            ctx.lineCap = 'square'; ctx.lineJoin = 'miter';
            
            const drawNeonLines = (drawPathFunc, color, isP2) => {
                ctx.beginPath(); drawPathFunc();
                ctx.lineWidth = 6; ctx.strokeStyle = isP2 && gameMode===2 ? 'rgba(255,0,85,0.2)' : (isP2 ? 'rgba(255,255,255,0.1)' : 'rgba(0,255,102,0.2)'); ctx.stroke();
                ctx.lineWidth = 2; ctx.strokeStyle = color; ctx.stroke();
            };

            drawNeonLines(() => {
                ctx.rect(mSide, mTop, GAME_WIDTH - mSide * 2, GAME_HEIGHT - mTop - mBot);
                const midY = mTop + (GAME_HEIGHT - mTop - mBot) / 2;
                ctx.moveTo(mSide, midY); ctx.lineTo(GAME_WIDTH - mSide, midY);
                ctx.arc(GAME_WIDTH / 2, midY, 80, 0, PI2);
            }, 'rgba(255,255,255,0.15)', false);
            
            let p2Color = gameMode === 2 ? '#FF0055' : '#ffffff';
            drawNeonLines(() => {
                ctx.rect(GAME_WIDTH / 2 - 130, mTop, 260, 140);
                ctx.rect(GAME_WIDTH / 2 - 60, mTop, 120, 50);
            }, p2Color, true);

            drawNeonLines(() => {
                ctx.rect(GAME_WIDTH / 2 - 130, GAME_HEIGHT - mBot - 140, 260, 140);
                ctx.rect(GAME_WIDTH / 2 - 60, GAME_HEIGHT - mBot - 50, 120, 50);
            }, '#00FF66', false);

            const gx = GAME_WIDTH / 2 - goalWidth / 2;
            let p2Fill = gameMode === 2 ? 'rgba(255, 0, 85, 0.15)' : 'rgba(255, 255, 255, 0.15)';
            ctx.fillStyle = p2Fill; ctx.fillRect(gx, mTop - 20, goalWidth, 20); 
            ctx.lineWidth = 3; ctx.strokeStyle = p2Color; ctx.strokeRect(gx, mTop - 20, goalWidth, 20);
            
            ctx.fillStyle = 'rgba(0, 255, 102, 0.15)'; ctx.fillRect(gx, GAME_HEIGHT - mBot, goalWidth, 20); 
            ctx.strokeStyle = '#00FF66'; ctx.strokeRect(gx, GAME_HEIGHT - mBot, goalWidth, 20);
            
            ctx.restore();
        }

        class CircleEntity {
            constructor(x, y, radius, mass) { this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.radius = radius; this.mass = mass; }
            applyFriction(f) { this.vx *= f; this.vy *= f; }
            update() { this.x += this.vx; this.y += this.vy; }
        }

        class Player extends CircleEntity {
            constructor(x, y, isP1) { super(x, y, 26, 2.5); this.isP1 = isP1; this.startX = x; this.startY = y; } 
            resetPosition() { this.x = this.startX; this.y = this.startY; this.vx = 0; this.vy = 0; }
            draw(ctx) { 
                if (this.isP1) {
                    drawNationToken(ctx, this.x, this.y, this.radius, selectedTeamP1, true); 
                } else {
                    if (gameMode === 2) drawNationToken(ctx, this.x, this.y, this.radius, selectedTeamP2, false);
                    else drawAiToken(ctx, this.x, this.y, this.radius); 
                }
            }
        }

        class Ball extends CircleEntity {
            constructor(x, y) { super(x, y, 16, 0.8); this.trail = []; }
            update() {
                super.update(); let speed = Math.hypot(this.vx, this.vy);
                if (speed > 2) this.trail.push({x: this.x, y: this.y, life: 10, speed: speed});
                
                for (let i = this.trail.length - 1; i >= 0; i--) { 
                    this.trail[i].life--; 
                    if (this.trail[i].life <= 0) {
                        this.trail[i] = this.trail[this.trail.length - 1];
                        this.trail.pop();
                    } 
                }
            }
            draw(ctx) {
                ctx.save();
                
                let currentSpeed = Math.hypot(this.vx, this.vy);
                let isFireCore = currentSpeed > 18;
                let coreColor = isFireCore ? '#FF0055' : '#00FF66';
                let trailColor = isFireCore ? '255, 0, 85' : '0, 255, 102';
                
                if (this.trail.length > 1) {
                    ctx.globalCompositeOperation = 'lighter'; 
                    ctx.beginPath();
                    ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) {
                        ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    }
                    ctx.lineTo(this.x, this.y);
                    ctx.lineWidth = this.radius * 1.2;
                    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.strokeStyle = `rgba(${trailColor}, 0.2)`;
                    ctx.stroke();
                }
                
                ctx.globalCompositeOperation = 'source-over'; 
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.8, 0, PI2);
                ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 10; ctx.shadowColor = coreColor; ctx.fill();
                
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.3, 0, PI2); 
                ctx.fillStyle = coreColor; ctx.shadowBlur = 0; ctx.fill();
                ctx.restore();
            }
        }

        const team1 = [ new Player(300, 780, true), new Player(180, 660, true), new Player(420, 660, true), new Player(200, 520, true), new Player(400, 520, true) ];
        const team2 = [ new Player(300, 180, false), new Player(180, 300, false), new Player(420, 300, false), new Player(200, 430, false), new Player(400, 430, false) ];
        const ball = new Ball(300, 480);

        function updatePointerCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            pointer.x = (clientX - rect.left) * (GAME_WIDTH / rect.width);
            pointer.y = (clientY - rect.top) * (GAME_HEIGHT / rect.height);
        }

        function handlePointerDown(e) {
            if (activePointerId !== null || gameState !== GAME_STATE_PLAYING || isMoving || hitStopFrames > 0) return;
            updatePointerCoords(e.clientX, e.clientY);

            let activeTeam = null;
            if (currentTurn === 1) activeTeam = team1;
            else if (currentTurn === 2 && gameMode === 2) activeTeam = team2;

            if (!activeTeam) return;

            for (let p of activeTeam) {
                let dx = pointer.x - p.x, dy = pointer.y - p.y;
                if (dx * dx + dy * dy <= (p.radius * 3.5) ** 2) {
                    activePointerId = e.pointerId; 
                    try { canvas.setPointerCapture(e.pointerId); } catch(err){}
                    pointer.active = true;
                    dragTarget = p; dragTarget.dragStartX = p.x; dragTarget.dragStartY = p.y; dragTarget.vx = 0; dragTarget.vy = 0; break;
                }
            }
        }

        function handlePointerMove(e) { if (pointer.active && e.pointerId === activePointerId) updatePointerCoords(e.clientX, e.clientY); }

        function handlePointerUp(e) {
            if (e.pointerId === activePointerId) {
                if (dragTarget && pointer.active) {
                    let dx = dragTarget.dragStartX - dragTarget.x, dy = dragTarget.dragStartY - dragTarget.y;
                    isMoving = true; dragTarget.vx = dx * 0.45; dragTarget.vy = dy * 0.45; 
                    let color = currentTurn === 1 ? '#00FF66' : '#FF0055';
                    createExplosion(dragTarget.dragStartX, dragTarget.dragStartY, color, 12, 8, 4, 30);
                    triggerScreenShake(4, 3); dragTarget = null;
                }
                pointer.active = false; activePointerId = null;
                try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
            }
        }

        canvas.addEventListener('pointerdown', handlePointerDown);
        canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp);
        canvas.addEventListener('pointercancel', handlePointerUp);

        function updateTurnUI() {
            if (currentTurn === 1) {
                turnIndicatorEl.innerHTML = "P1 ◀"; turnIndicatorEl.style.color = "#00FF66"; turnIndicatorEl.style.borderColor = "rgba(0, 255, 102, 0.3)"; turnIndicatorEl.style.boxShadow = "0 0 15px rgba(0, 255, 102, 0.2)";
            } else {
                if (gameMode === 2) {
                    turnIndicatorEl.innerHTML = "▶ P2"; turnIndicatorEl.style.color = "#FF0055"; turnIndicatorEl.style.borderColor = "rgba(255, 0, 85, 0.3)"; turnIndicatorEl.style.boxShadow = "0 0 15px rgba(255, 0, 85, 0.2)";
                } else {
                    turnIndicatorEl.innerHTML = `▶ CPU`; turnIndicatorEl.style.color = "#ffffff"; turnIndicatorEl.style.borderColor = "rgba(255, 255, 255, 0.3)"; turnIndicatorEl.style.boxShadow = "0 0 15px rgba(255, 255, 255, 0.2)";
                }
            }
        }

        function switchTurn() {
            if (gameState !== GAME_STATE_PLAYING) return;
            currentTurn = currentTurn === 1 ? 2 : 1; aiTimer = 40; updateTurnUI();
        }

        function resetPositions() {
            ball.x = GAME_WIDTH / 2; ball.y = 480; ball.vx = 0; ball.vy = 0;
            team1.forEach(p => p.resetPosition()); team2.forEach(p => p.resetPosition());
            dragTarget = null; isMoving = false; hitStopFrames = 0; updateTurnUI();
        }

        function forceStopAll(entities) { entities.forEach(e => { e.vx = 0; e.vy = 0; }); }

        function handleAI() {
            if (gameState !== GAME_STATE_PLAYING || currentTurn !== 2 || isMoving || gameMode === 2) return;
            aiTimer--;
            if (aiTimer <= 0) {
                let bestPlayer = null, minDist = Infinity;
                for (let p of team2) {
                    let d = Math.hypot(ball.x - p.x, ball.y - p.y);
                    if (p.y < ball.y - 15) d *= 0.5; 
                    if (d < minDist) { minDist = d; bestPlayer = p; }
                }
                if (bestPlayer) { 
                    let dx = ball.x - bestPlayer.x, dy = ball.y - bestPlayer.y;
                    let errorMargin = 15; 
                    dx += (Math.random() - 0.5) * errorMargin; dy += (Math.random() - 0.5) * errorMargin;
                    let dist = Math.hypot(dx, dy);
                    let powerMultiplier = 3.0;
                    let maxPwr = 28; 
                    let power = Math.min((dist / powerMultiplier), maxPwr); 
                    bestPlayer.vx = (dx / dist) * power; bestPlayer.vy = (dy / dist) * power;
                    isMoving = true; aiTimer = 60;
                    createExplosion(bestPlayer.x, bestPlayer.y, '#ffffff', 10, 8, 4, 25);
                }
            }
        }

        function resolveCollision(e1, e2) {
            let dx = e2.x - e1.x, dy = e2.y - e1.y;
            let dist = Math.hypot(dx, dy), minDist = e1.radius + e2.radius;
            if (dist < minDist) {
                let overlap = minDist - dist, nx = dx / dist, ny = dy / dist;
                let totalMass = e1.mass + e2.mass, m1Ratio = e2.mass / totalMass, m2Ratio = e1.mass / totalMass;
                e1.x -= nx * overlap * m1Ratio; e1.y -= ny * overlap * m1Ratio;
                e2.x += nx * overlap * m2Ratio; e2.y += ny * overlap * m2Ratio;
                
                let kx = (e1.vx - e2.vx), ky = (e1.vy - e2.vy);
                let p = (1 + 0.8) * (nx * kx + ny * ky) / totalMass;
                e1.vx -= p * e2.mass * nx; e1.vy -= p * e2.mass * ny;
                e2.vx += p * e1.mass * nx; e2.vy += p * e1.mass * ny;
                
                let imp = Math.abs(p);
                if (imp > 5) {
                    playImpactSound(imp); 
                    let c = (e1===ball||e2===ball) ? '#00FF66' : '#ffffff';
                    createExplosion(e1.x + nx * e1.radius, e1.y + ny * e1.radius, c, Math.min(imp, 15), imp, 3, 20);
                    
                    if (imp > 20) {
                        triggerScreenShake(10, imp * 0.4); hitStopFrames = 4; triggerFlash(0.4); 
                        spawnText(e1.x + nx*e1.radius, e1.y + ny*e1.radius, impactWords[Math.floor(Math.random()*impactWords.length)], '#FF0055');
                    } else if (imp > 10) {
                        triggerScreenShake(4, imp * 0.2); 
                        spawnText(e1.x + nx*e1.radius, e1.y + ny*e1.radius, "CLANG!", '#ffffff');
                    }
                }
            }
        }

        function updatePhysics() {
            if (dragTarget && pointer.active) {
                let dx = pointer.x - dragTarget.dragStartX, dy = pointer.y - dragTarget.dragStartY;
                let dist = Math.hypot(dx, dy);
                if (dist > maxDragPull) { dx = (dx / dist) * maxDragPull; dy = (dy / dist) * maxDragPull; }
                dragTarget.x = dragTarget.dragStartX + dx; dragTarget.y = dragTarget.dragStartY + dy;
            }

            const allEnt = [...team1, ...team2, ball];
            for (let e of allEnt) {
                if (e === dragTarget) continue;
                e.applyFriction(e === ball ? ballFriction : friction);
                if (e === ball) { let s = Math.hypot(ball.vx, ball.vy); if (s > maxBallSpeed) { ball.vx = (ball.vx/s)*maxBallSpeed; ball.vy = (ball.vy/s)*maxBallSpeed; } }
                e.update();
            }

            let isAnythingMoving = false;
            for (let e of allEnt) { if (Math.hypot(e.vx, e.vy) > 0.25) { isAnythingMoving = true; break; } }

            if (isMoving && !isAnythingMoving && !dragTarget) {
                forceStopAll(allEnt); isMoving = false; switchTurn();
            } else if (!isMoving && isAnythingMoving) { isMoving = true; }

            for (let i = 0; i < allEnt.length; i++) {
                for (let j = i + 1; j < allEnt.length; j++) {
                    if (allEnt[i] === dragTarget || allEnt[j] === dragTarget) continue;
                    resolveCollision(allEnt[i], allEnt[j]);
                }
            }

            [...team1, ...team2, ball].forEach(p => {
                if (p.x < p.radius + mSide) { p.x = p.radius + mSide; p.vx *= -0.5; }
                if (p.x > GAME_WIDTH - p.radius - mSide) { p.x = GAME_WIDTH - p.radius - mSide; p.vx *= -0.5; }
            });

            [...team1, ...team2].forEach(p => {
                if (p.y < p.radius + mTop) { p.y = p.radius + mTop; p.vy *= -0.5; }
                if (p.y > GAME_HEIGHT - p.radius - mBot) { p.y = GAME_HEIGHT - p.radius - mBot; p.vy *= -0.5; }
            });

            const gx1 = GAME_WIDTH/2 - goalWidth/2, gx2 = GAME_WIDTH/2 + goalWidth/2;
            
            if (gameState !== GAME_STATE_GOAL && gameState !== GAME_STATE_OVER) {
                if (ball.y < ball.radius + mTop) {
                    if (ball.x > gx1 && ball.x < gx2) { scoreGoal(1); } 
                    else { ball.y = ball.radius + mTop; ball.vy *= -0.8; }
                }
                else if (ball.y > GAME_HEIGHT - ball.radius - mBot) {
                    if (ball.x > gx1 && ball.x < gx2) { scoreGoal(2); } 
                    else { ball.y = GAME_HEIGHT - ball.radius - mBot; ball.vy *= -0.8; }
                }
            } else {
                if (ball.y < ball.radius + mTop) { ball.y = ball.radius + mTop; ball.vy *= -0.8; }
                if (ball.y > GAME_HEIGHT - ball.radius - mBot) { ball.y = GAME_HEIGHT - ball.radius - mBot; ball.vy *= -0.8; }
            }
        }

        function scoreGoal(playerScored) {
            gameState = GAME_STATE_GOAL; isMoving = false; 
            hitStopFrames = 20; triggerFlash(1); triggerScreenShake(30, 15); 
            forceStopAll([...team1, ...team2, ball]);
            playImpactSound(30, true); 

            if (playerScored === 1) {
                scoreP1++; score1El.innerText = scoreP1; currentTurn = 2; 
                createExplosion(GAME_WIDTH / 2, mTop, '#00FF66', 40, 30, 8, 150);
                showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', '#00FF66');
                commentatorSpeak(`GOOOOOOOOOOOOOOAL!!! ${teamNamesEn[selectedTeamP1]} scores!`, 1.3, 1.4);
            } else {
                scoreP2++; score2El.innerText = scoreP2; currentTurn = 1;
                let color = gameMode === 2 ? '#FF0055' : '#ffffff';
                createExplosion(GAME_WIDTH / 2, GAME_HEIGHT - mBot, color, 40, 30, 8, 150);
                
                if (gameMode === 2) {
                    showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', '#FF0055');
                    commentatorSpeak(`GOOOOOOOOOOOOOOAL!!! ${teamNamesEn[selectedTeamP2]} scores!`, 1.3, 1.4);
                } else {
                    showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', '#ffffff');
                    commentatorSpeak(`GOOOOOOOOOOOOOOAL!!! The System scores!`, 1.3, 0.8);
                }
            }
            updateTurnUI();

            if (scoreP1 >= 3 || scoreP2 >= 3) {

                setTimeout(() => {

                    const goldCupHTML = `
                        <div class="cup-trophy-container">
                            <div class="cup-handle handle-left"></div>
                            <div class="cup-handle handle-right"></div>
                            <div class="cup-stem"></div>
                            <div class="cup-base-top"></div>
                            <div class="trophy-base">
                                <div class="base-plate">CHAMPION</div>
                            </div>
                            <div class="cup-bowl">
                                <svg class="cup-logo-inner" viewBox="0 0 100 100"><use href="#betting-logo"></use></svg>
                                <div class="cup-sparkle s1"></div>
                                <div class="cup-sparkle s2"></div>
                                <div class="cup-sparkle s3"></div>
                            </div>
                        </div>
                    `;

                    if (winner === 1) {
                        gameState = GAME_STATE_OVER; gameOverTitleEl.innerText = "PLAYER 1 WINS!"; gameOverTitleEl.style.color = "#00FF66";
                        gameOverIconEl.innerHTML = goldCupHTML; gameOverScreenEl.classList.remove('hidden');
                    } else {

                }, 2500);

            }

        function drawSlingshotLine() {
            if (dragTarget && pointer.active) {
                let dx = dragTarget.dragStartX - dragTarget.x, dy = dragTarget.dragStartY - dragTarget.y;
                let pullDist = Math.hypot(dx, dy);
                let rgb = currentTurn === 1 ? '0, 255, 102' : '255, 0, 85';
                
                ctx.save(); 
                ctx.beginPath(); ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY); ctx.lineTo(dragTarget.x, dragTarget.y);
                
                ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff'; ctx.stroke();
                
                let grad = ctx.createLinearGradient(dragTarget.dragStartX, dragTarget.dragStartY, dragTarget.x, dragTarget.y);
                grad.addColorStop(0, `rgba(${rgb}, 0.9)`); grad.addColorStop(1, `rgba(${rgb}, 0)`);
                ctx.strokeStyle = grad; ctx.lineWidth = 6 + (pullDist / maxDragPull) * 10; ctx.shadowBlur = 10; ctx.shadowColor = `rgb(${rgb})`; ctx.lineCap = 'round'; ctx.stroke();
                
                ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, 8, 0, PI2); ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 0; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = '#ffffff';
                ctx.beginPath(); ctx.moveTo(dragTarget.dragStartX - 16, dragTarget.dragStartY); ctx.lineTo(dragTarget.dragStartX + 16, dragTarget.dragStartY); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY - 16); ctx.lineTo(dragTarget.dragStartX, dragTarget.dragStartY + 16); ctx.stroke();
                
                ctx.restore();
            }
        }

        // --- GAME LOOP ---
        function drawStaticBackground() {
            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            drawField();
            team1.forEach(p => p.draw(ctx)); team2.forEach(p => p.draw(ctx)); ball.draw(ctx);

        window.gameLoopRunning = false;

        function gameLoop(time) {
            if(!window.gameLoopRunning) return;
            requestAnimationFrame(gameLoop);

            if (!lastTime) lastTime = time;
            let dt = time - lastTime; lastTime = time;
            if (dt > 250) dt = 250; 
            accumulator += dt;

            while (accumulator >= timeStep) {
                if (shakeTime > 0) shakeTime--;
                if (hitStopFrames > 0) { hitStopFrames--; } 
                else { handleAI(); updatePhysics(); }

                for (let i = 0; i < particlePool.length; i++) { particlePool[i].update(); }
                for (let i = 0; i < textPool.length; i++) { textPool[i].update(); }
                accumulator -= timeStep;
            }

            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); 
            ctx.save();
            if (shakeTime > 0) ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
            
            drawField(); 
            for (let i = 0; i < particlePool.length; i++) { particlePool[i].draw(ctx); }
            drawSlingshotLine(); 
            team1.forEach(p => p.draw(ctx)); team2.forEach(p => p.draw(ctx)); ball.draw(ctx);
            for (let i = 0; i < textPool.length; i++) { textPool[i].draw(ctx); }
            
            ctx.restore();
        }

        updateTurnUI();
        
        // Disegna una prima volta statico così non vedi sfondo nero dietro al menu
        setTimeout(drawStaticBackground, 100);

    </script>
</body>
</html>
