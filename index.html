<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Soccer Pong - Verde vs Grigio</title>
    <!-- Importazione Font da Gaming -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #39FF14;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            
            /* Ottimizzazioni Mobile e App-like */
            touch-action: none;
            overscroll-behavior: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }

        /* SVG Icon Utilities */
        .icon {
            width: 1em;
            height: 1em;
            vertical-align: middle;
            display: inline-block;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            -webkit-filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }
        
        .icon.medal {
            width: 1.5em;
            height: 1.5em;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
            -webkit-filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 30px rgba(57, 255, 20, 0.2), inset 0 0 10px rgba(57, 255, 20, 0.1); }
            100% { box-shadow: 0 0 70px rgba(57, 255, 20, 0.6), inset 0 0 20px rgba(57, 255, 20, 0.3); }
        }

        /* Formula per proporzioni perfette su ogni dispositivo senza tagli */
        #game-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * (550 / 900));
            max-width: calc(100vh * (900 / 550));
            max-height: 100vh;
            
            box-shadow: 0 0 50px rgba(57, 255, 20, 0.3);
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #39FF14;
            box-sizing: border-box;
            animation: neonPulse 2s infinite alternate;
        }

        canvas {
            display: block;
            background-color: #080a0c;
            width: 100%;
            height: 100%;
        }

        /* Scanlines per Effetto Monitor da Gaming */
        #scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.5) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.7;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        #top-hud {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 10px 20px;
            z-index: 10;
        }

        #balance-board {
            font-size: clamp(16px, 4vmin, 28px);
            font-weight: 900;
            color: #FFD700;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #FFD700;
            padding: 5px 15px;
            border-radius: 4px;
            text-shadow: 0 0 10px #FFD700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.3);
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            transition: transform 0.1s, color 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            pointer-events: auto;
        }

        #score-board {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(30px, 6vmin, 54px);
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            gap: 5vw;
        }

        .score-p1 { color: #39FF14; text-shadow: 0 0 15px #39FF14, 0 0 30px #39FF14; }
        .score-p2 { color: #ffffff; text-shadow: 0 0 15px #ffffff, 0 0 30px #a8a9ad; }

        #turn-indicator {
            font-size: clamp(16px, 3.5vmin, 28px);
            padding: 5px 25px;
            border: 2px solid #39FF14;
            background: linear-gradient(90deg, rgba(0,0,0,0.9), rgba(10,30,10,0.8), rgba(0,0,0,0.9));
            text-align: center;
            color: #39FF14;
            min-width: 120px;
            text-shadow: 0 0 10px #39FF14;
            transition: all 0.3s ease;
            -webkit-clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%);
            clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(30px, 7vmin, 70px);
            font-weight: 900;
            font-style: italic;
            text-align: center;
            background: repeating-linear-gradient(45deg, rgba(5,5,5,0.95), rgba(5,5,5,0.95) 10px, rgba(15,25,15,0.95) 10px, rgba(15,25,15,0.95) 20px);
            padding: 5% 8%;
            width: 80%;
            max-width: 600px;
            border: 2px solid #39FF14;
            color: #39FF14;
            transition: opacity 0.3s;
            text-transform: uppercase;
            box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.3), 0 0 30px rgba(57, 255, 20, 0.5);
            z-index: 10;
            -webkit-clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            text-shadow: 0 0 15px #39FF14;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .hidden {
            opacity: 0;
            pointer-events: none !important;
        }

        .overlay-screen {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, 0);
            background: rgba(0, 15, 0, 0.9);
            border: 2px solid #39FF14;
            padding: 20px;
            text-align: center;
            z-index: 15;
            transition: opacity 0.3s;
            pointer-events: auto;
            -webkit-clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.15), 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            width: 85%;
            max-width: 600px;
        }

        .overlay-screen h3 {
            margin-top: 0;
            color: #39FF14;
            font-size: clamp(24px, 5vmin, 40px);
            text-shadow: 0 0 10px #39FF14;
            border-bottom: 1px solid rgba(57, 255, 20, 0.4);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .grid-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .cyber-btn {
            background: linear-gradient(135deg, rgba(20, 30, 20, 0.8), rgba(0, 0, 0, 0.9));
            color: #aaa;
            border: 1px solid rgba(57, 255, 20, 0.3);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: clamp(20px, 3.5vmin, 28px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }

        /* Effetto Riflesso Laser sui Bottoni */
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(57, 255, 20, 0.5), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        @media (hover: hover) {
            .cyber-btn:hover::before {
                left: 150%;
            }

            .cyber-btn:hover {
                border-color: #39FF14;
                color: #ffffff;
                box-shadow: 0 0 20px rgba(57,255,20,0.5), inset 0 0 15px rgba(57,255,20,0.3);
                transform: translateY(-3px) scale(1.05);
                background: linear-gradient(135deg, rgba(30, 60, 30, 0.9), rgba(0, 20, 0, 0.9));
            }
            
            .cyber-btn.bet-amount:hover {
                border-color: #FFD700;
                box-shadow: 0 0 20px rgba(255,215,0,0.5), inset 0 0 15px rgba(255,215,0,0.3);
                background: linear-gradient(135deg, rgba(60, 50, 0, 0.9), rgba(20, 15, 0, 0.9));
            }
        }

        .cyber-btn.active {
            background: rgba(57, 255, 20, 0.25);
            color: #ffffff;
            border: 2px solid #39FF14;
            text-shadow: 0 0 12px #39FF14;
            box-shadow: 0 0 25px rgba(57,255,20,0.7), inset 0 0 25px rgba(57,255,20,0.5);
            transform: scale(1.1);
            z-index: 2;
        }

        .cyber-btn.bet-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            width: 150px;
        }

        .cyber-btn.bet-item span {
            font-size: 16px;
            color: #FFD700;
            margin-top: 8px;
            text-shadow: 0 0 5px rgba(255, 215, 0, 0.5);
        }

        .cyber-btn.bet-amount {
            color: #FFD700;
            border-color: rgba(255, 215, 0, 0.4);
            background: linear-gradient(135deg, rgba(30, 25, 0, 0.8), rgba(0, 0, 0, 0.9));
        }

        .cyber-btn.bet-amount.active {
            background: rgba(255, 215, 0, 0.25);
            color: #ffffff;
            border-color: #FFD700;
            text-shadow: 0 0 12px #FFD700;
            box-shadow: 0 0 25px rgba(255,215,0,0.7), inset 0 0 25px rgba(255,215,0,0.5);
        }

        .flag-icon {
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
            -webkit-filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
            font-size: 1.2em;
        }

        #controls-info {
            text-align: center;
            padding: 10px;
            font-size: clamp(16px, 3.5vmin, 24px);
            color: #39FF14;
            background: linear-gradient(180deg, rgba(57,255,20,0.1) 0%, rgba(0,0,0,0.9) 100%);
            border-top: 2px solid #39FF14;
            z-index: 10;
        }

        #bracket-screen, #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: opacity 0.3s;
            pointer-events: auto;
        }

        .stage-box {
            font-size: clamp(30px, 8vmin, 60px);
            margin: 15px;
            padding: 15px 30px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #111;
            color: #555;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        .stage-box.active {
            border-color: #39FF14;
            color: #39FF14;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.4);
            background: rgba(57, 255, 20, 0.1);
            transform: scale(1.1);
        }

        .stage-box.passed {
            border-color: #aaa;
            color: #aaa;
        }

        .action-btn {
            margin-top: 20px;
            font-size: clamp(30px, 6vmin, 50px);
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #39FF14;
            color: #39FF14;
            padding: 10px 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
            transition: all 0.1s;
            pointer-events: auto;
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            font-family: inherit;
        }

        @media (hover: hover) {
            .action-btn:hover {
                background: rgba(57, 255, 20, 0.2);
                box-shadow: 0 0 30px rgba(57, 255, 20, 0.6);
            }
        }

        .action-btn:active {
            transform: scale(0.9);
        }

    </style>
</head>
<body>

    <!-- Definizione Libreria SVG per Loghi Aziendali e Medaglie -->
    <svg style="display: none;">
        <defs>
            <radialGradient id="gradMetallic" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="50%" stop-color="#a8a9ad"/>
                <stop offset="100%" stop-color="#444444"/>
            </radialGradient>
            <radialGradient id="gradBronze" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffcda5"/>
                <stop offset="50%" stop-color="#cd7f32"/>
                <stop offset="100%" stop-color="#5c3a16"/>
            </radialGradient>
            <radialGradient id="gradSilver" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="50%" stop-color="#e0e0e0"/>
                <stop offset="100%" stop-color="#888888"/>
            </radialGradient>
            <radialGradient id="gradGold" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffcc"/>
                <stop offset="50%" stop-color="#ffd700"/>
                <stop offset="100%" stop-color="#996500"/>
            </radialGradient>

            <polygon id="gear-shape" points="100,50 84.6,64.3 85.3,85.3 64.3,84.6 50,100 35.7,84.6 14.7,85.3 15.4,64.3 0,50 15.4,35.7 14.7,14.7 35.7,15.4 50,0 64.3,15.4 85.3,14.7 84.6,35.7"/>
            <circle id="gear-inner" cx="50" cy="50" r="30" fill="#000000"/>
            <ellipse id="gear-leaf" cx="50" cy="50" rx="22.5" ry="6" fill="#39FF14" transform="rotate(-45 50 50)"/>

            <g id="gear-metallic">
                <use href="#gear-shape" fill="url(#gradMetallic)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
            <g id="gear-bronze">
                <use href="#gear-shape" fill="url(#gradBronze)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
            <g id="gear-silver">
                <use href="#gear-shape" fill="url(#gradSilver)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
            <g id="gear-gold">
                <use href="#gear-shape" fill="url(#gradGold)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
        </defs>
    </svg>

    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
        <div id="ui-layer">
            <div id="scanlines"></div>
            <div id="top-hud">
                <div id="balance-board"><svg class="icon"><use href="#gear-metallic"></use></svg> <span id="balance-val">1000</span></div>
                <div id="score-board">
                    <span id="score1" class="score-p1">0</span>
                    <div id="turn-indicator">🟢 ◀</div>
                    <span id="score2" class="score-p2">0</span>
                </div>
                <div style="width: 100px;"></div>
            </div>

            <!-- Menu Scommesse -->
            <div id="bet-menu" class="overlay-screen hidden">
                <h3>⚖️ <svg class="icon"><use href="#gear-metallic"></use></svg></h3>
                
                <div style="color: #FFD700; margin-bottom: 10px; font-size: 20px;">👇 🎯</div>
                <div class="grid-options" id="bet-types">
                    <button class="cyber-btn bet-item active" data-type="win_p1" data-base-odds="1.5">
                        <div>🟢 🏆</div>
                        <span id="odds-win">x1.5</span>
                    </button>
                    <button class="cyber-btn bet-item" data-type="lay_p2" data-base-odds="1.8">
                        <div>🚫 <svg class="icon"><use href="#gear-metallic"></use></svg></div>
                        <span id="odds-lay">x1.8</span>
                    </button>
                    <button class="cyber-btn bet-item" data-type="over_7" data-base-odds="2.5">
                        <div>⚽ 📈 >7</div>
                        <span id="odds-over">x2.5</span>
                    </button>
                    <button class="cyber-btn bet-item" data-type="perfect" data-base-odds="10.0">
                        <div>🛡️ 5️⃣-0️⃣</div>
                        <span id="odds-perf">x10.0</span>
                    </button>
                    <button class="cyber-btn bet-item" data-type="none" data-base-odds="0">
                        <div>❌ <svg class="icon"><use href="#gear-metallic"></use></svg></div>
                        <span>---</span>
                    </button>
                </div>

                <div style="color: #FFD700; margin-bottom: 10px; font-size: 20px;">👇 <svg class="icon"><use href="#gear-metallic"></use></svg></div>
                <div class="grid-options" id="bet-amounts">
                    <button class="cyber-btn bet-amount active" data-amount="10"><svg class="icon"><use href="#gear-metallic"></use></svg> 10</button>
                    <button class="cyber-btn bet-amount" data-amount="50"><svg class="icon"><use href="#gear-metallic"></use></svg> 50</button>
                    <button class="cyber-btn bet-amount" data-amount="100"><svg class="icon"><use href="#gear-metallic"></use></svg> 100</button>
                    <button class="cyber-btn bet-amount" data-amount="all"><svg class="icon"><use href="#gear-metallic"></use></svg> MAX</button>
                </div>

                <button id="confirm-bet-btn" class="action-btn">🤝 ▶️</button>
            </div>

            <!-- Menu Squadre -->
            <div id="team-menu" class="overlay-screen">
                <h3>🏳️</h3>
                <div class="grid-options">
                    <button class="cyber-btn active" data-team="ITA"><span class="flag-icon">🇮🇹</span></button>
                    <button class="cyber-btn" data-team="MEX"><span class="flag-icon">🇲🇽</span></button>
                    <button class="cyber-btn" data-team="BRA"><span class="flag-icon">🇧🇷</span></button>
                    <button class="cyber-btn" data-team="ENG"><span class="flag-icon">🇬🇧</span></button>
                    <button class="cyber-btn" data-team="ESP"><span class="flag-icon">🇪🇸</span></button>
                </div>
                <button id="start-btn" class="action-btn">▶️</button>
            </div>

            <!-- Tabellone / Bracket con Medaglie Aziendali -->
            <div id="bracket-screen" class="hidden">
                <h2 style="color: #39FF14; font-size: clamp(40px, 8vmin, 60px); margin: 0 0 20px 0; text-shadow: 0 0 20px #39FF14;">🏆</h2>
                <div id="stage-1" class="stage-box">1️⃣ <svg class="icon medal"><use href="#gear-bronze"></use></svg></div>
                <div id="stage-2" class="stage-box">2️⃣ <svg class="icon medal"><use href="#gear-silver"></use></svg></div>
                <div id="stage-3" class="stage-box">3️⃣ <svg class="icon medal"><use href="#gear-gold"></use></svg></div>
                <button id="next-match-btn" class="action-btn hidden">▶️</button>
            </div>

            <!-- Game Over -->
            <div id="game-over-screen" class="hidden">
                <div id="game-over-icon" style="font-size: clamp(80px, 15vmin, 120px); filter: drop-shadow(0 0 20px #39FF14); margin-bottom: 20px;"></div>
                <div id="final-balance" style="font-size: 30px; color: #FFD700; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;"></div>
                <button id="restart-btn" class="action-btn">🔄</button>
            </div>

            <!-- Messaggi in Gioco -->
            <div id="message" class="hidden"></div>
            
            <div id="controls-info">
                👆 ↔️ 🟢 🚀
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const messageEl = document.getElementById('message');
        const turnIndicatorEl = document.getElementById('turn-indicator');
        const teamMenuEl = document.getElementById('team-menu');
        const betMenuEl = document.getElementById('bet-menu');
        const bracketScreenEl = document.getElementById('bracket-screen');
        const gameOverScreenEl = document.getElementById('game-over-screen');
        const gameOverIconEl = document.getElementById('game-over-icon');
        const nextMatchBtn = document.getElementById('next-match-btn');
        const balanceBoard = document.getElementById('balance-board');
        const balanceVal = document.getElementById('balance-val');
        const finalBalanceEl = document.getElementById('final-balance');

        // Impostazioni di gioco
        const GAME_STATE_MENU = 0;
        const GAME_STATE_BRACKET = 1;
        const GAME_STATE_BETTING = 2;
        const GAME_STATE_PLAYING = 3;
        const GAME_STATE_GOAL = 4;
        const GAME_STATE_OVER = 5;
        let gameState = GAME_STATE_MENU;

        // Gestione Campionato & Scommesse
        let currentStage = 1;
        const maxStages = 3;
        let coins = 1000;
        let activeBet = null;
        let selectedBetType = 'win_p1';
        let selectedBetAmount = 10;

        // Gestione Turni
        let currentTurn = 1; 
        let isMoving = false; 

        // Parametri Campo & Fisica
        const goalHeight = 160;
        const goalWidth = 20;
        let particles = [];

        function resolveBet(winner) {

        // Disegna Logo Aziendale su Canvas
        function drawGearLogo(ctx, x, y, radius) {
            ctx.save();
            let gradient = ctx.createRadialGradient(x-radius*0.2, y-radius*0.2, 1, x, y, radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.5, '#a8a9ad');
            gradient.addColorStop(1, '#444444');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            const teeth = 8;
            const outerRadius = radius;
            const innerRadius = radius * 0.75;
            for (let i = 0; i < teeth * 2; i++) {
                const angle = (i * Math.PI) / teeth;
                const r = i % 2 === 0 ? outerRadius : innerRadius;
                if (i === 0) ctx.moveTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                else ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            ctx.translate(x, y);
            ctx.rotate(-Math.PI / 4); 
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * 0.45, radius * 0.12, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#39FF14';
            ctx.fill();

            ctx.restore();
        }

        // Disegna maglia nazionale
        function drawJersey(ctx, x, y, radius, teamCode) {
            const team = teamsData[teamCode] || teamsData['ITA'];
            ctx.save();
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI*2);
            ctx.clip();

            if (team.type === 'stripes') {
                ctx.fillStyle = team.secondary;
                ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
                ctx.fillStyle = team.primary;
                for (let i = -radius; i < radius; i += 12) {
                    ctx.fillRect(x + i, y - radius, 6, radius * 2);
                }
            } else if (team.type === 'cross') {
                ctx.fillStyle = team.primary;
                ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
                ctx.fillStyle = team.secondary;
                ctx.fillRect(x - radius, y - 3, radius * 2, 6);
                ctx.fillRect(x - 3, y - radius, 6, radius * 2);
            } else {
                ctx.fillStyle = team.primary;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, y, radius * 0.4, 0, Math.PI*2);
                ctx.strokeStyle = team.secondary;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            let gloss = ctx.createLinearGradient(x - radius, y - radius, x + radius, y + radius);
            gloss.addColorStop(0, 'rgba(255,255,255,0.4)');
            gloss.addColorStop(0.5, 'rgba(255,255,255,0.0)');
            ctx.fillStyle = gloss;
            ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);

            ctx.restore();
        }

        function updatePointer(e) {
            const rect = canvas.getBoundingClientRect();
            // Compatibilità API PointerEvent
            if (e.clientX !== undefined && e.clientY !== undefined) {
                pointer.x = (e.clientX - rect.left) * (canvas.width / rect.width);
                pointer.y = (e.clientY - rect.top) * (canvas.height / rect.height);
            }
        }

        function startDrag() {
            if (gameState !== GAME_STATE_PLAYING || currentTurn !== 1 || isMoving) return;

            for (let p of team1) {
                let dx = pointer.x - p.x;
                let dy = pointer.y - p.y;
                if (dx * dx + dy * dy <= p.radius * p.radius) {
                    dragTarget = p;
                    dragTarget.dragStartX = p.x;
                    dragTarget.dragStartY = p.y;
                    dragTarget.vx = 0;
                    dragTarget.vy = 0;
                    break;
                }
            }
        }

        function endDrag() {
            if (dragTarget && pointer.active) {
                let dx = dragTarget.dragStartX - dragTarget.x;

                isMoving = true;
                dragTarget.vx = dx * 0.35;

            pointer.active = true;

        canvas.addEventListener('pointermove', (e) => {

        class Particle {
            constructor(x, y, color, speed, size, life) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
                this.color = color;
                this.size = size;
                this.life = life;
                this.maxLife = life;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                this.size *= 0.95;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color, amount, speed, size, life) {
            for (let i = 0; i < amount; i++) {
                particles.push(new Particle(x, y, color, speed, size, life));
            }
        }

        function triggerScreenShake(duration, magnitude) {

        class CircleEntity {
            constructor(x, y, radius, mass) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.radius = radius;
                this.mass = mass;
            }

            applyFriction(f) {
                this.vx *= f;
                this.vy *= f;
                if (Math.abs(this.vx) < 0.05) this.vx = 0;
                if (Math.abs(this.vy) < 0.05) this.vy = 0;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
            }
        }

        class Player extends CircleEntity {
            constructor(x, y, isP1) {
                super(x, y, 22, 2.5);
                this.isP1 = isP1;
                this.startX = x;
                this.startY = y;
            }

            resetPosition() {
                this.x = this.startX;
                this.y = this.startY;
                this.vx = 0;
                this.vy = 0;
            }

            draw(ctx) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius + 3, 0, Math.PI * 2);
                if (dragTarget === this) {
                    ctx.fillStyle = '#ffffff';
                    ctx.shadowBlur = 25;
                    ctx.shadowColor = '#ffffff';
                } else {
                    ctx.fillStyle = this.isP1 ? 'rgba(57, 255, 20, 0.3)' : 'rgba(255, 255, 255, 0.3)';
                    ctx.shadowBlur = 15;
                    ctx.shadowColor = this.isP1 ? '#39FF14' : '#ffffff';
                }
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isP1 ? '#111' : '#222';
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = this.isP1 ? '#39FF14' : '#888';
                ctx.stroke();
                
                if (this.isP1) {
                    drawJersey(ctx, this.x, this.y, this.radius * 0.75, selectedTeam);
                } else {
                    drawGearLogo(ctx, this.x, this.y, this.radius * 0.85);
                }

                ctx.restore();
            }
        }

        class Ball extends CircleEntity {
            constructor(x, y) {
                super(x, y, 14, 0.8);
                this.trail = [];
            }

            update() {
                super.update();
                let speed = Math.hypot(this.vx, this.vy);
                if (speed > 3) {
                    this.trail.push({x: this.x, y: this.y, life: 10});
                }
                for (let i = this.trail.length - 1; i >= 0; i--) {
                    this.trail[i].life--;
                    if (this.trail[i].life <= 0) this.trail.splice(i, 1);
                }
            }

            draw(ctx) {
                ctx.save();
                
                this.trail.forEach((t) => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, this.radius * (t.life / 10), 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(57, 255, 20, ${t.life / 20})`;
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#39FF14';
                    ctx.fill();
                });

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                
                let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(0.5, '#aaffaa');
                grad.addColorStop(1, '#39FF14');
                
                ctx.fillStyle = grad;
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#39FF14';
                ctx.fill();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();

                ctx.restore();
            }
        }

        function drawField() {
            ctx.fillStyle = '#080a0c';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Griglia Animata 
            let time = performance.now() / 40;
            ctx.lineWidth = 1;
            ctx.strokeStyle = 'rgba(57, 255, 20, 0.15)';
            
            let offsetX = (time / 2) % 40;
            for(let i = -40 + offsetX; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            
            let offsetY = time % 40;
            for(let i = -40 + offsetY; i < canvas.height; i += 40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            ctx.save();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#39FF14';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#39FF14';

            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);

            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 20);
            ctx.lineTo(canvas.width / 2, canvas.height - 20);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 70, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#39FF14';
            ctx.fill();

            ctx.strokeRect(20, canvas.height / 2 - 140, 120, 280);
            ctx.strokeRect(20, canvas.height / 2 - 60, 40, 120);
            
            ctx.strokeRect(canvas.width - 140, canvas.height / 2 - 140, 120, 280);
            ctx.strokeRect(canvas.width - 60, canvas.height / 2 - 60, 40, 120);

            const goalYStart = canvas.height / 2 - goalHeight / 2;
            
            ctx.fillStyle = 'rgba(57, 255, 20, 0.1)';
            ctx.fillRect(0, goalYStart, 20, goalHeight);
            ctx.strokeRect(0, goalYStart, 20, goalHeight);

            ctx.strokeStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(canvas.width - 20, goalYStart, 20, goalHeight);
            ctx.strokeRect(canvas.width - 20, goalYStart, 20, goalHeight);

            ctx.restore();
        }

        function handleAI() {
            if (gameState !== GAME_STATE_PLAYING || currentTurn !== 2 || isMoving) return;
            
            aiTimer--;
            if (aiTimer <= 0) {
                let bestPlayer = null;
                let minDist = Infinity;
                
                for (let p of team2) {
                    let d = Math.hypot(ball.x - p.x, ball.y - p.y);
                    if (p.x > ball.x - 15) d *= 0.6; 
                    
                    if (d < minDist) { 
                        minDist = d; 
                        bestPlayer = p; 
                    }
                }
                
                if (bestPlayer) { 
                    let dx = ball.x - bestPlayer.x;
                    let dy = ball.y - bestPlayer.y;
                    
                    let errorMargin = 40 - (currentStage * 10); 
                    dx += (Math.random() - 0.5) * errorMargin;
                    dy += (Math.random() - 0.5) * errorMargin;

                    let dist = Math.sqrt(dx * dx + dy * dy);
                    
                    let powerMultiplier = 5.5 - (currentStage * 0.8);
                    let maxPower = 18 + (currentStage * 3); 
                    let power = Math.min((dist / powerMultiplier), maxPower); 
                    
                    bestPlayer.vx = (dx / dist) * power;
                    bestPlayer.vy = (dy / dist) * power;
                    
                    isMoving = true;
                    aiTimer = 60 - (currentStage * 10);
                    
                    createExplosion(bestPlayer.x, bestPlayer.y, '#ffffff', 8, 5, 3, 20);
                }
            }
        }

        function resolveCollision(entity1, entity2) {
            let dx = entity2.x - entity1.x;
            let dy = entity2.y - entity1.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            let minDist = entity1.radius + entity2.radius;

            if (distance < minDist) {
                let overlap = minDist - distance;
                let nx = dx / distance;
                let ny = dy / distance;

                let totalMass = entity1.mass + entity2.mass;
                let m1Ratio = entity2.mass / totalMass;
                let m2Ratio = entity1.mass / totalMass;

                entity1.x -= nx * overlap * m1Ratio;
                entity1.y -= ny * overlap * m1Ratio;
                entity2.x += nx * overlap * m2Ratio;
                entity2.y += ny * overlap * m2Ratio;

                let kx = (entity1.vx - entity2.vx);
                let ky = (entity1.vy - entity2.vx);
                
                let restitution = 0.8; 
                let p = (1 + restitution) * (nx * kx + ny * ky) / totalMass;
                
                entity1.vx -= p * entity2.mass * nx;
                entity1.vy -= p * entity2.mass * ny;
                entity2.vx += p * entity1.mass * nx;
                entity2.vy += p * entity1.mass * ny;

                let impactSpeed = Math.abs(p);
                if (impactSpeed > 5) {
                    let impactX = entity1.x + nx * entity1.radius;
                    let impactY = entity1.y + ny * entity1.radius;
                    let color = (entity1 === ball || entity2 === ball) ? '#39FF14' : '#ffffff';
                    
                    createExplosion(impactX, impactY, color, Math.min(impactSpeed * 2, 15), impactSpeed, 3, 20);
                    if (impactSpeed > 12) triggerScreenShake(6, impactSpeed * 0.3); 
                }
            }
        }

        function checkAnyMovement(entities) {
            for (let e of entities) {
                if (Math.hypot(e.vx, e.vy) > 0.05) return true;
            }
            return false;
        }

        function updatePhysics() {
            if (gameState !== GAME_STATE_PLAYING) return;

            if (dragTarget && pointer.active) {
                let dx = pointer.x - dragTarget.dragStartX;
                let dy = pointer.y - dragTarget.dragStartY;
                let dist = Math.hypot(dx, dy);
                let maxPull = 100;

                if (dist > maxPull) {
                    dx = (dx / dist) * maxPull;
                    dy = (dy / dist) * maxPull;
                }

                dragTarget.x = dragTarget.dragStartX + dx;
                dragTarget.y = dragTarget.dragStartY + dy;
            }

            const allEntities = [...team1, ...team2, ball];

            for (let entity of allEntities) {
                if (entity === dragTarget) continue;

                if (entity === ball) entity.applyFriction(ballFriction);
                else entity.applyFriction(friction);
                
                if (entity === ball) {
                    let speed = Math.hypot(ball.vx, ball.vy);
                    if (speed > maxBallSpeed) {
                        ball.vx = (ball.vx / speed) * maxBallSpeed;
                        ball.vy = (ball.vy / speed) * maxBallSpeed;
                    }
                }
                
                entity.update();
            }

            let currentlyMoving = checkAnyMovement(allEntities);
            if (isMoving && !currentlyMoving && !dragTarget) {
                isMoving = false;
                switchTurn();
            } else if (!isMoving && currentlyMoving) {
                isMoving = true;
            }

            for (let i = 0; i < allEntities.length; i++) {
                for (let j = i + 1; j < allEntities.length; j++) {
                    if (allEntities[i] === dragTarget || allEntities[j] === dragTarget) continue;
                    resolveCollision(allEntities[i], allEntities[j]);
                }
            }

            [...team1, ...team2].forEach(p => {
                if (p.x < p.radius + 20) { p.x = p.radius + 20; p.vx *= -0.5; }
                if (p.x > canvas.width - p.radius - 20) { p.x = canvas.width - p.radius - 20; p.vx *= -0.5; }
                if (p.y < p.radius + 20) { p.y = p.radius + 20; p.vy *= -0.5; }
                if (p.y > canvas.height - p.radius - 20) { p.y = canvas.height - p.radius - 20; p.vy *= -0.5; }
            });

            if (ball.y < ball.radius + 20) { ball.y = ball.radius + 20; ball.vy *= -0.8; }
            if (ball.y > canvas.height - ball.radius - 20) { ball.y = canvas.height - ball.radius - 20; ball.vy *= -0.8; }

            const goalYStart = canvas.height / 2 - goalHeight / 2;
            const goalYEnd = canvas.height / 2 + goalHeight / 2;

            if (ball.x < ball.radius + 20) {
                if (ball.y > goalYStart && ball.y < goalYEnd) {
                    scoreGoal(2); 
                } else {
                    ball.x = ball.radius + 20;
                    ball.vx *= -0.8;
                }
            }
            
            if (ball.x > canvas.width - ball.radius - 20) {
                if (ball.y > goalYStart && ball.y < goalYEnd) {
                    scoreGoal(1); 
                } else {
                    ball.x = canvas.width - ball.radius - 20;
                    ball.vx *= -0.8;
                }
            }
        }

        function scoreGoal(playerScored) {
            gameState = GAME_STATE_GOAL;
            isMoving = false; 
            triggerScreenShake(20, 8); 

            if (playerScored === 1) {
                scoreP1++;
                score1El.innerText = scoreP1;
                currentTurn = 2; 
                createExplosion(canvas.width - 20, canvas.height/2, '#39FF14', 150, 18, 5, 80);
                showMessage(`<div>⚽ 🟢</div>`);
            } else {
                scoreP2++;
                score2El.innerText = scoreP2;
                currentTurn = 1;
                createExplosion(20, canvas.height/2, '#ffffff', 150, 18, 5, 80);
                showMessage(`<div>⚽ <svg class="icon" style="font-size:1.2em;"><use href="#gear-metallic"></use></svg></div>`);
            }
            
            updateTurnUI();

            if (scoreP1 >= 5 || scoreP2 >= 5) {
                let winner = scoreP1 >= 5 ? 1 : 2;
                let betResultMsg = resolveBet(winner); 

                setTimeout(() => {
                    if (winner === 1) {
                        if (currentStage >= maxStages) {
                            gameState = GAME_STATE_OVER;
                            gameOverIconEl.innerHTML = `🏆 <svg class="icon"><use href="#gear-gold"></use></svg> 🏆`;
                            finalBalanceEl.innerHTML = `<svg class="icon"><use href="#gear-metallic"></use></svg> ${Math.floor(coins)}`;
                            gameOverScreenEl.classList.remove('hidden');
                        } else {
                            showMessage(`<div>🏆 🟢</div><div style="font-size: 0.5em;">${betResultMsg}</div>`);
                            setTimeout(() => {
                                currentStage++;
                                showBracket();
                            }, 2500);
                        }
                    } else {
                        gameState = GAME_STATE_OVER;
                        gameOverIconEl.innerHTML = `💀 <svg class="icon"><use href="#gear-metallic"></use></svg>`;
                        finalBalanceEl.innerHTML = `<svg class="icon"><use href="#gear-metallic"></use></svg> ${Math.floor(coins)}`;
                        gameOverScreenEl.classList.remove('hidden');
                    }
                }, 1500);
            } else {
                setTimeout(() => {
                    if (gameState === GAME_STATE_GOAL) {
                        resetPositions();
                        gameState = GAME_STATE_PLAYING;
                        showMessage("");
                    }
                }, 2000);
            }
        }

        function drawSlingshot() {
            if (dragTarget && pointer.active && currentTurn === 1) {
                let dx = dragTarget.dragStartX - dragTarget.x;
                let dy = dragTarget.dragStartY - dragTarget.y;
                let pullDist = Math.hypot(dx, dy);

                ctx.beginPath();
                ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY);
                ctx.lineTo(dragTarget.x, dragTarget.y);
                ctx.strokeStyle = 'rgba(57, 255, 20, 0.5)';
                ctx.lineWidth = 6;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, 5, 0, Math.PI*2);
                ctx.fillStyle = '#39FF14';
                ctx.fill();

                if (pullDist > 10) {
                    ctx.fillStyle = 'rgba(57, 255, 20, 0.8)';
                    for (let i = 1; i <= 6; i++) {
                        let projX = dragTarget.dragStartX + (dx * 0.8 * i);
                        let projY = dragTarget.dragStartY + (dy * 0.8 * i);
                        ctx.beginPath();
                        ctx.arc(projX, projY, Math.max(1, 8 - i), 0, Math.PI*2);
                        ctx.fill();
                    }
                }
            }
        }

        function gameLoop() {
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            
            if (shakeTime > 0) {
                let dx = (Math.random() - 0.5) * shakeMagnitude;
                let dy = (Math.random() - 0.5) * shakeMagnitude;
                ctx.translate(dx, dy);
                shakeTime--;
                shakeMagnitude *= 0.9;
            }

            drawField();
            handleAI();
            updatePhysics();

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            drawSlingshot(); 

            team1.forEach(p => p.draw(ctx));
            team2.forEach(p => p.draw(ctx));
            ball.draw(ctx);

            ctx.restore();

            requestAnimationFrame(gameLoop);
        }

        updateTurnUI();
        requestAnimationFrame(gameLoop);

    </script>
</body>
</html>
