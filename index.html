<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    
    <!-- OTTIMIZZAZIONI DI CARICAMENTO -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:ital,wght@0,400;0,700;1,700&family=Montserrat:ital,wght@0,700;0,900;1,900&display=swap" rel="stylesheet">
    
    <title>CyberTorneo - Telegram Edition</title>
    <style>
        :root {
            --p1-neon: #00FF66;
            --p2-neon: #FF0055;
            --bg-dark: #224a10; 
            --bg-outer: #010102;
        }

        * { -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; outline: none; box-sizing: border-box; }

        body {
            margin: 0; padding: 0; background: var(--bg-outer);
            color: #fff; font-family: 'Montserrat', sans-serif;
            height: 100vh; height: 100dvh; width: 100vw; overflow: hidden; touch-action: none; overscroll-behavior: none;
        }

        #game-container {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh;
            background-color: var(--bg-outer);
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            -webkit-transform: translateZ(0); transform: translateZ(0); will-change: transform;
        }
        
        #game-wrapper {
            position: relative; background-color: var(--bg-dark);
            overflow: hidden; 
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }
        
        canvas, #screen-flash, #ui-layer, #sponsor-bumper, .overlay-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        
        canvas { z-index: 1; touch-action: none; image-rendering: auto; }

        #screen-flash { background: white; pointer-events: none; z-index: 8; opacity: 0; transition: opacity 0.05s ease-out; will-change: opacity; }
        #ui-layer { pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; z-index: 10; }

        #top-hud { display: flex; justify-content: center; align-items: flex-start; padding: 15px; }
        
        #score-board {
            display: flex; justify-content: center; align-items: center; font-size: clamp(20px, 5vmin, 32px); font-weight: 900;
            background: rgba(5, 8, 12, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); border-bottom: 2px solid var(--p1-neon); padding: 5px 15px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.8); gap: 12px; pointer-events: auto; clip-path: polygon(15px 0, 100% 0, calc(100% - 15px) 100%, 0 100%);
            -webkit-transform: translateZ(0); transform: translateZ(0); margin-top: -1px; transition: border-bottom-color 1s ease;
        }
        
        .sb-flag-container { width: 36px; height: 24px; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; background: #000; }
        .sb-flag-container svg { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        #timer-display {
            font-family: 'Chakra Petch', sans-serif; font-size: 20px; font-weight: 900;
            background: rgba(0, 0, 0, 0.8); border: 1px solid rgba(255, 255, 255, 0.2); border-bottom: none;
            padding: 4px 20px; border-radius: 4px 4px 0 0; color: #fff;
            margin-bottom: 0; z-index: 1; position: relative;
        }

        @keyframes pulse-timer { 0% { transform: scale(1); text-shadow: 0 0 10px #FF0055; } 100% { transform: scale(1.1); text-shadow: 0 0 25px #FF0055, 0 0 10px #FF0055; } }
        .timer-danger { color: #FF0055 !important; animation: pulse-timer 0.8s infinite alternate ease-in-out; }

        .score-p1 { color: var(--p1-neon); min-width: 25px; text-align: center; }
        .score-p2 { color: #ffffff; min-width: 25px; text-align: center; transition: color 1s, text-shadow 1s; }
        #turn-indicator {
            font-family: 'Chakra Petch', sans-serif; font-size: clamp(10px, 2.5vmin, 14px); padding: 4px 8px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            color: #888; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; gap: 4px;
            transition: all 0.3s ease; min-width: 90px; border-radius: 2px;
        }

        .overlay-screen { background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; -webkit-transform: translateZ(0); transform: translateZ(0); }
        
        .overlay-content {
            background: linear-gradient(145deg, #0f121b 0%, #050609 100%);
            border: 1px solid rgba(255, 255, 255, 0.06); border-top: 1px solid rgba(255, 255, 255, 0.15); border-bottom: 3px solid var(--p1-neon);
            border-radius: 16px; padding: 20px 10px; text-align: center; pointer-events: auto; box-shadow: 0 25px 50px rgba(0,0,0,0.9);
            width: 95%; max-width: 400px; display: flex; flex-direction: column; align-items: center;
        }

        .hidden { display: none !important; }

        /* Stile comune per i video orizzontali arrotondati */
        .inline-video-box {
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9; /* Mantiene le proporzioni originali per non schiacciare l'immagine */
            max-height: 160px; /* Limite per non prendere troppo schermo */
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            pointer-events: none;
            background-color: #000;
        }

        #teams-scroll-area { width: 100%; max-height: 34vh; overflow-y: auto; margin-bottom: 10px; -webkit-overflow-scrolling: touch; touch-action: pan-y; scrollbar-width: none; }
        #teams-scroll-area::-webkit-scrollbar { display: none; }

        /* NUOVI STILI PER IL LAYOUT A COLONNE */
        #teams-flex-container {
            display: flex;
            width: 100%;
            gap: 8px;
            justify-content: center;
            align-items: flex-start;
        }
        .team-column {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .team-title {
            margin: 5px 0 8px 0; 
            font-size: 11px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
            white-space: nowrap;
        }

        #sponsor-bumper { background-color: #030408; opacity: 0; pointer-events: none; transition: opacity 0.8s ease; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #sponsor-bumper.active { opacity: 1; pointer-events: auto; }
        .sponsor-content { text-align: center; transform: translateY(15px); opacity: 0; transition: all 1s cubic-bezier(0.25, 1, 0.5, 1) 0.3s; text-shadow: 0 4px 15px rgba(0,0,0,0.8); }
        #sponsor-bumper.active .sponsor-content { transform: translateY(0); opacity: 1; }
        .sponsor-subtitle { font-family: 'Montserrat', sans-serif; font-size: clamp(10px, 3vmin, 14px); letter-spacing: 6px; color: #ffffff; margin-bottom: 5px; text-transform: uppercase; }
        .sponsor-divider { width: 0; height: 2px; background: linear-gradient(90deg, transparent, #2AABEE, transparent); margin: 15px auto; transition: width 1.5s cubic-bezier(0.25, 1, 0.5, 1) 0.8s; }
        #sponsor-bumper.active .sponsor-divider { width: 150px; }
        .sponsor-title { font-family: 'Chakra Petch', sans-serif; font-size: clamp(26px, 7vmin, 50px); color: #ffffff; font-weight: 900; letter-spacing: 4px; line-height: 1.1; text-transform: uppercase; text-shadow: 0 10px 30px rgba(0,0,0,1); }
        .sponsor-title span { color: #2AABEE; }

        .mode-btn { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.08); color: #888; padding: 10px; font-size: 12px; font-family: 'Chakra Petch', sans-serif; font-weight: 700; letter-spacing: 1px; border-radius: 8px; cursor: pointer; flex: 1; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); text-transform: uppercase; }
        .mode-btn.active { background: rgba(0, 255, 102, 0.12); border-color: var(--p1-neon); color: var(--p1-neon); }

        /* OPZIONI SQUADRE RIDIMENSIONATE PER SMARTPHONE */
        .grid-options { display: flex; gap: 4px; flex-wrap: wrap; justify-content: center; width: 100%; padding: 0 2px;}
        .team-btn { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 6px; padding: 4px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); width: 38px; }
        .team-btn .flag-container { width: 26px; height: 18px; border-radius: 3px; overflow: hidden; border: 1px solid rgba(255,255,255,0.15); position: relative; }
        .team-btn span { color: #888; font-family: 'Chakra Petch', sans-serif; font-size: 7px; font-weight: 700; letter-spacing: 0.5px; transition: color 0.3s; }
        @media (hover: hover) { .team-btn:hover { background: rgba(255, 255, 255, 0.08); } .team-btn:hover span { color: #fff; } }
        .team-btn.active { background: rgba(0, 255, 102, 0.1); border: 1px solid var(--p1-neon); }
        .team-btn.active span { color: var(--p1-neon); }
        #p2-grid .team-btn.active { background: rgba(255, 0, 85, 0.1); border: 1px solid var(--p2-neon); }
        #p2-grid .team-btn.active span { color: var(--p2-neon); }
        .flag { width: 100%; height: 100%; display: block; object-fit: cover; }

        .joystick-btn-only { background: transparent; border: none; box-shadow: none; cursor: pointer; pointer-events: auto; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-top: 5px; outline: none; padding: 0; -webkit-tap-highlight-color: transparent; }
        .joystick-btn-only svg { width: 55px; height: 55px; filter: drop-shadow(0 0 10px rgba(0,255,102,0.4)); animation: pulse-joystick 2.5s infinite alternate ease-in-out; will-change: transform, filter; }
        @keyframes pulse-joystick { 0% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(0,255,102,0.2)); } 100% { transform: scale(1.08); filter: drop-shadow(0 0 20px rgba(0,255,102,0.6)); } }
        .joystick-btn-only:active svg { transform: scale(0.9) !important; animation: none; }

        #message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: clamp(35px, 9vmin, 80px); font-weight: 900; font-style: italic; text-align: center; color: #fff; text-transform: uppercase; z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.2s, transform 0.2s; width: 100%; letter-spacing: 4px; will-change: opacity, transform; text-shadow: 0 5px 15px rgba(0,0,0,0.8); }
        #message.active { opacity: 1; transform: translate(-50%, -50%) scale(1); animation: glitchPop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes glitchPop { 0% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

        .cup-trophy-container { position: relative; width: 160px; height: 180px; margin: 0 auto 20px auto; }
        .cup-handle { position: absolute; top: 30px; width: 45px; height: 60px; border: 6px solid #DAA520; border-radius: 20px; z-index: 1; }
        .handle-left { left: 15px; border-right: none; border-top-right-radius: 0; border-bottom-right-radius: 0;}
        .handle-right { right: 15px; border-left: none; border-top-left-radius: 0; border-bottom-left-radius: 0;}
        .cup-bowl { position: absolute; top: 10px; left: 35px; width: 90px; height: 90px; background: #FFDF00; border-radius: 5px 5px 45px 45px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; z-index: 3; border-top: 6px solid #FFF8A0; overflow: hidden; }
        .cup-band { width: 100%; height: 8px; background: #DAA520; margin-top: 20px; }
        .cup-stem { position: absolute; top: 95px; left: 70px; width: 20px; height: 45px; background: #DAA520; z-index: 2; }
        .cup-base-top { position: absolute; bottom: 25px; left: 45px; width: 70px; height: 15px; background: #B8860B; border-radius: 10px 10px 0 0; z-index: 2; }
        .trophy-base { position: absolute; bottom: 0; left: 25px; right: 25px; height: 30px; background: #222; border-radius: 2px 2px 8px 8px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 6px; z-index: 2; }
        .base-plate { font-size: 8px; color: #fff; font-family: 'Chakra Petch', sans-serif; letter-spacing: 2px; font-weight: 700; background: #050505; padding: 2px 10px; border-radius: 2px; }
    </style>
</head>
<body>

    <svg xmlns="http://www.w3.org/2000/svg" style="position: absolute; width: 1px; height: 1px; left: -9999px; top: -9999px; pointer-events: none;" aria-hidden="true">
        <defs>
            <g id="gamepad-icon">
                <path d="M 15 45 C 15 30 25 25 40 25 L 60 25 C 75 25 85 30 85 45 C 85 65 90 75 75 75 C 65 75 60 60 50 60 C 40 60 35 75 25 75 C 10 75 15 65 15 45 Z" fill="#222" stroke="#555" stroke-width="2"/>
                <path d="M 27 45 h 10 m -5 -5 v 10" stroke="#111" stroke-width="4.5" stroke-linecap="round"/>
                <path d="M 27 45 h 10 m -5 -5 v 10" stroke="#888" stroke-width="2.5" stroke-linecap="round"/>
                <circle cx="38" cy="58" r="6" fill="#151515" stroke="#444" stroke-width="1.5"/>
                <circle cx="62" cy="58" r="6" fill="#151515" stroke="#444" stroke-width="1.5"/>
                <circle cx="70" cy="45" r="3.5" fill="#39FF14"/>
                <circle cx="78" cy="37" r="3.5" fill="#FF0055"/>
                <circle cx="62" cy="37" r="3.5" fill="#1E90FF"/>
                <circle cx="70" cy="29" r="3.5" fill="#FFD700"/>
            </g>
        </defs>
    </svg>

    <div id="game-container">
        <div id="game-wrapper">
            <canvas id="gameCanvas"></canvas>
            <div id="screen-flash"></div> 
            
            <div id="sponsor-bumper" class="hidden">
                <div class="sponsor-content">
                    <div class="sponsor-subtitle">POWERED BY</div>
                    <div class="sponsor-divider"></div>
                    <div class="sponsor-title">TELEGRAM<br><span>NETWORK</span></div>
                </div>
            </div>

            <div id="ui-layer">
                <div id="top-hud">
                    <div style="display: flex; flex-direction: column; align-items: center;">
                        <div id="timer-display">03:00</div>
                        <div id="score-board">
                            <div id="sb-flag-1" class="sb-flag-container"></div>
                            <span id="score1" class="score-p1">0</span>
                            <div id="turn-indicator">⏳</div>
                            <span id="score2" class="score-p2">0</span>
                            <div id="sb-flag-2" class="sb-flag-container"></div>
                        </div>
                    </div>
                </div>

                <div id="team-menu" class="overlay-screen">
                    <div class="overlay-content">
                        
                        <!-- Video Menu -->
                        <video id="menu-video" class="inline-video-box" src="itcyborgscommettestake.mp4" autoplay loop muted playsinline webkit-playsinline></video>

                        <div style="display:flex; width:100%; gap:8px; margin-bottom:10px;">
                            <button id="btn-1p" class="mode-btn active">1 PLAYER</button>
                            <button id="btn-2p" class="mode-btn">2 PLAYERS</button>
                        </div>

                        <!-- Layout a Colonne per la selezione squadre -->
                        <div id="teams-scroll-area">
                            <div id="teams-flex-container">
                                <div class="team-column" id="p1-column">
                                    <h3 class="team-title" style="color:#00FF66;">🟢 P1 Team</h3>
                                    <div class="grid-options" id="p1-grid"></div>
                                </div>

                                <div class="team-column hidden" id="p2-column">
                                    <h3 class="team-title" style="color:#FF0055;">🔴 P2 Team</h3>
                                    <div class="grid-options" id="p2-grid"></div>
                                </div>
                            </div>
                        </div>

                        <button id="start-btn" class="joystick-btn-only">
                            <svg viewBox="0 0 100 100"><use href="#gamepad-icon"></use></svg>
                        </button>
                    </div>
                </div>

                <div id="game-over-screen" class="overlay-screen hidden">
                    <div class="overlay-content" style="padding: 15px;">
                        
                        <!-- Video Game Over -->
                        <video id="gameover-video" class="inline-video-box" src="inglesepresentbettingexchangeroom.mp4" autoplay loop muted playsinline webkit-playsinline></video>

                        <div id="winner-flag-container"></div>
                        <h2 id="game-over-title" style="font-size: clamp(22px, 5vmin, 32px); margin-bottom: 5px;">MATCH OVER</h2>
                        <div id="game-over-icon" style="margin-bottom: 0;"></div>
                        
                        <div style="display: flex; flex-direction: column; gap: 8px; justify-content: center; align-items: center; width: 100%;">
                            <button id="restart-btn" class="joystick-btn-only" style="margin-top: 0;">
                                <svg viewBox="0 0 100 100"><use href="#gamepad-icon"></use></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="message"></div>
            </div>
        </div>
    </div>

    <script>
        // Caricamento Immagine Globale (Logo Tondo)
        const logoTondoImg = new Image();
        logoTondoImg.src = 'logo-tondo.jpeg';
        logoTondoImg.onload = () => { clearTokenCache(); };

        // --- SISTEMA RISVEGLIO INCONSAPEVOLE (7 CHAKRA AI) ---
        let aiLevel = parseInt(localStorage.getItem('cyberTorneo_ai_rank')) || 1;

        const chakraData = [
            { name: "NULL", color: "#ffffff", hz: 396 }, 
            { name: "MULADHARA (ROOT)", color: "#FF0000", hz: 396 },       // Lvl 1
            { name: "SVADHISTHANA (SACRAL)", color: "#FF7F00", hz: 417 },  // Lvl 2
            { name: "MANIPURA (SOLAR)", color: "#FFD700", hz: 528 },       // Lvl 3
            { name: "ANAHATA (HEART)", color: "#00FF00", hz: 639 },        // Lvl 4
            { name: "VISHUDDHA (THROAT)", color: "#00FFFF", hz: 741 },     // Lvl 5
            { name: "AJNA (THIRD EYE)", color: "#4B0082", hz: 852 },       // Lvl 6
            { name: "SAHASRARA (CROWN)", color: "#9400D3", hz: 963 }       // Lvl 7
        ];

        // --- PREVENZIONE GLITCH TOUCH ---
        window.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('touchmove', e => { 
            if (e.target.closest('#teams-scroll-area')) return;
            if(e.cancelable) e.preventDefault(); 
        }, { passive: false });

        let isTabActive = true;
        document.addEventListener("visibilitychange", () => {
            isTabActive = !document.hidden;
            if(isTabActive) lastTime = performance.now();
        });

        // Configurazione Resa Visiva
        let GAME_WIDTH = 600;
        let GAME_HEIGHT = 900;
        let dpr = 1; 
        const PI2 = Math.PI * 2; 
        
        let mTop = 190, mBot = 90, mSide = 20; 
        const goalWidth = 200, goalHeight = 20; 
        const friction = 0.96, ballFriction = 0.985; 
        const maxBallSpeed = 26; const maxDragPull = 150; 

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 

        // Riferimenti Video
        const menuVideo = document.getElementById('menu-video');
        const gameOverVideo = document.getElementById('gameover-video');

        // --- SISTEMA CACHING VETTORIALE ---
        let tokenCache = {};
        function clearTokenCache() { tokenCache = {}; }

        function getCachedToken(teamCode, isP1, radius, isAI, isDrag, currentAiLevel) {
            let key = isAI ? `ai_${radius}_${isDrag}_lvl${currentAiLevel}` : `${teamCode}_${isP1}_${radius}_${isDrag}`;
            if (!tokenCache[key]) {
                const offCanvas = document.createElement('canvas');
                const pad = 15; 
                offCanvas.width = (radius * 2 + pad * 2) * dpr;
                offCanvas.height = (radius * 2 + pad * 2) * dpr;
                const oCtx = offCanvas.getContext('2d');
                oCtx.scale(dpr, dpr);
                oCtx.imageSmoothingEnabled = true;
                oCtx.imageSmoothingQuality = 'high';
                
                oCtx.translate(radius + pad, radius + pad);
                
                if (isAI) drawAiToken(oCtx, 0, 0, radius, isDrag, currentAiLevel);
                else drawNationToken(oCtx, 0, 0, radius, teamCode, isP1, isDrag);
                
                tokenCache[key] = { canvas: offCanvas, pad: pad };
            }
            return tokenCache[key];
        }

        class CircleEntity {
            constructor(x, y, radius, mass) { this.x = x; this.y = y; this.vx = 0; this.vy = 0; this.radius = radius; this.mass = mass; }
            applyFriction(f) { this.vx *= f; this.vy *= f; }
            update() { this.x += this.vx; this.y += this.vy; }
        }

        class Player extends CircleEntity {
            constructor(x, y, isP1) { super(x, y, 26, 2.5); this.isP1 = isP1; this.startX = x; this.startY = y; } 
            resetPosition() { this.x = this.startX; this.y = this.startY; this.vx = 0; this.vy = 0; }
            draw(ctx) { 
                let isDrag = (dragTarget === this);
                let isAI = (!this.isP1 && gameMode !== 2);
                let tCode = this.isP1 ? selectedTeamP1 : selectedTeamP2;
                let cache = getCachedToken(tCode, this.isP1, this.radius, isAI, isDrag, aiLevel);
                ctx.drawImage(cache.canvas, this.x - this.radius - cache.pad, this.y - this.radius - cache.pad, this.radius * 2 + cache.pad * 2, this.radius * 2 + cache.pad * 2);
            }
        }

        class Ball extends CircleEntity {
            constructor(x, y) { 
                super(x, y, 16, 0.8); 
                this.trail = []; 
                this.rotation = 0; 
            } 
            update() {
                super.update(); let speed = Math.hypot(this.vx, this.vy);
                
                if (speed > 0.1) {
                    let spinDir = (this.vx > 0) ? 1 : -1;
                    this.rotation += (speed / this.radius) * spinDir * 0.3;
                }

                if (speed > 2) this.trail.push({x: this.x, y: this.y, life: 10, speed: speed});
                for (let i = this.trail.length - 1; i >= 0; i--) { 
                    this.trail[i].life--; 
                    if (this.trail[i].life <= 0) { this.trail[i] = this.trail[this.trail.length - 1]; this.trail.pop(); } 
                }
            }
            draw(ctx) {
                ctx.save();
                let currentSpeed = Math.hypot(this.vx, this.vy);
                let isFireCore = currentSpeed > 18;
                let trailColor = isFireCore ? '255, 0, 85' : '0, 255, 102';
                
                if (this.trail.length > 1) {
                    ctx.beginPath(); ctx.moveTo(this.trail[0].x, this.trail[0].y);
                    for (let i = 1; i < this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
                    ctx.lineTo(this.x, this.y);
                    ctx.lineWidth = this.radius * 1.2; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.strokeStyle = `rgba(${trailColor}, 0.3)`; ctx.stroke();
                }
                
                ctx.translate(this.x, this.y);
                
                ctx.shadowColor = 'rgba(0,0,0,0.5)';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetY = 4;
                ctx.beginPath();

                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                ctx.rotate(this.rotation);

                ctx.lineWidth = 1.5;
                ctx.lineJoin = 'round';
                let r = this.radius;

                ctx.beginPath();

                ctx.stroke();

                    let aMid = a1 + Math.PI / 5;

                    let ey2 = Math.sin(a2) * (r * 0.85);

                    ctx.moveTo(px, py);
                    ctx.lineTo(ex, ey);
                    ctx.lineTo(ex2, ey2);

        function drawField() {
            ctx.fillStyle = '#224a10'; 
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            const playX = mSide;
            const playY = mTop;
            const playW = GAME_WIDTH - mSide * 2;
            const playH = GAME_HEIGHT - mTop - mBot;

            const stripeCount = 14;
            const stripeHeight = playH / stripeCount;
            for (let i = 0; i < stripeCount; i++) {
                ctx.fillStyle = i % 2 === 0 ? '#3A7C21' : '#326A1D';
                ctx.fillRect(playX, playY + i * stripeHeight, playW, stripeHeight);
            }

            ctx.save();
            ctx.lineCap = 'square';
            ctx.lineJoin = 'miter';
            ctx.lineWidth = 2.5;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.85)';

            ctx.strokeRect(playX, playY, playW, playH);

            const midY = playY + playH / 2;
            ctx.beginPath();
            ctx.moveTo(playX, midY);
            ctx.lineTo(playX + playW, midY);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(GAME_WIDTH / 2, midY, playW * 0.15, 0, Math.PI * 2);
            ctx.stroke();
            
            ctx.beginPath();
            ctx.arc(GAME_WIDTH / 2, midY, 4, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.fill();

            const penW = playW * 0.55;
            const penH = playH * 0.15;
            const penX = GAME_WIDTH / 2 - penW / 2;
            ctx.strokeRect(penX, playY, penW, penH); 
            ctx.strokeRect(penX, playY + playH - penH, penW, penH); 

            const goalAreaW = playW * 0.25;
            const goalAreaH = playH * 0.05;
            const goalAreaX = GAME_WIDTH / 2 - goalAreaW / 2;
            ctx.strokeRect(goalAreaX, playY, goalAreaW, goalAreaH); 
            ctx.strokeRect(goalAreaX, playY + playH - goalAreaH, goalAreaW, goalAreaH); 

            const penSpotDist = playH * 0.11;
            ctx.beginPath(); ctx.arc(GAME_WIDTH/2, playY + penSpotDist, 3, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(GAME_WIDTH/2, playY + playH - penSpotDist, 3, 0, Math.PI*2); ctx.fill();

            const arcR = playW * 0.15;
            ctx.save();
            ctx.beginPath(); ctx.rect(playX, playY + penH, playW, playH/2 - penH); ctx.clip();
            ctx.beginPath(); ctx.arc(GAME_WIDTH/2, playY + penSpotDist, arcR, 0, Math.PI*2); ctx.stroke();
            ctx.restore();

            ctx.save();
            ctx.beginPath(); ctx.rect(playX, midY, playW, playH/2 - penH); ctx.clip();
            ctx.beginPath(); ctx.arc(GAME_WIDTH/2, playY + playH - penSpotDist, arcR, 0, Math.PI*2); ctx.stroke();
            ctx.restore();

            const cornerR = playW * 0.03;
            ctx.beginPath(); ctx.arc(playX, playY, cornerR, 0, Math.PI/2); ctx.stroke();
            ctx.beginPath(); ctx.arc(playX+playW, playY, cornerR, Math.PI/2, Math.PI); ctx.stroke();
            ctx.beginPath(); ctx.arc(playX, playY+playH, cornerR, -Math.PI/2, 0); ctx.stroke();
            ctx.beginPath(); ctx.arc(playX+playW, playY+playH, cornerR, Math.PI, -Math.PI/2); ctx.stroke();

            const gx = GAME_WIDTH / 2 - goalWidth / 2;

            ctx.fillStyle = p2Fill; ctx.fillRect(gx, playY - 20, goalWidth, 20); ctx.lineWidth = 3; ctx.strokeStyle = p2Color; ctx.strokeRect(gx, playY - 20, goalWidth, 20);
            ctx.fillStyle = 'rgba(0, 255, 102, 0.15)'; ctx.fillRect(gx, playY + playH, goalWidth, 20); ctx.strokeStyle = '#00FF66'; ctx.strokeRect(gx, playY + playH, goalWidth, 20);
            
            ctx.restore();
        }

        function updatePointerCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect(); pointer.x = (clientX - rect.left) * (GAME_WIDTH / rect.width); pointer.y = (clientY - rect.top) * (GAME_HEIGHT / rect.height);
        }

        function handlePointerDown(e) {
            if (activePointerId !== null || gameState !== GAME_STATE_PLAYING || isMoving || hitStopFrames > 0) return;
            updatePointerCoords(e.clientX, e.clientY);
            let activeTeam = null;
            if (currentTurn === 1) activeTeam = team1; else if (currentTurn === 2 && gameMode === 2) activeTeam = team2;
            if (!activeTeam) return;

            for (let p of activeTeam) {
                let dx = pointer.x - p.x, dy = pointer.y - p.y;
                if (dx * dx + dy * dy <= (p.radius * 3.5) ** 2) {
                    activePointerId = e.pointerId; try { canvas.setPointerCapture(e.pointerId); } catch(err){}
                    pointer.active = true; dragTarget = p; dragTarget.dragStartX = p.x; dragTarget.dragStartY = p.y; dragTarget.vx = 0; dragTarget.vy = 0; break;
                }
            }
        }

        function handlePointerMove(e) { if (pointer.active && e.pointerId === activePointerId) updatePointerCoords(e.clientX, e.clientY); }

        function handlePointerUp(e) {
            if (e.pointerId === activePointerId) {
                if (dragTarget && pointer.active) {
                    let dx = dragTarget.dragStartX - dragTarget.x, dy = dragTarget.dragStartY - dragTarget.y; let dragDist = Math.hypot(dx, dy);
                    isMoving = true; dragTarget.vx = dx * 0.45; dragTarget.vy = dy * 0.45; 
                    
                    let color = currentTurn === 1 ? '#00FF66' : '#FF0055';
                    createExplosion(dragTarget.dragStartX, dragTarget.dragStartY, color, 12, 8, 4, 30);
                    
                    if (dragDist > maxDragPull * 0.9) { triggerScreenShake(8, 6); spawnText(dragTarget.dragStartX, dragTarget.dragStartY - 30, "HYPER STRIKE!", "#FFD700"); playImpactSound(15); } 
                    else { triggerScreenShake(4, 3); }

                    dragTarget = null; playShootSound(); 
                }
                pointer.active = false; activePointerId = null; try { canvas.releasePointerCapture(e.pointerId); } catch(err) {}
            }
        }

        canvas.addEventListener('pointerdown', handlePointerDown); canvas.addEventListener('pointermove', handlePointerMove);
        canvas.addEventListener('pointerup', handlePointerUp); canvas.addEventListener('pointercancel', handlePointerUp);

        function handleAI() {
            if (gameState !== GAME_STATE_PLAYING || currentTurn !== 2 || isMoving || gameMode === 2) return;
            aiTimer--;

                let bestPlayer = null, minDist = Infinity;

                    let errorMargin = Math.max(0, 16 - (aiLevel * 2)); 
                    dx += (Math.random() - 0.5) * errorMargin; dy += (Math.random() - 0.5) * errorMargin;
                    
                    let dist = Math.hypot(dx, dy); if (dist === 0) dist = 1; 
                    
                    let powerMultiplier = Math.max(1.2, 3.2 - (aiLevel * 0.2));
                    let maxPwr = 26 + (aiLevel * 1.5);

        function resolveCollision(e1, e2) {
            let dx = e2.x - e1.x, dy = e2.y - e1.y; let dist = Math.hypot(dx, dy), minDist = e1.radius + e2.radius;
            if (dist < minDist) {
                if (dist === 0) { dx = 1; dy = 0; dist = 1; } 
                let overlap = minDist - dist, nx = dx / dist, ny = dy / dist;
                let totalMass = e1.mass + e2.mass, m1Ratio = e2.mass / totalMass, m2Ratio = e1.mass / totalMass;
                e1.x -= nx * overlap * m1Ratio; e1.y -= ny * overlap * m1Ratio; e2.x += nx * overlap * m2Ratio; e2.y += ny * overlap * m2Ratio;
                
                let kx = (e1.vx - e2.vx), ky = (e1.vy - e2.vy); let p = (1 + 0.8) * (nx * kx + ny * ky) / totalMass;
                
                e1.vx -= p * e2.mass * nx; e1.vy -= p * e2.mass * ny; e2.vx += p * e1.mass * nx; e2.vy += p * e1.mass * ny;
                
                let imp = Math.abs(p);
                if (imp > 5) {
                    playImpactSound(imp); 
                    let c = (e1===ball||e2===ball) ? '#4CAF50' : '#ffffff';
                    createExplosion(e1.x + nx * e1.radius, e1.y + ny * e1.radius, c, Math.min(imp, 15), imp, 3, 20);
                    
                    if (imp > 20) { triggerScreenShake(12, imp * 0.5); hitStopFrames = 4; triggerFlash(0.4); spawnText(e1.x + nx*e1.radius, e1.y + ny*e1.radius, impactWords[Math.floor(Math.random()*impactWords.length)], '#FF0055'); } 
                    else if (imp > 10) { triggerScreenShake(4, imp * 0.2); spawnText(e1.x + nx*e1.radius, e1.y + ny*e1.radius, "CLANG!", '#ffffff'); }
                }
            }
        }

        function updatePhysics() {
            if (dragTarget && pointer.active) {
                let dx = pointer.x - dragTarget.dragStartX, dy = pointer.y - dragTarget.dragStartY; let dist = Math.hypot(dx, dy);
                if (dist > maxDragPull) { dx = (dx / dist) * maxDragPull; dy = (dy / dist) * maxDragPull; }
                dragTarget.x = dragTarget.dragStartX + dx; dragTarget.y = dragTarget.dragStartY + dy;
            }

            const allEnt = [...team1, ...team2, ball];
            for (let e of allEnt) {
                if (e === dragTarget) continue;
                e.applyFriction(e === ball ? ballFriction : friction);
                if (e === ball) { let s = Math.hypot(ball.vx, ball.vy); if (s > maxBallSpeed) { ball.vx = (ball.vx/s)*maxBallSpeed; ball.vy = (ball.vy/s)*maxBallSpeed; } }
                e.update();
            }

            let isAnythingMoving = false;
            for (let e of allEnt) { if (Math.hypot(e.vx, e.vy) > 0.25) { isAnythingMoving = true; break; } }
            if (isMoving && !isAnythingMoving && !dragTarget) { forceStopAll(allEnt); isMoving = false; switchTurn(); } 
            else if (!isMoving && isAnythingMoving) { isMoving = true; }

            for (let i = 0; i < allEnt.length; i++) { for (let j = i + 1; j < allEnt.length; j++) { if (allEnt[i] === dragTarget || allEnt[j] === dragTarget) continue; resolveCollision(allEnt[i], allEnt[j]); } }

            [...team1, ...team2, ball].forEach(p => {
                if (p.x < p.radius + mSide) { p.x = p.radius + mSide; p.vx *= -0.5; } if (p.x > GAME_WIDTH - p.radius - mSide) { p.x = GAME_WIDTH - p.radius - mSide; p.vx *= -0.5; }
            });

            [...team1, ...team2].forEach(p => {
                if (p.y < p.radius + mTop) { p.y = p.radius + mTop; p.vy *= -0.5; } if (p.y > GAME_HEIGHT - p.radius - mBot) { p.y = GAME_HEIGHT - p.radius - mBot; p.vy *= -0.5; }
            });

            const gx1 = GAME_WIDTH/2 - goalWidth/2, gx2 = GAME_WIDTH/2 + goalWidth/2;
            if (gameState !== GAME_STATE_GOAL && gameState !== GAME_STATE_OVER) {
                if (ball.y < ball.radius + mTop) { if (ball.x > gx1 && ball.x < gx2) { scoreGoal(1); } else { ball.y = ball.radius + mTop; ball.vy *= -0.8; } }
                else if (ball.y > GAME_HEIGHT - ball.radius - mBot) { if (ball.x > gx1 && ball.x < gx2) { scoreGoal(2); } else { ball.y = GAME_HEIGHT - ball.radius - mBot; ball.vy *= -0.8; } }
            } else {
                if (ball.y < ball.radius + mTop) { ball.y = ball.radius + mTop; ball.vy *= -0.8; } if (ball.y > GAME_HEIGHT - ball.radius - mBot) { ball.y = GAME_HEIGHT - ball.radius - mBot; ball.vy *= -0.8; }
            }
        }

        }

        function scoreGoal(playerScored) {
            gameState = GAME_STATE_GOAL; isMoving = false; hitStopFrames = 20; triggerFlash(1); triggerScreenShake(30, 15); forceStopAll([...team1, ...team2, ball]); playImpactSound(30, true); 

            if (playerScored === 1) {
                scoreP1++; score1El.innerText = scoreP1; currentTurn = 2; 
                createExplosion(GAME_WIDTH / 2, mTop, '#00FF66', 40, 30, 8, 150);
                showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', '#00FF66');
            } else {
                scoreP2++; score2El.innerText = scoreP2; currentTurn = 1;
                let color = gameMode === 2 ? '#FF0055' : chakraData[aiLevel].color;
                createExplosion(GAME_WIDTH / 2, GAME_HEIGHT - mBot, color, 40, 30, 8, 150);
                
                if (gameMode === 2) {
                    showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', '#FF0055');
                } else {
                    showMessage(`GOAL!`); messageEl.style.color = '#fff'; messageEl.style.setProperty('--accent-color', color);
                }
            }
            updateTurnUI();

            if (scoreP1 >= 3 || scoreP2 >= 3) {
                stopTimer(); 
                setTimeout(() => { 
                    hideMessage(); 
                    showEndScreen(); 
                }, 2500); 
            } else { setTimeout(() => { if (gameState === GAME_STATE_GOAL) { resetPositions(); gameState = GAME_STATE_PLAYING; hideMessage(); } }, 3500); }
        }

        function drawSlingshotLine() {
            if (dragTarget && pointer.active) {
                let dx = dragTarget.dragStartX - dragTarget.x, dy = dragTarget.dragStartY - dragTarget.y;
                let dist = Math.hypot(dx, dy); let maxD = maxDragPull; let intensity = Math.min(dist / maxD, 1);
                
                let r, g, b;
                if (currentTurn === 1) { r = Math.floor(0 + intensity * 255); g = 255; b = Math.floor(102 + intensity * 153); } 
                else { r = 255; g = Math.floor(0 + intensity * 255); b = Math.floor(85 + intensity * 170); }
                let rgb = `${r}, ${g}, ${b}`;
                
                ctx.save(); 
                if (intensity > 0.85) { ctx.translate((Math.random() - 0.5) * 3, (Math.random() - 0.5) * 3); }
                let auraRadius = dragTarget.radius + 5 + (Math.sin(performance.now() / (100 - intensity * 80)) * 15 * intensity);
                ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, auraRadius, 0, PI2);
                ctx.fillStyle = `rgba(${rgb}, ${0.1 + intensity * 0.2})`; ctx.fill();

                if (intensity > 0.7) { ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, auraRadius * 1.2, 0, PI2); ctx.lineWidth = 2; ctx.strokeStyle = `rgba(255, 255, 255, ${Math.random() * 0.8 * intensity})`; ctx.stroke(); }
                if (intensity > 0.4 && Math.random() < intensity) { let sparkX = dragTarget.dragStartX + (Math.random() - 0.5) * 50; let sparkY = dragTarget.dragStartY + (Math.random() - 0.5) * 50; for(let i=0; i<particlePool.length; i++) { if(!particlePool[i].active) { particlePool[i].spawn(sparkX, sparkY, `rgba(${rgb}, 1)`, 2 + intensity * 5, 1 + intensity * 2, 10 + intensity * 10); break; } } }

                ctx.beginPath(); ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY); ctx.lineTo(dragTarget.x, dragTarget.y);
                ctx.lineWidth = 2 + intensity * 6; ctx.setLineDash([10, 10]); ctx.lineDashOffset = -performance.now() / (30 - intensity * 25);
                ctx.strokeStyle = `rgba(${rgb}, ${0.5 + intensity * 0.5})`; ctx.shadowBlur = 10 + intensity * 20; ctx.shadowColor = `rgba(${rgb}, 1)`; ctx.stroke(); 
                ctx.shadowBlur = 0; ctx.setLineDash([]);
                
                ctx.beginPath(); let crosshairRadius = 12 + Math.sin(performance.now() / (150 - intensity * 100)) * (3 + intensity * 5);
                ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, crosshairRadius, 0, PI2); ctx.lineWidth = 3 + intensity * 2; ctx.strokeStyle = `rgba(${rgb}, 1)`; ctx.stroke();
                ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, 3 + intensity * 3, 0, PI2); ctx.fillStyle = `rgba(${rgb}, 1)`; ctx.fill();
                
                let offset = crosshairRadius + 4; ctx.beginPath(); 
                ctx.moveTo(dragTarget.dragStartX - offset, dragTarget.dragStartY); ctx.lineTo(dragTarget.dragStartX - offset + 5, dragTarget.dragStartY); 
                ctx.moveTo(dragTarget.dragStartX + offset, dragTarget.dragStartY); ctx.lineTo(dragTarget.dragStartX + offset - 5, dragTarget.dragStartY); 
                ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY - offset); ctx.lineTo(dragTarget.dragStartX, dragTarget.dragStartY - offset + 5); 
                ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY + offset); ctx.lineTo(dragTarget.dragStartX, dragTarget.dragStartY + offset - 5); 
                ctx.lineWidth = 2 + intensity * 2; ctx.stroke();
                
                ctx.font = '900 16px Chakra Petch'; ctx.fillStyle = `rgba(${rgb}, ${0.6 + intensity * 0.4})`; ctx.textAlign = 'center';
                let powerPercent = Math.floor(intensity * 100); let powerText = powerPercent === 100 ? 'MAX POWER' : powerPercent + '%';
                ctx.fillText(powerText, dragTarget.dragStartX, dragTarget.dragStartY - 40 - intensity * 15);
                ctx.restore();
            }
        }

        function drawStaticBackground() { ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); drawField(); team1.forEach(p => p.draw(ctx)); team2.forEach(p => p.draw(ctx)); ball.draw(ctx); }

        window.gameLoopRunning = false;

        function gameLoop(time) {
            if(!window.gameLoopRunning) return;
            if (!isTabActive) { requestAnimationFrame(gameLoop); return; }

            requestAnimationFrame(gameLoop);
            if (!lastTime) lastTime = time; let dt = (time - lastTime) || 0; lastTime = time;
            if (dt > 250) dt = 250; accumulator += dt;

            while (accumulator >= timeStep) {
                if (shakeTime > 0) shakeTime--;
                if (hitStopFrames > 0) { hitStopFrames--; } 
                else { 
                    handleAI(); updatePhysics(); 
                    if (gameState === GAME_STATE_PLAYING && !isMoving) {
                        if (gameMode === 1 && currentTurn === 2) { turnTimeRemaining = 5.0; } 
                        else {
                            turnTimeRemaining -= timeStep / 1000;
                            if (turnTimeRemaining <= 0) {
                                turnTimeRemaining = 0;
                                if (dragTarget) { dragTarget.x = dragTarget.dragStartX; dragTarget.y = dragTarget.dragStartY; dragTarget = null; pointer.active = false; if(activePointerId !== null) { try { canvas.releasePointerCapture(activePointerId); } catch(e){} } activePointerId = null; }
                                spawnText(GAME_WIDTH/2, GAME_HEIGHT/2, "TIME UP!", "#FF0055"); playImpactSound(15); switchTurn();
                            }
                        }
                    }
                }

                for (let i = 0; i < particlePool.length; i++) { particlePool[i].update(); }
                for (let i = 0; i < textPool.length; i++) { textPool[i].update(); }
                accumulator -= timeStep;
            }

            ctx.clearRect(0, 0, GAME_WIDTH, GAME_HEIGHT); ctx.save();
            if (shakeTime > 0) ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
            
            drawField(); 
            for (let i = 0; i < particlePool.length; i++) { particlePool[i].draw(ctx); }
            drawSlingshotLine(); team1.forEach(p => p.draw(ctx)); team2.forEach(p => p.draw(ctx)); ball.draw(ctx);
            for (let i = 0; i < textPool.length; i++) { textPool[i].draw(ctx); }
            drawTurnIndicator(); ctx.restore();
        }

        initDisplay();

    </script>
</body>
