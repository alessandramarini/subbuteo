<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Soccer Pong - Verde vs Grigio</title>
    <!-- Importazione Font da Gaming -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* Anti-Glitch Globale per Smartphone */
        * {
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            outline: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #39FF14;
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            touch-action: none; /* Blocca scorrimento nativo */
            overscroll-behavior: none;
        }

        .icon {
            width: 1em;
            height: 1em;
            vertical-align: middle;
            display: inline-block;
            filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
            -webkit-filter: drop-shadow(0 0 5px rgba(255, 255, 255, 0.2));
        }
        
        .icon.medal {
            width: 1.5em;
            height: 1.5em;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
            -webkit-filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.4));
        }

        @keyframes neonPulse {
            0% { box-shadow: 0 0 30px rgba(57, 255, 20, 0.2), inset 0 0 10px rgba(57, 255, 20, 0.1); }
            100% { box-shadow: 0 0 70px rgba(57, 255, 20, 0.6), inset 0 0 20px rgba(57, 255, 20, 0.3); }
        }

        /* Proporzioni perfette Responsive (Mobile & Desktop) */
        #game-container {
            position: relative;
            width: 100vw;
            height: calc(100vw * (550 / 900));
            max-width: calc(100vh * (900 / 550));
            max-width: calc(100dvh * (900 / 550));
            max-height: 100vh;
            max-height: 100dvh;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #39FF14;
            box-sizing: border-box;
            animation: neonPulse 2s infinite alternate;
            background-color: #080a0c;
        }

        @media (min-aspect-ratio: 900/550) {
            #game-container {
                height: 100vh;
                height: 100dvh;
                width: calc(100vh * 900 / 550);
                width: calc(100dvh * 900 / 550);
            }
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Flash Screen (Hit Stop) */
        #screen-flash {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            pointer-events: none;
            z-index: 8;
            opacity: 0;
            transition: opacity 0.1s;
        }

        /* Effetto Monitor da Gaming */
        #scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent 50%, rgba(0, 0, 0, 0.5) 51%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.7;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Il canvas sotto riceve i tocchi */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            z-index: 10;
        }

        #top-hud {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 10px 20px;
        }

        #score-board {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: clamp(30px, 6vmin, 54px);
            font-weight: 900;
            font-style: italic;
            text-shadow: 0 0 20px rgba(0,0,0,1);
            gap: 5vw;
        }

        .score-p1 { color: #39FF14; text-shadow: 0 0 15px #39FF14, 0 0 30px #39FF14; }
        .score-p2 { color: #ffffff; text-shadow: 0 0 15px #ffffff, 0 0 30px #a8a9ad; }

        #turn-indicator {
            font-size: clamp(16px, 3.5vmin, 28px);
            padding: 5px 25px;
            border: 2px solid #39FF14;
            background: linear-gradient(90deg, rgba(0,0,0,0.9), rgba(10,30,10,0.8), rgba(0,0,0,0.9));
            text-align: center;
            color: #39FF14;
            min-width: 120px;
            text-shadow: 0 0 10px #39FF14;
            transition: all 0.3s ease;
            -webkit-clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%);
            clip-path: polygon(15px 0, calc(100% - 15px) 0, 100% 50%, calc(100% - 15px) 100%, 15px 100%, 0 50%);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(30px, 7vmin, 70px);
            font-weight: 900;
            font-style: italic;
            text-align: center;
            background: repeating-linear-gradient(45deg, rgba(5,5,5,0.95), rgba(5,5,5,0.95) 10px, rgba(15,25,15,0.95) 10px, rgba(15,25,15,0.95) 20px);
            padding: 5% 8%;
            width: 80%;
            max-width: 600px;
            border: 2px solid #39FF14;
            color: #39FF14;
            transition: opacity 0.3s;
            text-transform: uppercase;
            box-shadow: inset 0 0 20px rgba(57, 255, 20, 0.3), 0 0 30px rgba(57, 255, 20, 0.5);
            z-index: 10;
            -webkit-clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            clip-path: polygon(0 20px, 20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%);
            text-shadow: 0 0 15px #39FF14;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .hidden {
            display: none !important;
        }

        .overlay-screen {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translate(-50%, 0);
            background: rgba(0, 15, 0, 0.9);
            border: 2px solid #39FF14;
            padding: 20px;
            text-align: center;
            pointer-events: auto; /* I menu possono essere cliccati */
            -webkit-clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            box-shadow: inset 0 0 30px rgba(57, 255, 20, 0.15), 0 0 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            width: 85%;
            max-width: 650px;
            z-index: 20;
        }

        .overlay-screen h3 {
            margin-top: 0;
            color: #39FF14;
            font-size: clamp(24px, 5vmin, 40px);
            text-shadow: 0 0 10px #39FF14;
            border-bottom: 1px solid rgba(57, 255, 20, 0.4);
            padding-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .grid-options {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
        }

        .cyber-btn {
            background: linear-gradient(135deg, rgba(20, 30, 20, 0.8), rgba(0, 0, 0, 0.9));
            color: #aaa;
            border: 1px solid rgba(57, 255, 20, 0.3);
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            font-size: clamp(16px, 3vmin, 22px);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.5);
            min-width: 90px;
        }

        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(57, 255, 20, 0.5), transparent);
            transform: skewX(-25deg);
            transition: 0.5s;
        }

        @media (hover: hover) {
            .cyber-btn:hover::before { left: 150%; }
            .cyber-btn:hover {
                border-color: #39FF14;
                color: #ffffff;
                box-shadow: 0 0 20px rgba(57,255,20,0.5), inset 0 0 15px rgba(57,255,20,0.3);
                transform: translateY(-3px) scale(1.05);
                background: linear-gradient(135deg, rgba(30, 60, 30, 0.9), rgba(0, 20, 0, 0.9));
            }
        }

        .cyber-btn.active {
            background: rgba(57, 255, 20, 0.25);
            color: #ffffff;
            border: 2px solid #39FF14;
            text-shadow: 0 0 12px #39FF14;
            box-shadow: 0 0 25px rgba(57,255,20,0.7), inset 0 0 25px rgba(57,255,20,0.5);
            transform: scale(1.1);
            z-index: 2;
        }

        /* Divise Nazionali CSS */
        .mini-jersey {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.6), 0 0 5px rgba(0,0,0,0.8);
        }
        
        .jersey-ita { background: #0055A4; border: 2px solid #FFFFFF; }
        .jersey-mex { background: #006847; border: 2px solid #FFFFFF; }
        .jersey-bra { background: #FFDF00; border: 2px solid #009B3A; }
        .jersey-eng { 
            background: 
                linear-gradient(90deg, transparent 42%, #CE1124 42%, #CE1124 58%, transparent 58%), 
                linear-gradient(180deg, transparent 42%, #CE1124 42%, #CE1124 58%, transparent 58%), 
                #FFFFFF; 
            border: 2px solid #CE1124; 
        }
        .jersey-esp { background: #C60B1E; border: 2px solid #FFC400; }

        #controls-info {
            text-align: center;
            padding: 10px;
            font-size: clamp(16px, 3.5vmin, 24px);
            color: #39FF14;
            background: linear-gradient(180deg, rgba(57,255,20,0.1) 0%, rgba(0,0,0,0.9) 100%);
            border-top: 2px solid #39FF14;
        }

        #bracket-screen, #game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 5, 0, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 30;
            pointer-events: auto;
        }

        .stage-box {
            font-size: clamp(30px, 8vmin, 60px);
            margin: 15px;
            padding: 15px 30px;
            border: 2px solid #555;
            border-radius: 8px;
            background: #111;
            color: #555;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s;
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
        }

        .stage-box.active {
            border-color: #39FF14;
            color: #39FF14;
            box-shadow: 0 0 30px rgba(57, 255, 20, 0.4);
            background: rgba(57, 255, 20, 0.1);
            transform: scale(1.1);
        }

        .stage-box.passed { border-color: #aaa; color: #aaa; }

        .action-btn {
            margin-top: 20px;
            font-size: clamp(30px, 6vmin, 50px);
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #39FF14;
            color: #39FF14;
            padding: 10px 40px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(57, 255, 20, 0.3);
            pointer-events: auto;
            -webkit-clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            clip-path: polygon(15px 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%, 0 15px);
            font-family: inherit;
        }

        .action-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <!-- SVG Libreria -->
    <svg style="display: none;">
        <defs>
            <radialGradient id="gradMetallic" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="50%" stop-color="#a8a9ad"/>
                <stop offset="100%" stop-color="#444444"/>
            </radialGradient>
            <radialGradient id="gradBronze" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffcda5"/>
                <stop offset="50%" stop-color="#cd7f32"/>
                <stop offset="100%" stop-color="#5c3a16"/>
            </radialGradient>
            <radialGradient id="gradSilver" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffff"/>
                <stop offset="50%" stop-color="#e0e0e0"/>
                <stop offset="100%" stop-color="#888888"/>
            </radialGradient>
            <radialGradient id="gradGold" cx="30%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffffcc"/>
                <stop offset="50%" stop-color="#ffd700"/>
                <stop offset="100%" stop-color="#996500"/>
            </radialGradient>

            <polygon id="gear-shape" points="100,50 84.6,64.3 85.3,85.3 64.3,84.6 50,100 35.7,84.6 14.7,85.3 15.4,64.3 0,50 15.4,35.7 14.7,14.7 35.7,15.4 50,0 64.3,15.4 85.3,14.7 84.6,35.7"/>
            <circle id="gear-inner" cx="50" cy="50" r="30" fill="#000000"/>
            <ellipse id="gear-leaf" cx="50" cy="50" rx="22.5" ry="6" fill="#39FF14" transform="rotate(-45 50 50)"/>

            <g id="gear-metallic">
                <use href="#gear-shape" fill="url(#gradMetallic)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
            <g id="gear-bronze">
                <use href="#gear-shape" fill="url(#gradBronze)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
            <g id="gear-silver">
                <use href="#gear-shape" fill="url(#gradSilver)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
            <g id="gear-gold">
                <use href="#gear-shape" fill="url(#gradGold)"/>
                <use href="#gear-inner"/>
                <use href="#gear-leaf"/>
            </g>
        </defs>
    </svg>

    <div id="game-container">
        <canvas id="gameCanvas" width="900" height="550"></canvas>
        <div id="screen-flash"></div> <!-- Effetto lampo -->
        
        <div id="ui-layer">
            <div id="scanlines"></div>
            <div id="top-hud">
                <div id="score-board">
                    <span id="score1" class="score-p1">0</span>
                    <div id="turn-indicator">🟢 ◀</div>
                    <span id="score2" class="score-p2">0</span>
                </div>
            </div>

            <!-- Menu Squadre -->
            <div id="team-menu" class="overlay-screen">
                <h3>👕</h3>
                <div class="grid-options">
                    <button class="cyber-btn active" data-team="ITA">
                        <div class="mini-jersey jersey-ita"></div>
                        <span>ITA</span>
                    </button>
                    <button class="cyber-btn" data-team="MEX">
                        <div class="mini-jersey jersey-mex"></div>
                        <span>MEX</span>
                    </button>
                    <button class="cyber-btn" data-team="BRA">
                        <div class="mini-jersey jersey-bra"></div>
                        <span>BRA</span>
                    </button>
                    <button class="cyber-btn" data-team="ENG">
                        <div class="mini-jersey jersey-eng"></div>
                        <span>ENG</span>
                    </button>
                    <button class="cyber-btn" data-team="ESP">
                        <div class="mini-jersey jersey-esp"></div>
                        <span>ESP</span>
                    </button>
                </div>
                <button id="start-btn" class="action-btn">▶️</button>
            </div>

            <!-- Tabellone Campionato -->
            <div id="bracket-screen" class="hidden">
                <h2 style="color: #39FF14; font-size: clamp(40px, 8vmin, 60px); margin: 0 0 20px 0; text-shadow: 0 0 20px #39FF14;">🏆</h2>
                <div id="stage-1" class="stage-box">1️⃣ <svg class="icon medal"><use href="#gear-bronze"></use></svg></div>
                <div id="stage-2" class="stage-box">2️⃣ <svg class="icon medal"><use href="#gear-silver"></use></svg></div>
                <div id="stage-3" class="stage-box">3️⃣ <svg class="icon medal"><use href="#gear-gold"></use></svg></div>
                <button id="next-match-btn" class="action-btn">▶️</button>
            </div>

            <!-- Game Over -->
            <div id="game-over-screen" class="hidden">
                <div id="game-over-icon" style="font-size: clamp(80px, 15vmin, 120px); filter: drop-shadow(0 0 20px #39FF14); margin-bottom: 20px;"></div>
                <button id="restart-btn" class="action-btn">🔄</button>
            </div>

            <!-- Messaggi in Gioco -->
            <div id="message" class="hidden"></div>
            
            <div id="controls-info">👆 ↔️ 🟢 🚀</div>
        </div>
    </div>

    <script>
        // Blocco Scorrimento per Mobile Gaming perfetto
        document.addEventListener('touchmove', e => { 
            if(e.cancelable) e.preventDefault(); 
        }, { passive: false });
        window.addEventListener('contextmenu', e => { e.preventDefault(); return false; });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const score1El = document.getElementById('score1');
        const score2El = document.getElementById('score2');
        const messageEl = document.getElementById('message');
        const turnIndicatorEl = document.getElementById('turn-indicator');
        const teamMenuEl = document.getElementById('team-menu');
        const bracketScreenEl = document.getElementById('bracket-screen');
        const gameOverScreenEl = document.getElementById('game-over-screen');
        const gameOverIconEl = document.getElementById('game-over-icon');
        const screenFlash = document.getElementById('screen-flash');

        // Stati
        const GAME_STATE_MENU = 0;
        const GAME_STATE_BRACKET = 1;
        const GAME_STATE_PLAYING = 2;
        const GAME_STATE_GOAL = 3;
        const GAME_STATE_OVER = 4;
        let gameState = GAME_STATE_MENU;

        let currentStage = 1;
        const maxStages = 3;
        let currentTurn = 1; 
        let isMoving = false; 

        // Emozioni & Game Feel (Juice)
        let hitStopFrames = 0; // Congelamento schermo per colpi duri
        let particles = [];
        let shakeTime = 0;
        let shakeMagnitude = 0;

        // Fisica e Controllo
        const goalHeight = 160;
        const goalWidth = 20;
        const friction = 0.96; 
        const ballFriction = 0.985; 
        const maxBallSpeed = 22; // Aumentato per "Super Tiri"
        const maxDragPull = 120; // Elastico più lungo
        let pointer = { x: 0, y: 0, active: false };
        let dragTarget = null;
        let scoreP1 = 0;
        let scoreP2 = 0;
        let aiTimer = 60;

        // Nazionali
        const teamsData = {
            'ITA': { primary: '#0055A4', secondary: '#FFFFFF', type: 'solid' },
            'MEX': { primary: '#006847', secondary: '#FFFFFF', type: 'solid' },
            'BRA': { primary: '#FFDF00', secondary: '#009B3A', type: 'solid' },
            'ENG': { primary: '#FFFFFF', secondary: '#CE1124', type: 'cross' },
            'ESP': { primary: '#C60B1E', secondary: '#FFC400', type: 'solid' }
        };
        let selectedTeam = 'ITA';

        // --- SISTEMA MENU ---
        document.querySelectorAll('#team-menu .cyber-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('#team-menu .cyber-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedTeam = btn.getAttribute('data-team');
            });
        });

        document.getElementById('start-btn').addEventListener('click', () => {
            currentStage = 1;
            teamMenuEl.classList.add('hidden');
            showBracket();
        });

        document.getElementById('next-match-btn').addEventListener('click', () => {
            bracketScreenEl.classList.add('hidden');
            currentTurn = 1;
            resetPositions();
            scoreP1 = 0; scoreP2 = 0;
            score1El.innerText = 0; score2El.innerText = 0;
            gameState = GAME_STATE_PLAYING;
            showMessage("");
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            gameOverScreenEl.classList.add('hidden');
            teamMenuEl.classList.remove('hidden');
            currentStage = 1;
            scoreP1 = 0; scoreP2 = 0;
            score1El.innerText = 0; score2El.innerText = 0;
            gameState = GAME_STATE_MENU;
            showMessage("");
        });

        function showBracket() {
            gameState = GAME_STATE_BRACKET;
            bracketScreenEl.classList.remove('hidden');
            for (let i = 1; i <= maxStages; i++) {
                let box = document.getElementById(`stage-${i}`);
                box.className = 'stage-box';
                if (i < currentStage) box.classList.add('passed');
                if (i === currentStage) box.classList.add('active');
            }
        }

        function showMessage(htmlContent) {
            if (htmlContent === "") {
                messageEl.classList.add('hidden');
            } else {
                messageEl.innerHTML = htmlContent;
                messageEl.classList.remove('hidden');
            }
        }

        // Funzioni visive (Flash, Shake)
        function triggerFlash(intensity = 0.5) {
            screenFlash.style.opacity = intensity;
            setTimeout(() => { screenFlash.style.opacity = 0; }, 50);
        }

        function triggerScreenShake(duration, magnitude) {
            shakeTime = duration; shakeMagnitude = magnitude;
        }

        // --- GRAFICA E RENDERING ---
        function drawGearLogo(ctx, x, y, radius) {
            ctx.save();
            let gradient = ctx.createRadialGradient(x-radius*0.2, y-radius*0.2, 1, x, y, radius);
            gradient.addColorStop(0, '#ffffff');
            gradient.addColorStop(0.5, '#a8a9ad');
            gradient.addColorStop(1, '#444444');

            ctx.fillStyle = gradient;
            ctx.beginPath();
            const teeth = 8;
            const outerRadius = radius;
            const innerRadius = radius * 0.75;
            for (let i = 0; i < teeth * 2; i++) {
                const angle = (i * Math.PI) / teeth;
                const r = i % 2 === 0 ? outerRadius : innerRadius;
                if (i === 0) ctx.moveTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
                else ctx.lineTo(x + r * Math.cos(angle), y + r * Math.sin(angle));
            }
            ctx.closePath();
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = '#000000';
            ctx.fill();

            ctx.translate(x, y);
            ctx.rotate(-Math.PI / 4); 
            ctx.beginPath();
            ctx.ellipse(0, 0, radius * 0.45, radius * 0.12, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#39FF14';
            ctx.fill();

            ctx.restore();
        }

        function drawJersey(ctx, x, y, radius, teamCode) {
            const team = teamsData[teamCode] || teamsData['ITA'];
            ctx.save();
            
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI*2);
            ctx.clip();

            if (team.type === 'stripes') {
                ctx.fillStyle = team.secondary;
                ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
                ctx.fillStyle = team.primary;
                for (let i = -radius; i < radius; i += 12) {
                    ctx.fillRect(x + i, y - radius, 6, radius * 2);
                }
            } else if (team.type === 'cross') {
                ctx.fillStyle = team.primary;
                ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);
                ctx.fillStyle = team.secondary;
                ctx.fillRect(x - radius, y - 3, radius * 2, 6);
                ctx.fillRect(x - 3, y - radius, 6, radius * 2);
            } else {
                ctx.fillStyle = team.primary;
                ctx.fill();
                ctx.beginPath();
                ctx.arc(x, y, radius * 0.4, 0, Math.PI*2);
                ctx.strokeStyle = team.secondary;
                ctx.lineWidth = 3;
                ctx.stroke();
            }
            
            let gloss = ctx.createLinearGradient(x - radius, y - radius, x + radius, y + radius);
            gloss.addColorStop(0, 'rgba(255,255,255,0.4)');
            gloss.addColorStop(0.5, 'rgba(255,255,255,0.0)');
            ctx.fillStyle = gloss;
            ctx.fillRect(x - radius, y - radius, radius * 2, radius * 2);

            ctx.restore();
        }

        function updateTurnUI() {
            if (currentTurn === 1) {
                turnIndicatorEl.innerHTML = "🟢 ◀";
                turnIndicatorEl.style.color = "#39FF14";
                turnIndicatorEl.style.borderColor = "#39FF14";
                turnIndicatorEl.style.textShadow = "0 0 10px #39FF14";
                turnIndicatorEl.style.boxShadow = "0 0 15px rgba(57, 255, 20, 0.3)";
            } else {
                turnIndicatorEl.innerHTML = `▶ <svg class="icon"><use href="#gear-metallic"></use></svg>`;
                turnIndicatorEl.style.color = "#ffffff";
                turnIndicatorEl.style.borderColor = "#ffffff";
                turnIndicatorEl.style.textShadow = "0 0 10px #ffffff";
                turnIndicatorEl.style.boxShadow = "0 0 15px rgba(255, 255, 255, 0.3)";
            }
        }

        function switchTurn() {
            if (gameState !== GAME_STATE_PLAYING) return;
            currentTurn = currentTurn === 1 ? 2 : 1;
            aiTimer = 60 - (currentStage * 10); 
            updateTurnUI();
        }

        // --- SISTEMA DI INPUT (Mouse + Touch Universale) ---
        function updatePointer(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            if (clientX !== undefined && clientY !== undefined) {
                pointer.x = (clientX - rect.left) * (canvas.width / rect.width);
                pointer.y = (clientY - rect.top) * (canvas.height / rect.height);
            }
        }

        function startDrag() {
            if (gameState !== GAME_STATE_PLAYING || currentTurn !== 1 || isMoving || hitStopFrames > 0) return;

            for (let p of team1) {
                let dx = pointer.x - p.x;
                let dy = pointer.y - p.y;
                let hitRadius = p.radius * 3; // Hitbox gigante per Mobile
                if (dx * dx + dy * dy <= hitRadius * hitRadius) {
                    dragTarget = p;
                    dragTarget.dragStartX = p.x;
                    dragTarget.dragStartY = p.y;
                    dragTarget.vx = 0;
                    dragTarget.vy = 0;
                    break;
                }
            }
        }

        function endDrag() {
            if (dragTarget && pointer.active) {
                let dx = dragTarget.dragStartX - dragTarget.x;
                let dy = dragTarget.dragStartY - dragTarget.y;
                
                isMoving = true;
                // Moltiplicatore spinta leggermente aumentato per gioco più esplosivo
                dragTarget.vx = dx * 0.40;
                dragTarget.vy = dy * 0.40;
                
                createExplosion(dragTarget.dragStartX, dragTarget.dragStartY, '#39FF14', 10, 6, 4, 20);
                triggerScreenShake(4, 3);

                dragTarget = null;
            }
            pointer.active = false;
        }

        // Listener Mouse
        canvas.addEventListener('mousedown', (e) => { 
            updatePointer(e.clientX, e.clientY);
            pointer.active = true;
            startDrag();
        });
        window.addEventListener('mousemove', (e) => { 
            if (pointer.active) updatePointer(e.clientX, e.clientY); 
        });
        window.addEventListener('mouseup', endDrag);

        // Listener Touch
        canvas.addEventListener('touchstart', (e) => { 
            if(e.touches.length > 0) {
                updatePointer(e.touches[0].clientX, e.touches[0].clientY);
                pointer.active = true;
                startDrag();
            }
        }, {passive: false});
        window.addEventListener('touchmove', (e) => { 
            if (pointer.active && e.touches.length > 0) {
                updatePointer(e.touches[0].clientX, e.touches[0].clientY);
            }
        }, {passive: false});
        window.addEventListener('touchend', endDrag);
        window.addEventListener('touchcancel', endDrag);


        // --- ENTITA' E FISICA ---
        class Particle {
            constructor(x, y, color, speed, size, life) {
                this.x = x; this.y = y;
                this.vx = (Math.random() - 0.5) * speed;
                this.vy = (Math.random() - 0.5) * speed;
                this.color = color; this.size = size;
                this.life = life; this.maxLife = life;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life--; this.size *= 0.95;
            }
            draw(ctx) {
                ctx.globalAlpha = Math.max(0, this.life / this.maxLife);
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        function createExplosion(x, y, color, amount, speed, size, life) {
            for (let i = 0; i < amount; i++) particles.push(new Particle(x, y, color, speed, size, life));
        }

        class CircleEntity {
            constructor(x, y, radius, mass) {
                this.x = x; this.y = y; this.vx = 0; this.vy = 0;
                this.radius = radius; this.mass = mass;
            }
            applyFriction(f) {
                this.vx *= f; this.vy *= f;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
            }
        }

        class Player extends CircleEntity {
            constructor(x, y, isP1) {
                super(x, y, 22, 2.5);
                this.isP1 = isP1;
                this.startX = x; this.startY = y;
            }
            resetPosition() {
                this.x = this.startX; this.y = this.startY; this.vx = 0; this.vy = 0;
            }
            draw(ctx) {
                ctx.save();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 3, 0, Math.PI * 2);
                if (dragTarget === this) {
                    ctx.fillStyle = '#ffffff'; ctx.shadowBlur = 25; ctx.shadowColor = '#ffffff';
                } else {
                    ctx.fillStyle = this.isP1 ? 'rgba(57, 255, 20, 0.3)' : 'rgba(255, 255, 255, 0.3)';
                    ctx.shadowBlur = 15; ctx.shadowColor = this.isP1 ? '#39FF14' : '#ffffff';
                }
                ctx.fill();

                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.isP1 ? '#111' : '#222'; ctx.fill();
                ctx.lineWidth = 2; ctx.strokeStyle = this.isP1 ? '#39FF14' : '#888'; ctx.stroke();
                
                if (this.isP1) drawJersey(ctx, this.x, this.y, this.radius * 0.75, selectedTeam);
                else drawGearLogo(ctx, this.x, this.y, this.radius * 0.85);
                ctx.restore();
            }
        }

        class Ball extends CircleEntity {
            constructor(x, y) {
                super(x, y, 14, 0.8);
                this.trail = [];
            }
            update() {
                super.update();
                let speed = Math.hypot(this.vx, this.vy);
                if (speed > 3) this.trail.push({x: this.x, y: this.y, life: 10, speed: speed});
                for (let i = this.trail.length - 1; i >= 0; i--) {
                    this.trail[i].life--;
                    if (this.trail[i].life <= 0) this.trail.splice(i, 1);
                }
            }
            draw(ctx) {
                ctx.save();
                
                // Scia infuocata per i super-tiri
                this.trail.forEach((t) => {
                    ctx.beginPath(); 
                    ctx.arc(t.x, t.y, this.radius * (t.life / 10), 0, Math.PI * 2);
                    let isFire = t.speed > 15; // Soglia per il plasma
                    ctx.fillStyle = isFire ? `rgba(255, 80, 0, ${t.life / 15})` : `rgba(57, 255, 20, ${t.life / 20})`;
                    ctx.shadowBlur = isFire ? 15 : 10; 
                    ctx.shadowColor = isFire ? '#FF5000' : '#39FF14'; 
                    ctx.fill();
                });

                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                let currentSpeed = Math.hypot(this.vx, this.vy);
                
                let grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.radius);
                if (currentSpeed > 15) {
                    // Palla incandescente
                    grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.5, '#ffffaa'); grad.addColorStop(1, '#FF5000');
                    ctx.shadowColor = '#FF5000';
                } else {
                    grad.addColorStop(0, '#ffffff'); grad.addColorStop(0.5, '#aaffaa'); grad.addColorStop(1, '#39FF14');
                    ctx.shadowColor = '#39FF14';
                }
                
                ctx.fillStyle = grad; ctx.shadowBlur = 20; ctx.fill();
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius * 0.4, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff'; ctx.fill();
                ctx.restore();
            }
        }

        const team1 = [
            new Player(120, canvas.height / 2, true),
            new Player(250, canvas.height / 2 - 120, true),
            new Player(250, canvas.height / 2 + 120, true),
            new Player(400, canvas.height / 2 - 70, true),
            new Player(400, canvas.height / 2 + 70, true)
        ];
        
        const team2 = [
            new Player(canvas.width - 120, canvas.height / 2, false),
            new Player(canvas.width - 250, canvas.height / 2 - 120, false),
            new Player(canvas.width - 250, canvas.height / 2 + 120, false),
            new Player(canvas.width - 400, canvas.height / 2 - 70, false),
            new Player(canvas.width - 400, canvas.height / 2 + 70, false)
        ];
        const ball = new Ball(canvas.width / 2, canvas.height / 2);

        function resetPositions() {
            ball.x = canvas.width / 2; ball.y = canvas.height / 2;
            ball.vx = 0; ball.vy = 0;
            team1.forEach(p => p.resetPosition()); team2.forEach(p => p.resetPosition());
            dragTarget = null; isMoving = false; hitStopFrames = 0;
            updateTurnUI();
        }

        function drawField() {
            ctx.fillStyle = '#080a0c'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            let time = performance.now() / 40;
            ctx.lineWidth = 1; ctx.strokeStyle = 'rgba(57, 255, 20, 0.15)';
            let offsetX = (time / 2) % 40;
            for(let i = -40 + offsetX; i < canvas.width; i += 40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
            }
            let offsetY = time % 40;
            for(let i = -40 + offsetY; i < canvas.height; i += 40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            ctx.save();
            ctx.lineWidth = 3; ctx.strokeStyle = '#39FF14'; ctx.shadowBlur = 15; ctx.shadowColor = '#39FF14';
            ctx.strokeRect(20, 20, canvas.width - 40, canvas.height - 40);
            ctx.beginPath(); ctx.moveTo(canvas.width / 2, 20); ctx.lineTo(canvas.width / 2, canvas.height - 20); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 70, 0, Math.PI * 2); ctx.stroke();
            ctx.beginPath(); ctx.arc(canvas.width / 2, canvas.height / 2, 4, 0, Math.PI * 2); ctx.fillStyle = '#39FF14'; ctx.fill();
            ctx.strokeRect(20, canvas.height / 2 - 140, 120, 280); ctx.strokeRect(20, canvas.height / 2 - 60, 40, 120);
            ctx.strokeRect(canvas.width - 140, canvas.height / 2 - 140, 120, 280); ctx.strokeRect(canvas.width - 60, canvas.height / 2 - 60, 40, 120);

            const goalYStart = canvas.height / 2 - goalHeight / 2;
            ctx.fillStyle = 'rgba(57, 255, 20, 0.1)'; ctx.fillRect(0, goalYStart, 20, goalHeight); ctx.strokeRect(0, goalYStart, 20, goalHeight);
            ctx.strokeStyle = '#ffffff'; ctx.shadowColor = '#ffffff'; ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
            ctx.fillRect(canvas.width - 20, goalYStart, 20, goalHeight); ctx.strokeRect(canvas.width - 20, goalYStart, 20, goalHeight);
            ctx.restore();
        }

        function handleAI() {
            if (gameState !== GAME_STATE_PLAYING || currentTurn !== 2 || isMoving || hitStopFrames > 0) return;
            aiTimer--;
            if (aiTimer <= 0) {
                let bestPlayer = null, minDist = Infinity;
                for (let p of team2) {
                    let d = Math.hypot(ball.x - p.x, ball.y - p.y);
                    if (p.x > ball.x - 15) d *= 0.6; 
                    if (d < minDist) { minDist = d; bestPlayer = p; }
                }
                if (bestPlayer) { 
                    let dx = ball.x - bestPlayer.x, dy = ball.y - bestPlayer.y;
                    let errorMargin = 30 - (currentStage * 10); 
                    dx += (Math.random() - 0.5) * errorMargin; dy += (Math.random() - 0.5) * errorMargin;
                    let dist = Math.sqrt(dx * dx + dy * dy);
                    let powerMultiplier = 5.0 - (currentStage * 0.8);
                    let power = Math.min((dist / powerMultiplier), 20 + (currentStage * 3)); 
                    bestPlayer.vx = (dx / dist) * power; bestPlayer.vy = (dy / dist) * power;
                    isMoving = true; aiTimer = 40 - (currentStage * 5); // IA più aggressiva
                    createExplosion(bestPlayer.x, bestPlayer.y, '#ffffff', 8, 5, 3, 20);
                }
            }
        }

        function resolveCollision(e1, e2) {
            let dx = e2.x - e1.x, dy = e2.y - e1.y;
            let dist = Math.sqrt(dx * dx + dy * dy);
            let minDist = e1.radius + e2.radius;
            if (dist < minDist) {
                let overlap = minDist - dist;
                let nx = dx / dist, ny = dy / dist;
                let totalMass = e1.mass + e2.mass;
                let m1Ratio = e2.mass / totalMass, m2Ratio = e1.mass / totalMass;
                e1.x -= nx * overlap * m1Ratio; e1.y -= ny * overlap * m1Ratio;
                e2.x += nx * overlap * m2Ratio; e2.y += ny * overlap * m2Ratio;
                
                let kx = (e1.vx - e2.vx), ky = (e1.vy - e2.vy);
                let p = (1 + 0.8) * (nx * kx + ny * ky) / totalMass;
                e1.vx -= p * e2.mass * nx; e1.vy -= p * e2.mass * ny;
                e2.vx += p * e1.mass * nx; e2.vy += p * e1.mass * ny;
                
                let imp = Math.abs(p);
                if (imp > 5) {
                    createExplosion(e1.x + nx * e1.radius, e1.y + ny * e1.radius, (e1===ball||e2===ball)?'#39FF14':'#ffffff', Math.min(imp*2, 20), imp, 3, 20);
                    
                    // HIT STOP & FLASH: Effetti adrenalinici per colpi devastanti
                    if (imp > 15) {
                        triggerScreenShake(10, imp * 0.4); 
                        hitStopFrames = 4; // Congela il gioco per 4 frame
                        triggerFlash(0.3); // Flash bianco
                    } else if (imp > 8) {
                        triggerScreenShake(5, imp * 0.2); 
                    }
                }
            }
        }

        function forceStopAll(entities) {
            entities.forEach(e => { e.vx = 0; e.vy = 0; });
        }

        function updatePhysics() {
            if (gameState !== GAME_STATE_PLAYING) return;
            
            // Hit Stop: Se attivo, non aggiornare la fisica
            if (hitStopFrames > 0) {
                hitStopFrames--;
                return; 
            }

            if (dragTarget && pointer.active) {
                let dx = pointer.x - dragTarget.dragStartX, dy = pointer.y - dragTarget.dragStartY;
                let dist = Math.hypot(dx, dy);
                if (dist > maxDragPull) { dx = (dx / dist) * maxDragPull; dy = (dy / dist) * maxDragPull; }
                dragTarget.x = dragTarget.dragStartX + dx; dragTarget.y = dragTarget.dragStartY + dy;
            }
            const allEnt = [...team1, ...team2, ball];
            for (let e of allEnt) {
                if (e === dragTarget) continue;
                e.applyFriction(e === ball ? ballFriction : friction);
                if (e === ball) {
                    let s = Math.hypot(ball.vx, ball.vy);
                    if (s > maxBallSpeed) { ball.vx = (ball.vx/s)*maxBallSpeed; ball.vy = (ball.vy/s)*maxBallSpeed; }
                }
                e.update();
            }

            // Snappy Turns: Soglia alzata a 0.2 per fermare le pedine ed evitare scivolamenti infiniti
            let isAnythingMoving = false;
            for (let e of allEnt) {
                if (Math.hypot(e.vx, e.vy) > 0.2) {
                    isAnythingMoving = true;
                    break;
                }
            }

            if (isMoving && !isAnythingMoving && !dragTarget) {
                forceStopAll(allEnt); // Inchioda tutto
                isMoving = false; 
                switchTurn();
            } else if (!isMoving && isAnythingMoving) {
                isMoving = true;
            }

            for (let i = 0; i < allEnt.length; i++) {
                for (let j = i + 1; j < allEnt.length; j++) {
                    if (allEnt[i] === dragTarget || allEnt[j] === dragTarget) continue;
                    resolveCollision(allEnt[i], allEnt[j]);
                }
            }

            [...team1, ...team2].forEach(p => {
                if (p.x < p.radius + 20) { p.x = p.radius + 20; p.vx *= -0.5; }
                if (p.x > canvas.width - p.radius - 20) { p.x = canvas.width - p.radius - 20; p.vx *= -0.5; }
                if (p.y < p.radius + 20) { p.y = p.radius + 20; p.vy *= -0.5; }
                if (p.y > canvas.height - p.radius - 20) { p.y = canvas.height - p.radius - 20; p.vy *= -0.5; }
            });

            if (ball.y < ball.radius + 20) { ball.y = ball.radius + 20; ball.vy *= -0.8; }
            if (ball.y > canvas.height - ball.radius - 20) { ball.y = canvas.height - ball.radius - 20; ball.vy *= -0.8; }

            const gy1 = canvas.height/2 - goalHeight/2, gy2 = canvas.height/2 + goalHeight/2;
            if (ball.x < ball.radius + 20) {
                if (ball.y > gy1 && ball.y < gy2) scoreGoal(2); else { ball.x = ball.radius + 20; ball.vx *= -0.8; }
            }
            if (ball.x > canvas.width - ball.radius - 20) {
                if (ball.y > gy1 && ball.y < gy2) scoreGoal(1); else { ball.x = canvas.width - ball.radius - 20; ball.vx *= -0.8; }
            }
        }

        function scoreGoal(playerScored) {
            gameState = GAME_STATE_GOAL; isMoving = false; 
            hitStopFrames = 10; // Congela pesantemente al gol
            triggerFlash(0.8);
            triggerScreenShake(30, 12); // Mega Shake
            
            forceStopAll([...team1, ...team2, ball]);

            if (playerScored === 1) {
                scoreP1++; score1El.innerText = scoreP1; currentTurn = 2; 
                createExplosion(canvas.width - 20, canvas.height/2, '#39FF14', 200, 25, 6, 100);
                showMessage(`<div>⚽ 🟢</div>`);
            } else {
                scoreP2++; score2El.innerText = scoreP2; currentTurn = 1;
                createExplosion(20, canvas.height/2, '#ffffff', 200, 25, 6, 100);
                showMessage(`<div>⚽ <svg class="icon" style="font-size:1.2em;"><use href="#gear-metallic"></use></svg></div>`);
            }
            updateTurnUI();

            if (scoreP1 >= 5 || scoreP2 >= 5) {
                let winner = scoreP1 >= 5 ? 1 : 2;
                setTimeout(() => {
                    if (winner === 1) {
                        if (currentStage >= maxStages) {
                            gameState = GAME_STATE_OVER;
                            gameOverIconEl.innerHTML = `🏆 <svg class="icon"><use href="#gear-gold"></use></svg> 🏆`;
                            gameOverScreenEl.classList.remove('hidden');
                        } else {
                            showMessage(`<div>🏆 🟢</div>`);
                            setTimeout(() => { currentStage++; showBracket(); }, 2000);
                        }
                    } else {
                        gameState = GAME_STATE_OVER;
                        gameOverIconEl.innerHTML = `💀 <svg class="icon"><use href="#gear-metallic"></use></svg>`;
                        gameOverScreenEl.classList.remove('hidden');
                    }
                }, 1500);
            } else {
                setTimeout(() => {
                    if (gameState === GAME_STATE_GOAL) { resetPositions(); gameState = GAME_STATE_PLAYING; showMessage(""); }
                }, 2000);
            }
        }

        function drawSlingshot() {
            if (dragTarget && pointer.active && currentTurn === 1) {
                let dx = dragTarget.dragStartX - dragTarget.x, dy = dragTarget.dragStartY - dragTarget.y;
                ctx.beginPath(); ctx.moveTo(dragTarget.dragStartX, dragTarget.dragStartY); ctx.lineTo(dragTarget.x, dragTarget.y);
                ctx.strokeStyle = 'rgba(57, 255, 20, 0.5)'; ctx.lineWidth = 6; ctx.stroke();
                ctx.beginPath(); ctx.arc(dragTarget.dragStartX, dragTarget.dragStartY, 5, 0, Math.PI*2); ctx.fillStyle = '#39FF14'; ctx.fill();
                let pullDist = Math.hypot(dx, dy);
                if (pullDist > 10) {
                    ctx.fillStyle = 'rgba(57, 255, 20, 0.8)';
                    for (let i = 1; i <= 6; i++) {
                        ctx.beginPath(); ctx.arc(dragTarget.dragStartX + (dx * 0.8 * i), dragTarget.dragStartY + (dy * 0.8 * i), Math.max(1, 8 - i), 0, Math.PI*2); ctx.fill();
                    }
                }
            }
        }

        function gameLoop() {
            ctx.fillStyle = '#1a1a1a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            if (shakeTime > 0) {
                ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude);
                shakeTime--; shakeMagnitude *= 0.9;
            }
            drawField(); handleAI(); updatePhysics();
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update(); particles[i].draw(ctx);
                if (particles[i].life <= 0) particles.splice(i, 1);
            }
            drawSlingshot(); 
            team1.forEach(p => p.draw(ctx)); team2.forEach(p => p.draw(ctx)); ball.draw(ctx);
            ctx.restore();
            requestAnimationFrame(gameLoop);
        }

        updateTurnUI();
        requestAnimationFrame(gameLoop);
    </script>
